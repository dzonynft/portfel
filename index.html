<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>MacroTerminal v30</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/plotly.js/2.27.0/plotly.min.js"></script>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#020810;--bg1:#060d1c;--bg2:#091525;--bg3:#0d1e35;--bg4:#132844;
  --br:rgba(255,255,255,.055);--br2:rgba(255,255,255,.10);--br3:rgba(255,255,255,.17);
  --G:#00e5a8;--Gd:rgba(0,229,168,.08);--Gb:rgba(0,229,168,.25);
  --R:#ff3355;--Rd:rgba(255,51,85,.08);--Rb:rgba(255,51,85,.25);
  --Y:#f5c040;--Yd:rgba(245,192,64,.08);--Yb:rgba(245,192,64,.22);
  --B:#2a9df5;--Bd:rgba(42,157,245,.08);--Bb:rgba(42,157,245,.25);
  --V:#9b7ef8;--O:#ff7c3e;
  --t0:#dceeff;--t1:#5a82a8;--t2:#2e4f6e;--t3:#16303f;
  --sans:'Inter',sans-serif;--mono:'JetBrains Mono',monospace;
  --r:8px;--rl:12px;
}
html,body{height:100%;background:var(--bg);color:var(--t0);font-family:var(--mono);font-size:12px;overflow:hidden;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:3px;height:3px}::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:99px}
.app{display:grid;grid-template-rows:52px 28px 40px 1fr;height:100vh}
/* TOPBAR */
.topbar{background:rgba(2,8,16,.97);backdrop-filter:blur(20px);border-bottom:1px solid var(--br);display:flex;align-items:center;gap:12px;padding:0 18px;position:relative;z-index:200}
.topbar::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--G) 25%,var(--B) 75%,transparent);opacity:.5}
.logo{font-family:var(--sans);font-weight:700;font-size:13px;letter-spacing:.3px;white-space:nowrap;flex-shrink:0}
.logo em{font-size:8.5px;color:var(--t2);letter-spacing:1px;font-weight:500;font-style:normal;margin-left:5px}
.vpill{padding:3px 12px;border-radius:4px;font-family:var(--sans);font-size:10px;font-weight:700;letter-spacing:.5px;border:1px solid;transition:all .4s;flex-shrink:0;white-space:nowrap}
.tsco{display:flex;align-items:baseline;gap:3px;font-family:var(--sans);flex-shrink:0}
.tsn{font-size:18px;font-weight:700;transition:color .4s;font-variant-numeric:tabular-nums}
.tsd{font-size:9.5px;color:var(--t2)}
.sdot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.s-ok{background:var(--G);box-shadow:0 0 6px var(--G)}.s-ld{background:var(--Y);animation:blink 1s infinite}.s-er{background:var(--R)}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.25}}
#smsg{font-size:9px;color:var(--t1);max-width:250px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tbr{margin-left:auto;display:flex;align-items:center;gap:8px;flex-shrink:0}
#clk{font-size:9px;color:var(--t2);font-variant-numeric:tabular-nums;white-space:nowrap}
.btn{font-family:var(--mono);font-size:9px;font-weight:600;padding:4px 10px;border-radius:4px;border:1px solid var(--br2);background:transparent;color:var(--t1);cursor:pointer;transition:all .15s;letter-spacing:.3px;white-space:nowrap}
.btn:hover{border-color:var(--br3);color:var(--t0);background:var(--bg3)}
/* TICKER */
.ticker{background:var(--bg1);border-bottom:1px solid var(--br);overflow:hidden;display:flex;align-items:center}
.tt{display:flex;white-space:nowrap;animation:scroll 130s linear infinite}.tt:hover{animation-play-state:paused}
@keyframes scroll{to{transform:translateX(-50%)}}
.ti{display:inline-flex;align-items:center;gap:6px;padding:0 15px;border-right:1px solid var(--br);height:28px;flex-shrink:0}
.tn{font-size:8px;color:var(--t2);letter-spacing:.5px}.tp{font-size:11px;font-weight:500;font-variant-numeric:tabular-nums}.tc{font-size:8px}
.up{color:var(--G)}.dn{color:var(--R)}.neu{color:var(--t1)}
/* TABS */
.tabs{background:var(--bg1);border-bottom:1px solid var(--br);display:flex;align-items:stretch;padding:0 5px;overflow-x:auto}
.tabs::-webkit-scrollbar{display:none}
.tab{font-family:var(--sans);font-size:10px;font-weight:600;letter-spacing:.3px;padding:0 12px;color:var(--t2);border:none;background:transparent;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s;white-space:nowrap;flex-shrink:0}
.tab:hover{color:var(--t1)}.tab.on{color:var(--t0);border-bottom-color:var(--G)}
.tspc{flex:1;min-width:5px}.lupd{font-size:8px;color:var(--t3);display:flex;align-items:center;padding-right:6px;white-space:nowrap}
/* PANELS */
.panel{display:none;height:100%;overflow-y:auto;overflow-x:hidden}.panel.on{display:block}
.wrap{padding:14px 20px 30px}
.sec{font-family:var(--sans);font-size:8px;font-weight:700;letter-spacing:1.5px;color:var(--t2);text-transform:uppercase;margin:16px 0 8px;display:flex;align-items:center;gap:8px}
.sec:first-child{margin-top:0}.sec::after{content:'';flex:1;height:1px;background:var(--br)}
/* GRIDS */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:10px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:9px;margin-bottom:10px}
.g5{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:10px}
/* CARDS */
.card{background:var(--bg2);border:1px solid var(--br);border-radius:var(--r);transition:border-color .2s}
.card:hover{border-color:var(--br2)}.cp{padding:11px 13px}
.card.G{border-left:2px solid var(--G)}.card.R{border-left:2px solid var(--R)}.card.Y{border-left:2px solid var(--Y)}.card.B{border-left:2px solid var(--B)}
/* KPI */
.kc{background:var(--bg2);border:1px solid var(--br);border-radius:var(--r);padding:10px 12px;transition:border-color .2s}
.kc:hover{border-color:var(--br2)}
.kc-l{font-family:var(--sans);font-size:7.5px;font-weight:700;letter-spacing:1px;color:var(--t2);text-transform:uppercase;margin-bottom:3px;display:flex;justify-content:space-between;align-items:center}
.kc-v{font-size:22px;font-weight:600;line-height:1;font-variant-numeric:tabular-nums;font-family:var(--sans);margin-bottom:2px}
.kc-s{font-size:8.5px;color:var(--t1)}.kc-src{font-size:7px;color:var(--t3);cursor:pointer;text-decoration:underline dotted}
.kc-src:hover{color:var(--B)}
/* HERO */
.hero{background:var(--bg2);border:1px solid var(--br2);border-radius:var(--rl);padding:18px 22px;margin-bottom:10px;position:relative;overflow:hidden;display:grid;grid-template-columns:1fr 195px;gap:20px;align-items:start}
.hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 45% 85% at 0% 50%,var(--vhg,rgba(0,229,168,.07)),transparent 60%);pointer-events:none}
.h-lbl{font-family:var(--sans);font-size:8px;font-weight:700;letter-spacing:1.5px;color:var(--t2);text-transform:uppercase;margin-bottom:6px}
.h-v{font-family:var(--sans);font-size:42px;font-weight:700;line-height:1;letter-spacing:-1.5px;margin-bottom:8px;transition:color .5s}
.h-bar{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.h-track{flex:1;max-width:180px;height:4px;background:rgba(255,255,255,.06);border-radius:99px;overflow:hidden}
.h-fill{height:4px;border-radius:99px;transition:width 1.2s cubic-bezier(.4,0,.2,1)}
.h-num{font-family:var(--sans);font-size:13px;font-weight:700}
.h-chips{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:10px}
.chip{font-family:var(--sans);font-size:8px;font-weight:700;padding:2px 7px;border-radius:3px;border:1px solid;white-space:nowrap;letter-spacing:.3px}
.cG{background:var(--Gd);color:var(--G);border-color:var(--Gb)}.cR{background:var(--Rd);color:var(--R);border-color:var(--Rb)}
.cY{background:var(--Yd);color:var(--Y);border-color:var(--Yb)}.cB{background:var(--Bd);color:var(--B);border-color:var(--Bb)}.cV{background:rgba(155,126,248,.08);color:var(--V);border-color:rgba(155,126,248,.28)}
.h-rat{font-size:9.5px;color:var(--t1);line-height:1.8;padding-top:10px;border-top:1px solid var(--br)}
.h-right{display:flex;flex-direction:column;gap:8px}
.ring-box{background:var(--bg3);border:1px solid var(--br2);border-radius:var(--r);padding:11px 13px;display:flex;align-items:center;gap:11px}
.rwrap{position:relative;flex-shrink:0}.rwrap svg{display:block;transform:rotate(-90deg)}
.rnum{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-family:var(--sans);font-size:15px;font-weight:700;text-align:center;line-height:1}
.rv{font-family:var(--sans);font-size:18px;font-weight:700;line-height:1}.rl{font-size:7.5px;color:var(--t2);letter-spacing:.5px;text-transform:uppercase;margin-bottom:3px}.rtt{font-size:8.5px;color:var(--t1);line-height:1.6}
.mini-card{background:var(--bg3);border:1px solid var(--br2);border-radius:var(--r);padding:8px 11px}
.mc-l{font-family:var(--sans);font-size:7px;font-weight:700;letter-spacing:.8px;color:var(--t2);text-transform:uppercase;margin-bottom:3px}
.mc-v{font-family:var(--sans);font-size:13px;font-weight:700;margin-bottom:3px}.mc-d{font-size:8.5px;color:var(--t1);line-height:1.6}
/* GAUGE */
.gauge{padding:11px 13px}.g-top{display:flex;justify-content:space-between;align-items:start;margin-bottom:4px}
.g-l{font-family:var(--sans);font-size:7.5px;font-weight:700;letter-spacing:1px;color:var(--t2);text-transform:uppercase}
.g-src{font-size:7px;color:var(--t3);cursor:pointer;text-decoration:underline dotted}.g-src:hover{color:var(--B)}
.g-v{font-size:26px;font-weight:600;line-height:1;margin-bottom:2px;font-variant-numeric:tabular-nums;font-family:var(--sans)}
.g-st{font-family:var(--sans);font-size:8.5px;font-weight:700;letter-spacing:.3px;margin-bottom:7px}
.g-track{position:relative;height:4px;background:rgba(255,255,255,.06);border-radius:99px;margin-bottom:3px}
.g-fill{position:absolute;left:0;top:0;height:4px;border-radius:99px;background:linear-gradient(90deg,var(--R),var(--Y),var(--G));transition:width .9s}
.g-pin{position:absolute;top:50%;transform:translate(-50%,-50%);width:9px;height:9px;border-radius:50%;background:#fff;border:2px solid var(--bg);transition:left .9s}
.g-ticks{display:flex;justify-content:space-between;font-size:7px;color:var(--t3);margin-top:2px}
.g-mini{display:grid;grid-template-columns:repeat(3,1fr);gap:3px;margin-top:6px}
.gm{background:var(--bg3);border-radius:3px;padding:4px 5px;text-align:center}
.gm-l{font-size:7px;color:var(--t2);margin-bottom:1px}.gm-v{font-size:10.5px;font-weight:600;font-family:var(--sans)}
.g-exp{font-size:9px;color:var(--t1);line-height:1.65;margin-top:7px;padding-top:7px;border-top:1px solid var(--br)}
/* SIGNAL TABLE */
.sigtbl{background:var(--bg2);border:1px solid var(--br);border-radius:var(--r);overflow:hidden;margin-bottom:10px}
.sg-grp{padding:3px 11px;background:rgba(255,255,255,.02);font-family:var(--sans);font-size:7.5px;font-weight:700;letter-spacing:1px;color:var(--t2);text-transform:uppercase;border-bottom:1px solid var(--br)}
.sg-row{display:grid;grid-template-columns:155px 88px 112px 1fr;align-items:center;padding:5px 11px;border-bottom:1px solid var(--br);transition:background .12s}
.sg-row:hover{background:rgba(255,255,255,.012)}.sg-row:last-child{border-bottom:none}
.sg-hd{background:var(--bg3);font-family:var(--sans);font-size:7.5px;color:var(--t2);font-weight:600;padding:4px 11px}
.sg-n{font-size:9.5px}.sg-v{font-size:10.5px;font-weight:600;text-align:center;font-variant-numeric:tabular-nums}
.pill{font-family:var(--sans);font-size:7.5px;font-weight:700;padding:2px 7px;border-radius:3px;text-align:center;display:inline-block;letter-spacing:.3px;white-space:nowrap}
.pG{background:var(--Gd);color:var(--G);border:1px solid var(--Gb)}.pR{background:var(--Rd);color:var(--R);border:1px solid var(--Rb)}.pY{background:var(--Yd);color:var(--Y);border:1px solid var(--Yb)}
.sg-d{font-size:8.5px;color:var(--t2);padding-left:7px}
/* CHART BOX */
.chb{background:var(--bg2);border:1px solid var(--br);border-radius:var(--r);overflow:hidden;margin-bottom:10px}
.chd{padding:8px 12px 0;display:flex;justify-content:space-between;align-items:center}
.ch-t{font-family:var(--sans);font-size:10px;font-weight:600}.ch-s{font-size:8px;color:var(--t2)}
.chbody{padding:2px 2px 0}.ch-note{padding:4px 11px 6px;font-size:8.5px;color:var(--t1);background:rgba(255,255,255,.015);line-height:1.6}
/* CRISIS MATRIX */
.crix{background:var(--bg2);border:1px solid var(--br);border-radius:var(--r);overflow:hidden;margin-bottom:10px}
.cx-hdr,.cx-row{display:grid;grid-template-columns:92px 45px 45px 50px 50px 44px 1fr}
.cx-hdr{background:var(--bg3);border-bottom:1px solid var(--br)}
.cx-hdr div{font-family:var(--sans);font-size:7px;font-weight:700;letter-spacing:.5px;color:var(--t2);padding:4px 6px;text-transform:uppercase;border-right:1px solid var(--br)}
.cx-row{border-bottom:1px solid var(--br);transition:background .12s}.cx-row:hover{background:rgba(255,255,255,.012)}.cx-row:last-child{border-bottom:none}
.cx-row div{padding:5px 6px;font-size:9px;border-right:1px solid var(--br);display:flex;align-items:center}.cx-row div:last-child{border-right:none}
.cx-era{font-family:var(--sans);font-size:8px;font-weight:700}
.cx-badge{font-family:var(--sans);font-size:7px;font-weight:700;padding:1px 5px;border-radius:2px;display:inline-block;margin-top:2px}
/* LIQUIDITY PHASES */
.lph-g{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:10px}
.lph{background:var(--bg2);border:1px solid var(--br);border-radius:var(--r);padding:10px 11px;position:relative;overflow:hidden;transition:border-color .2s}
.lph.active{border-color:var(--br2);box-shadow:0 0 0 1px rgba(245,192,64,.3)}
.lph-n{font-family:var(--sans);font-size:17px;font-weight:700;margin-bottom:2px}
.lph-t{font-family:var(--sans);font-size:9.5px;font-weight:700;margin-bottom:3px}
.lph-d{font-size:8.5px;color:var(--t2);line-height:1.6}
.lph-a{font-family:var(--sans);font-size:8.5px;font-weight:700;margin-top:5px;padding:2px 7px;border-radius:3px;display:inline-block}
.lph-now{position:absolute;top:5px;right:5px;font-family:var(--sans);font-size:7px;font-weight:700;padding:2px 5px;border-radius:2px;background:rgba(245,192,64,.18);color:var(--Y)}
/* INDICATOR CARDS */
.ig{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:10px}
.ic{background:var(--bg2);border:1px solid var(--br);border-radius:var(--r);padding:10px 12px;transition:border-color .2s,transform .15s}
.ic:hover{border-color:var(--br2);transform:translateY(-1px)}
.ic.G{border-left:2px solid var(--G)}.ic.R{border-left:2px solid var(--R)}.ic.Y{border-left:2px solid var(--Y)}
.ic-h{display:flex;justify-content:space-between;align-items:start;margin-bottom:2px}
.ic-t{font-family:var(--sans);font-size:8.5px;font-weight:600;color:var(--t1)}
.ic-v{font-size:20px;font-weight:600;line-height:1;margin-bottom:2px;font-family:var(--sans)}
.ic-d{font-size:7.5px;color:var(--t2);margin-bottom:4px}
.ic-desc{font-size:8.5px;color:var(--t2);line-height:1.6;border-top:1px solid var(--br);padding-top:5px;margin-top:3px}
.ic-src{font-size:7px;color:var(--t3);cursor:pointer;text-decoration:underline dotted}.ic-src:hover{color:var(--B)}
/* LAYERS */
.layers{background:var(--bg2);border:1px solid var(--br);border-radius:var(--r);overflow:hidden;margin-bottom:10px}
.layer{padding:9px 12px;border-bottom:1px solid var(--br);display:grid;grid-template-columns:58px 1fr 150px;gap:9px;align-items:start}
.layer:last-child{border-bottom:none}
.l-tag{font-family:var(--sans);font-size:16px;font-weight:700}.l-sub{font-size:7px;color:var(--t2);letter-spacing:.5px;margin-top:2px;font-weight:600}
.l-def{font-size:9px;color:var(--t1);line-height:1.65}.l-sig{font-size:8.5px;padding:5px 7px;border-radius:4px;line-height:1.6}
/* COT */
.cm{background:var(--bg2);border:1px solid var(--br);border-radius:var(--r);padding:11px 12px}
.cm-h{display:flex;justify-content:space-between;margin-bottom:7px}
.cm-n{font-family:var(--sans);font-size:11px;font-weight:700}.cm-c{font-size:7.5px;color:var(--t3)}
.cm-b{display:grid;grid-template-columns:80px 1fr 38px;align-items:center;gap:5px;margin-bottom:4px}
.cm-bl{font-size:8px;color:var(--t1);font-weight:600}.cm-tr{height:4px;background:rgba(255,255,255,.05);border-radius:99px;overflow:hidden}
.cm-f{height:4px;border-radius:99px}.cm-bv{font-size:8px;font-weight:700;text-align:right;font-variant-numeric:tabular-nums}
.cm-sig{font-family:var(--sans);font-size:8.5px;font-weight:700;margin-top:6px;padding:4px 7px;border-radius:4px;line-height:1.5}
/* PORTFOLIO */
.dmbar{border-radius:var(--r);padding:10px 13px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:10px}
.dmbar.bull{background:rgba(0,229,168,.04);border:1px solid rgba(0,229,168,.14)}
.dmbar.bear{background:rgba(245,192,64,.04);border:1px solid rgba(245,192,64,.14)}
.dm-l{font-family:var(--sans);font-size:7.5px;font-weight:700;letter-spacing:1px;color:var(--t2);text-transform:uppercase;margin-bottom:2px}
.dm-s{font-family:var(--sans);font-size:16px;font-weight:700}.dm-d{font-size:9px;color:var(--t1);line-height:1.7}
.pgrid{display:grid;grid-template-columns:repeat(5,1fr);gap:7px;margin-bottom:10px}
.pc{background:var(--bg2);border:1px solid var(--br);border-radius:var(--r);padding:8px 7px;text-align:center;transition:all .2s}
.pc:hover{transform:translateY(-2px);border-color:var(--br2)}
.pc-id{font-family:var(--sans);font-size:13px;font-weight:700;margin-bottom:2px}
.pc-nm{font-size:7.5px;color:var(--t1);margin-bottom:4px}.pc-b{font-family:var(--sans);font-size:10.5px;font-weight:700;margin-bottom:3px}
.pc-tp{font-size:6.5px;font-weight:700;padding:1px 5px;border-radius:2px;display:inline-block;margin-bottom:4px}
.pc-et{font-size:7px;color:var(--t2);line-height:1.6;margin-bottom:3px}.pc-dm{font-size:8.5px;font-weight:700}
.tblwrap{background:var(--bg2);border:1px solid var(--br);border-radius:var(--r);overflow:hidden;margin-bottom:10px}
.stbl{width:100%;border-collapse:collapse;font-size:9.5px}
.stbl th{background:var(--bg3);color:var(--t2);padding:5px 9px;text-align:left;font-family:var(--sans);font-size:7px;font-weight:700;letter-spacing:.5px;border-bottom:1px solid var(--br)}
.stbl td{padding:5px 9px;border-bottom:1px solid var(--br);color:var(--t1)}
.stbl tr:hover td{background:rgba(255,255,255,.012)}.stbl tr:last-child td{border-bottom:none}
.ptag{padding:1px 5px;border-radius:2px;font-weight:700;font-size:7.5px}
.rcb{background:var(--bg2);border:1px solid var(--br);border-radius:var(--r);padding:8px 11px;font-size:9px;color:var(--t2);line-height:1.9;margin-bottom:10px}
/* LINKS */
.lgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;margin-bottom:10px}
.lnk{display:block;padding:6px 8px;text-align:center;background:var(--bg2);border:1px solid var(--br);border-radius:var(--r);font-family:var(--sans);font-size:8.5px;font-weight:600;color:var(--B);text-decoration:none;transition:all .15s}
.lnk:hover{border-color:var(--Bb);background:var(--Bd);transform:translateY(-1px)}
/* ========================================
   SOURCE CONFIG EDITOR (key UI feature)
   ======================================== */

<script>
'use strict';
/* ================================================================
   MacroTerminal v30 — Modular Data Architecture
   
   CENTRAL CONFIG: CFG object maps each indicator to ordered
   list of sources. Fetch engine tries each in order until
   one succeeds. URLs editable in UI, saved to localStorage.
   
   FETCH CHAIN (FRED data):
     1. FRED API  — api.stlouisfed.org/fred/series/observations
     2. ivo-welch — cgi-bin/fredwrap (direct CORS-OK CSV)
     3. fredgraph.csv — via Cloudflare proxy
   
   KEY FIX: fredgraph.csv uses ?id=SYMBOL (not long params)
   which returns clean CSV not HTML.
================================================================ */

var FREDKEY = '03062bdea07a8594cad80e9a0574721e';
var FAPI    = 'https://api.stlouisfed.org/fred/series/observations?api_key='+FREDKEY+'&file_type=json&sort_order=desc&limit=200&series_id=';
var FWRAP   = 'https://www.ivo-welch.info/cgi-bin/fredwrap?symbol=';
var FCSV    = 'https://fred.stlouisfed.org/graph/fredgraph.csv?id=';

/* proxy chain defined in detectWorkingProxy() */

/* ================================================================
   FETCH ENGINE v30.1
   
   FRED data: WORKER_SERIES = portfel.dzonyiks.workers.dev?series=SYM
              Worker calls FRED API server-side (not a proxy = not blocked).
              MUST update Worker code! See cloudflare_worker_v30.js
   
   Other URLs (stooq, CNN): WORKER_PROXY = portfel.dzonyiks.workers.dev?url=URL
              Stooq and CNN do NOT block CF Workers.
   
   Static fallback: STATIC_FRED used when Worker unreachable.
   ================================================================ */

/* ── Core fetch with timeout ─────────────────────────────────── */
async function tFetchDirect(url, ms) {
  var ctrl = new AbortController();
  var timer = setTimeout(() => ctrl.abort(), ms || 12000);
  try {
    var r = await fetch(url, { signal: ctrl.signal, cache: 'no-store' });
    clearTimeout(timer);
    if (!r.ok) throw new Error('HTTP ' + r.status);
    return r;
  } catch(e) { clearTimeout(timer); throw e; }
}

/* ── FRED fetch via Worker dedicated endpoint ────────────────── */
async function fetchFredSeries(sym) {
  var url = WORKER_SERIES + encodeURIComponent(sym.toUpperCase());
  var r = await tFetchDirect(url, 14000);
  var txt = await r.text();
  if (!txt || txt.length < 10) throw new Error('empty');
  if (txt.trimStart().charAt(0) !== '{') throw new Error('not JSON: ' + txt.slice(0,40));
  var json = JSON.parse(txt);
  if (json.error) throw new Error('Worker: ' + json.error);
  if (json.error_message) throw new Error('FRED: ' + json.error_message);
  return parseFredAPI(json);
}

/* ── Generic URL fetch via Worker proxy ──────────────────────── */
async function proxyFetch(url, ms) {
  var full = WORKER_PROXY + encodeURIComponent(url);
  var r = await tFetchDirect(full, ms || 12000);
  var txt = await r.text();
  if (!txt || txt.trim().length < 10) throw new Error('empty response');
  return txt;
}

/* ── Parsers ─────────────────────────────────────────────────── */
function parseFredAPI(json) {
  if (!json || typeof json !== 'object') throw new Error('not JSON object');
  if (json.error_message) throw new Error('FRED API: ' + json.error_message);
  var obs = (json.observations || []).filter(o => o.value !== '.' && o.value !== '');
  if (!obs.length) throw new Error('empty observations (total=' + (json.observations || []).length + ')');
  var rows = obs.map(o => ({ date: o.date, val: parseFloat(o.value) })).filter(o => isFinite(o.val));
  if (!rows.length) throw new Error('all values missing');
  /* API returns desc (newest first) -> reverse to asc for buildResult */
  rows.reverse();
  return buildResult(rows);
}

function parseFredCSV(txt) {
  if (!txt || txt.length < 20) throw new Error('empty (len=' + (txt ? txt.length : 0) + ')');
  var t = txt.trimStart();
  var first = t.slice(0, 60).replace(/[\r\n]+/g, ' ');
  if (t.charAt(0) === '<') throw new Error('HTML:' + first.slice(0, 50));
  if (t.charAt(0) === '{') throw new Error('JSON not CSV:' + first.slice(0, 50));
  var lines = txt.trim().split('\n').filter(l => l && !/^date/i.test(l) && !/^#/.test(l));
  var rows = lines.map(l => {
    var p = l.split(','), dt = (p[0] || '').trim(), v = (p[1] || '').trim();
    return { date: dt, val: (v === '.' || v === 'NA' || v === '') ? NaN : parseFloat(v) };
  }).filter(r => r.date && isFinite(r.val));
  if (!rows.length) throw new Error('no valid rows after parse');
  /* Slice to last 200 = most recent data (avoids showing 1960s history) */
  return buildResult(rows.slice(-200));
}

function buildResult(asc) {
  var n = asc.length, last = asc[n-1], prev = n > 1 ? asc[n-2] : last;
  var p3 = n > 3 ? asc[n-4] : asc[0], p6 = n > 6 ? asc[n-7] : asc[0], p12 = n > 12 ? asc[n-13] : asc[0];
  var pct = (a, b) => a != null && b != null && b !== 0 ? (a-b) / Math.abs(b) * 100 : null;
  return {
    current: last.val, date: last.date, prev: prev.val,
    chg: pct(last.val, prev.val),
    trend3m: pct(last.val, p3.val), trend6m: pct(last.val, p6.val),
    yoy: pct(last.val, p12.val),
    series: asc.slice(-80)  /* last 80 records = ~6-7 years monthly, ~4M daily */
  };
}

/* ── Static fallback: use when Worker unreachable ────────────── */
function useStaticFallback(key) {
  var v = STATIC_FRED[key];
  if (v == null) return null;
  D[key] = { current: v, date: STATIC_FRED._date, prev: v, chg: 0,
             trend3m: null, trend6m: null, yoy: null, series: [], _isStatic: true };
  SS[key] = { ok: true, src: 'STATIC', idx: -1 };
  return D[key];
}

/* ── Fetch one FRED key with fallback chain ──────────────────── */
async function fetchKey(key) {
  var cfg = CFG[key]; if (!cfg) throw new Error('unknown key: ' + key);
  var sym = key; /* Default: use the key as symbol */

  /* Determine FRED symbol from config source URL */
  for (var s of cfg.sources) {
    if (s.type === 'fred_api' || s.type === 'fredwrap' || s.type === 'fred_csv') {
      var m = s.url.match(/series_id=([A-Z0-9]+)|symbol=([A-Z0-9]+)|id=([A-Z0-9]+)/i);
      if (m) { sym = m[1] || m[2] || m[3]; break; }
    }
  }

  /* Source 1: Worker ?series= endpoint (FRED server-side, not blocked) */
  try {
    var result = await fetchFredSeries(sym);
    SS[key] = { ok: true, src: 'Worker?series=' + sym, idx: 0 };
    return result;
  } catch(e) {
    setS('er', key + ' [Worker]: ' + e.message.slice(0, 60));
    SS[key] = { ok: false, src: 'Worker', idx: 0, err: e.message };
  }

  /* Source 2: ivo-welch direct (may work if CORS enabled) */
  try {
    var txt2 = await proxyFetch('https://www.ivo-welch.info/cgi-bin/fredwrap?symbol=' + sym, 11000);
    var result2 = parseFredCSV(txt2);
    SS[key] = { ok: true, src: 'ivo-welch', idx: 1 };
    return result2;
  } catch(e2) {
    setS('er', key + ' [ivo-welch]: ' + e2.message.slice(0, 60));
  }

  /* Source 3: Static fallback (always available, may be stale) */
  var stat = useStaticFallback(key);
  if (stat) {
    setS('er', key + ': uzyto danych statycznych (' + STATIC_FRED._date + ')');
    return stat;
  }

  throw new Error(key + ': no data available');
}

/* ── Batch FRED fetch ────────────────────────────────────────── */
async function fetchFredAll() {
  var keys = ['fedfunds','m2','fed_bs','rrp','sofr','ib01','cpi','core_cpi','tips',
              'yc','hy','move','sahm','unrate','indprod','nfci','vixf','sp500f'];
  var ok = 0, fail = 0;
  for (var i = 0; i < keys.length; i += 4) {
    var batch = keys.slice(i, i+4);
    setS('ld', 'FRED ' + (Math.floor(i/4)+1) + '/' + Math.ceil(keys.length/4) + ': ' + batch.join(', '));
    var res = await Promise.allSettled(batch.map(k => fetchKey(k)));
    res.forEach((r, j) => {
      if (r.status === 'fulfilled') { D[batch[j]] = r.value; ok++; }
      else { fail++; setS('er', batch[j] + ': ' + (r.reason && r.reason.message || '?').slice(0,60)); }
    });
    if (i + 4 < keys.length) await new Promise(r => setTimeout(r, 50));
  }
  /* VIX: prefer stooq if FRED failed */
  if (!DQ.vix && D.vixf) DQ.vix = { price: D.vixf.current, prev: D.vixf.prev, change: D.vixf.chg || 0, date: D.vixf.date };
  var src_label = ok > 0 ? (Object.values(SS).find(s=>s.src==='STATIC') ? 'Worker+static' : 'Worker OK') : 'STATIC ONLY';
  setS(ok > 12 ? 'ok' : 'er', 'FRED: ' + ok + ' OK, ' + fail + ' err — ' + src_label);
}

/* ── Stooq prices ────────────────────────────────────────────── */
var SQ = {sp500:'^spx',nasdaq:'^ndx',dj:'^dji',gold:'xauusd',silver:'xagusd',oil:'cl.f',
          natgas:'ng.f',copper:'hg.f',usdpln:'usdpln',eurpln:'eurpln',eurusd:'eurusd',
          dxy:'dxy',usdjpy:'usdjpy',us10y:'10usy.b',us2y:'2usy.b',btcusd:'btcusd',
          ethusd:'ethusd',wig20:'wig20',vix:'^vix',isac:'isac.uk',spy:'spy.us',qqq:'qqq.us'};

async function sOne(sym) {
  /* Stooq via Worker proxy — stooq does NOT block CF Workers */
  var url = 'https://stooq.com/q/d/l/?s=' + encodeURIComponent(sym) + '&i=d';
  var txt = await proxyFetch(url, 10000);
  if (!txt || txt.indexOf('No data') !== -1 || txt.trim().length < 20) throw new Error('no data');
  var lines = txt.trim().split('\n').filter(l => l && l.indexOf('Date') === -1);
  if (!lines.length) throw new Error('empty');
  var pl = l => { var a = l.split(','); return { close: parseFloat(a[4]), date: a[0] }; };
  var last = pl(lines[lines.length-1]), prev = lines.length > 1 ? pl(lines[lines.length-2]) : last;
  if (isNaN(last.close)) throw new Error('NaN');
  return { price: last.close, prev: prev.close, change: prev.close ? (last.close-prev.close)/prev.close*100 : 0, date: last.date };
}

async function fetchStooq() {
  setS('ld', 'Stooq: ceny...');
  var keys = Object.keys(SQ);
  var res = await Promise.allSettled(keys.map(k => sOne(SQ[k])));
  DQ = {}; var ok = 0, fail = 0;
  res.forEach((r, i) => { if (r.status === 'fulfilled') { DQ[keys[i]] = r.value; ok++; } else fail++; });
  SS.stooq = { ok: ok > 12, src: 'stooq.com', count: ok };
  setS(ok > 12 ? 'ok' : 'er', 'Stooq: ' + ok + '/' + keys.length);
}

async function fetchSP12M() {
  try {
    var now = new Date(), ya = new Date(now); ya.setFullYear(ya.getFullYear() - 1);
    var d8 = d => d.getFullYear() + String(d.getMonth()+1).padStart(2,'0') + String(d.getDate()).padStart(2,'0');
    var url = 'https://stooq.com/q/d/l/?s=%5Espx&d1=' + d8(ya) + '&d2=' + d8(now) + '&i=w';
    var txt = await proxyFetch(url, 12000);
    if (!txt || txt.indexOf('No data') !== -1) throw new Error('no data');
    var lines = txt.trim().split('\n').filter(l => l && l.indexOf('Date') === -1);
    if (lines.length < 2) throw new Error('too few lines');
    var pv = l => parseFloat(l.split(',')[4]);
    var first = pv(lines[0]), last = pv(lines[lines.length-1]);
    if (!first || !last || isNaN(first) || isNaN(last)) throw new Error('NaN');
    D._sp12m = (last - first) / first * 100; D._sp12m_src = 'stooq';
  } catch(e) { D._sp12m = null; D._sp12m_src = 'err'; }
}

/* ── Fear & Greed ────────────────────────────────────────────── */
async function fetchFG(){
  setS('ld','F&G...');D._fg=null;

  /* Source 1: CNN dataviz (multiple URLs tried) */
  var cnnUrls=[
    'https://production.dataviz.cnn.io/index/fearandgreed/graphdata',
    'https://production.dataviz.cnn.io/index/fearandgreed/graphdata/30',
  ];
  for(var ci=0;ci<cnnUrls.length;ci++){
    try{
      var t1=await proxyFetch(cnnUrls[ci],10000);
      if(t1&&t1.trimStart().charAt(0)==='{'){
        var j1=JSON.parse(t1);
        var fgo=j1.fear_and_greed||j1;
        var sc1=Math.round(parseFloat(fgo.score||fgo.current_value||fgo.value||0));
        if(sc1>0&&sc1<=100){
          D._fg={score:sc1,
                 prev_close:Math.round(parseFloat(fgo.previous_close||0))||null,
                 prev_week:Math.round(parseFloat(fgo.previous_1_week||0))||null,
                 prev_month:Math.round(parseFloat(fgo.previous_1_month||0))||null,
                 source:'CNN dataviz'};
          setS('ok','F&G CNN: '+sc1);return;
        }
      }
    }catch(e1){setS('er','CNN F&G['+ci+']: '+e1.message.slice(0,50));}
  }

  /* Source 2: finhacker.cz — scrape <p id="fng-current"> */
  try{
    var html2=await proxyFetch('https://www.finhacker.cz/en/fear-and-greed-index-historical-data-and-chart/',14000);
    var pats=[/id="fng-current"[^>]*>\s*(\d+)/,/fng-current[^>]*>\s*(\d+)/,/"fng_current":\s*(\d+)/];
    for(var pi=0;pi<pats.length;pi++){
      var m=html2.match(pats[pi]);
      if(m&&m[1]){var sc2=parseInt(m[1]);if(sc2>0&&sc2<=100){
        D._fg={score:sc2,source:'finhacker.cz'};setS('ok','F&G fin: '+sc2);return;
      }}
    }
    throw new Error('element not found');
  }catch(e){setS('er','F&G finhacker: '+e.message.slice(0,60));}

  /* Source 3: Use Crypto F&G as proxy (high correlation to equity F&G ~0.7) */
  if(D._cfg&&D._cfg.score>0){
    D._fg={score:D._cfg.score,source:'Crypto F&G (proxy for CNN)',prev_close:null,prev_week:null,prev_month:null};
    setS('er','F&G = crypto proxy: '+D._cfg.score);return;
  }

  /* Source 4: VIX-based synthetic (always works) */
  var vixFG=(DQ.vix&&DQ.vix.price&&DQ.vix.price>0)?DQ.vix.price:26;
  var est=Math.round(vixFG>40?12:vixFG>32?20:vixFG>26?32:vixFG>20?44:vixFG<14?80:vixFG<17?68:52);
  D._fg={score:est,source:'SZACUNEK VIX='+vixFG.toFixed(0),prev_close:null,prev_week:null,prev_month:null};
  setS('er','F&G syntetyczny: '+est);
}

async function fetchCFG() {
  try {
    var txt = await proxyFetch('https://api.alternative.me/fng/?limit=30&format=json', 10000);
    var raw = JSON.parse(txt);
    var entries = raw && raw.data ? raw.data : [];
    if (!entries.length) throw new Error('empty');
    D._cfg = { score: parseInt(entries[0].value), history: entries.slice(0,14).map(e => ({
      date: new Date(parseInt(e.timestamp)*1000).toLocaleDateString('pl-PL', {day:'2-digit',month:'2-digit'}),
      score: parseInt(e.value)
    })) };
  } catch(e) { D._cfg = null; }
}

function calcScore(){
  /* VIX: stooq ^vix (DQ.vix) is primary — always refreshed by fetchStooq */
  var vix=null;
  if(DQ.vix&&DQ.vix.price&&DQ.vix.price>0)vix=DQ.vix.price;
  else if(gV('vixf')!=null)vix=gV('vixf');
  else vix=26; /* fallback only if no data at all */
  var fg=D._fg?D._fg.score:null;
  var sp12m=D._sp12m!=null?D._sp12m:(D.sp500f&&D.sp500f.yoy!=null?D.sp500f.yoy:18);
  var ib01v=gV('ib01')!=null?gV('ib01'):4.15;
  var sahmv=gV('sahm')!=null?gV('sahm'):0.3;
  var ycv=gV('yc'), hyv=gV('hy')!=null?gV('hy'):2.84;
  var fedv=gV('fedfunds')!=null?gV('fedfunds'):4.33;
  var cpiy=D.cpi&&D.cpi.yoy!=null?D.cpi.yoy:null;
  var m2y=D.m2&&D.m2.yoy!=null?D.m2.yoy:null;
  var sfT3=D.sofr&&D.sofr.trend3m!=null?D.sofr.trend3m:null;
  var movev=gV('move');

  /* S1 Sentyment */
  var s1=vix>=40?10:vix>=30?7:vix>=20?3:vix>=15?0:-5;
  if(fg!=null){var fp=fg<=20?10:fg<=40?5:fg<=60?0:fg<=80?-5:-10;s1=Math.round((s1+fp)/2);}
  if(movev!=null){if(movev>140)s1=Math.min(10,s1+2);else if(movev<70)s1=Math.max(-10,s1-1);}
  s1=Math.max(-10,Math.min(10,s1));

  /* S2 Płynność */
  var s2=0;
  if(m2y!=null){if(m2y>6)s2+=5;else if(m2y>3)s2+=3;else if(m2y<0)s2-=5;}
  if(sfT3!=null){if(sfT3>5)s2+=3;else if(sfT3<-10)s2-=3;}
  if(fedv<3)s2+=2;else if(fedv>5)s2-=2;
  s2=Math.max(-10,Math.min(10,s2));

  /* S3 Positioning */
  var s3=vix>=40?10:vix>=30?7:vix>=25?4:vix>=20?1:vix<15?-5:0;
  if(ycv!=null){if(ycv>0.5)s3=Math.min(10,s3+1);else if(ycv<-0.2)s3=Math.max(-10,s3-2);}
  s3=Math.max(-10,Math.min(10,s3));

  /* S4 Cykl */
  var s4=0;
  if(sahmv<0.3)s4+=4;else if(sahmv>0.5)s4-=6;
  if(hyv<3.5)s4+=3;else if(hyv>6)s4-=5;
  if(ST.ism>52)s4+=2;else if(ST.ism<47)s4-=3;
  s4=Math.max(-10,Math.min(10,s4));

  /* S5 Momentum */
  var s5=sp12m>ib01v?6:-4;
  if(ST.cape<20)s5+=2;else if(ST.cape>35)s5-=3;
  if(cpiy!=null){if(cpiy<2.5)s5+=2;else if(cpiy>4)s5-=3;}
  s5=Math.max(-10,Math.min(10,s5));

  var total=s1+s2+s3+s4+s5;
  var norm=Math.max(0,Math.min(100,Math.round((total+50)/100*100)));

  var verdict,color,vhg;
  if(vix>=28&&total>=-10){verdict='KUP (PANIKA)';color='#00e5a8';vhg='rgba(0,229,168,.12)';}
  else if(total>=20){verdict='KUP';color='#00e5a8';vhg='rgba(0,229,168,.09)';}
  else if(total>=5){verdict='AKUMULUJ';color='#00e5a8';vhg='rgba(0,229,168,.07)';}
  else if(total>=-5){verdict='NEUTRALNIE';color='#f5c040';vhg='rgba(245,192,64,.07)';}
  else if(total>=-20){verdict='REDUKUJ';color='#ff7c3e';vhg='rgba(255,124,62,.07)';}
  else{verdict='SPRZEDAJ';color='#ff3355';vhg='rgba(255,51,85,.08)';}

  /* Liquidity phase: 1=expand 2=tighten 3=contract 4=pivot */
  var lp=2;
  if(m2y!=null&&m2y>4&&fedv<4)lp=1;
  else if(m2y!=null&&m2y<0)lp=3;
  else if(vix>=25&&fg!=null&&fg<=40)lp=4;

  SC={total,norm,verdict,color,vhg,s1,s2,s3,s4,s5,lp,
      vix,fg,sp12m,ib01:ib01v,dm:sp12m>ib01v,
      sahm:sahmv,yc:ycv,hy:hyv,fed:fedv,cpi:cpiy,m2y};

  var vp=document.getElementById('vp');
  if(vp){
    vp.textContent=verdict;
    vp.style.background=total>=5?'var(--Gd)':total>=-5?'var(--Yd)':'var(--Rd)';
    vp.style.color=color;
    vp.style.borderColor=total>=5?'var(--Gb)':total>=-5?'var(--Yb)':'var(--Rb)';
  }
  var tsn=document.getElementById('tsn');
  if(tsn){tsn.textContent=norm;tsn.style.color=color;}
  return SC;
}

      +'<td style="font-size:8px;color:var(--Y)">'+p.safe+'</td></tr>';
  }).join('')+'</tbody></table></div>'
  +'</div>';
}

function renderJournal(){
  var el=document.getElementById('p-journal');if(!el)return;
  var sc=SC||calcScore();
  var jrn=[];try{jrn=JSON.parse(localStorage.getItem(JRN_KEY)||'[]');}catch(e){}
  var jH='<div class="wrap">'
    +'<div class="sec">Nowy wpis</div>'
    +'<div class="jtop">'
    +'<textarea id="jtx" placeholder="Notatka inwestycyjna… np. DCA P1 — VIX=29, F&G=38, decyzja: kupuję ISAC $167"></textarea>'
    +'<div class="jmeta">'
    +'<select class="jsel" id="jtag"><option value="analiza">Analiza</option><option value="kupuję">Kupuję</option><option value="sprzedaję">Sprzedaję</option><option value="obserwuję">Obserwuję</option><option value="notatka">Notatka</option></select>'
    +'<button class="jbtn" id="jbtn">Zapisz wpis</button>'
    +'<div style="font-size:8px;color:var(--t2);line-height:1.6">Score: <b style="color:'+sc.color+'">'+sc.norm+'/100</b><br>'+sc.verdict+'</div>'
    +'</div></div>'
    +'<div class="sec">Wpisy ('+jrn.length+')</div>'
    +'<div class="jlist" id="jlist">';
  var tagC={kupuję:'cG',sprzedaję:'cR',obserwuję:'cB',analiza:'cY',notatka:'cV'};
  jrn.slice(0,50).forEach((e,i)=>{
    jH+='<div class="je"><div class="je-hd"><span class="je-dt">'+e.dt+'</span><div style="display:flex;align-items:center;gap:7px"><span class="chip '+(tagC[e.tag]||'cB')+'">'+e.tag+'</span><button class="jdel" onclick="delJrn('+i+')">✕</button></div></div>'
      +'<div class="je-body">'+e.txt.replace(/</g,'&lt;')+'</div>'
      +(e.score!=null?'<div class="je-score">Score w chwili wpisu: <b style="color:'+( e.score>=65?'var(--G)':e.score>=45?'var(--Y)':'var(--R)')+'">'+e.score+'/100</b> — '+e.verdict+'</div>':'')
      +'</div>';
  });
  jH+='</div></div>';
  el.innerHTML=jH;
  document.getElementById('jbtn').addEventListener('click',()=>{
    var txt=document.getElementById('jtx').value.trim();
    if(!txt)return;
    var tag=document.getElementById('jtag').value;
    var sc2=SC||calcScore();
    var entry={dt:new Date().toLocaleString('pl-PL'),txt,tag,score:sc2.norm,verdict:sc2.verdict};
    jrn.unshift(entry);
    try{localStorage.setItem(JRN_KEY,JSON.stringify(jrn.slice(0,200)));}catch(e){}
    document.getElementById('jtx').value='';
    RENDERED.journal=false;renderJournal();
  });
}
window.delJrn=function(i){
  var jrn=[];try{jrn=JSON.parse(localStorage.getItem(JRN_KEY)||'[]');}catch(e){}
  jrn.splice(i,1);
  try{localStorage.setItem(JRN_KEY,JSON.stringify(jrn));}catch(e){}
  RENDERED.journal=false;renderJournal();
};

/* ===========================================
   SOURCES — the key feature of v30
   Each indicator: see all sources, edit URLs,
   test each source, save to localStorage
=========================================== */
function renderSources(){
  var el=document.getElementById('p-sources');if(!el)return;
  /* Count stats */
  var nOk=Object.values(SS).filter(s=>s&&s.ok).length;
  var nFail=Object.values(SS).filter(s=>s&&!s.ok).length;
  var nTotal=Object.keys(CFG).length;
  var h='<div class="wrap">'
  /* status row */
  +'<div class="dsg">'
  +'<div class="ds"><div class="ds-l">Łącznie konfiguracji</div><div class="ds-n" style="color:var(--B)">'+nTotal+'</div><div class="ds-s">wskaźników</div></div>'
  +'<div class="ds"><div class="ds-l">Status OK</div><div class="ds-n" style="color:var(--G)">'+nOk+'</div><div class="ds-s">aktywnych źródeł</div></div>'
  +'<div class="ds"><div class="ds-l">Błędy</div><div class="ds-n" style="color:var(--R)">'+nFail+'</div><div class="ds-s">źródeł failed</div></div>'
  +'<div class="ds"><div class="ds-l">Dane załadowane</div><div class="ds-n" style="color:var(--G)">'+Object.keys(D).filter(k=>k[0]!=='_').length+'</div><div class="ds-s">serii</div></div>'
  +'<div class="ds"><div class="ds-l">FRED API Key</div><div class="ds-n" style="color:var(--Y);font-size:12px">AKTYWNY</div><div class="ds-s">03062bdea…</div></div>'
  +'</div>'
  +'<div class="ibox"><b>Proxy chain v30:</b> System testuje proxy przy starcie i uzywa pierwszego dzialajacego. Kolejnosc: allorigins.win → corsproxy.io → portfel (CF Worker) → thingproxy. Kliknij "Test proxy" aby sprawdzic co dziala. Jesli wszystkie proxy zawodza — dane nie beda ladowane (FRED nie obsluguje CORS).</div>'
  +'<div style="margin-bottom:10px;display:flex;gap:8px;flex-wrap:wrap"><button class="btn" onclick="runProxyTest()">▶ Test proxy</button><button class="btn" onclick="runFREDTest()">▶ Test FRED API</button><button class="btn" onclick="runFGTest()">▶ Test F&amp;G</button></div>'
  +'<div id="proxy-test-res" style="margin-bottom:10px;font-size:9px;color:var(--t1);line-height:1.9"></div>';

  /* Group by group */
  var groups={monetary:'Polityka monetarna',inflation:'Inflacja',rates:'Stopy i kredyt',economy:'Gospodarka i cykl',market:'Rynek',sentiment:'Sentyment',prices:'Ceny (stooq)'};
  Object.keys(groups).forEach(grp=>{
    var keys=Object.keys(CFG).filter(k=>CFG[k].group===grp);
    if(!keys.length)return;
    h+='<div class="sec">'+groups[grp]+'</div>';
    keys.forEach(k=>{
      var cfg=CFG[k];
      var ss=SS[k];
      var stCls=ss?(ss.ok?'ss-live':'ss-fail'):'ss-idle';
      var stTxt=ss?(ss.ok?'✓ OK [src '+(ss.idx+1)+']':'✗ err'):'⟳ idle';
      var activeUrl=(ss&&ss.idx!=null&&cfg.sources[ss.idx])?cfg.sources[ss.idx].url:cfg.sources[0].url;
      var shortUrl=activeUrl.length>60?activeUrl.slice(0,57)+'…':activeUrl;
      h+='<div class="cfg-panel" id="cp_'+k+'">'
        +'<div class="cfg-hdr" onclick="toggleCfg(\''+k+'\')" id="ch_'+k+'">'
        +'<div><div class="cfg-name">'+cfg.label+'</div><div class="cfg-key">'+k+' · '+cfg.freq+'</div></div>'
        +'<div class="cfg-url">'+shortUrl+'</div>'

        +'<div class="cfg-acts"><button class="sab" onclick="event.stopPropagation();testAllSrc(\''+k+'\')">▶ Test</button></div>'
        +'</div>'
        +'<div class="cfg-body" id="cb_'+k+'">'
        +'<div class="src-rows">';
      cfg.sources.forEach((src,i)=>{
        var iOk=src._lastOk===true,iFail=src._lastOk===false;

          +'<div class="sr-lbl">Źródło '+(i+1)+'<br><span style="font-size:7px;color:var(--t3)">'+src.name+'</span></div>'
          +'<input class="sr-inp" id="si_'+k+'_'+i+'" value="'+src.url+'" placeholder="URL endpointu">'
          +'<div class="sr-st" style="color:'+(iOk?'var(--G)':iFail?'var(--R)':'var(--t3)')+'">'+(iOk?'✓ OK':iFail?'✗ fail':'—')+'</div>'
          +'</div>';
      });
      /* Add new source row */
      h+='<div class="src-row"><div class="sr-lbl">+ Nowe<br><span style="font-size:7px;color:var(--t3)">fallback</span></div><input class="sr-inp" id="si_'+k+'_new" placeholder="https://… nowe źródło fallback"><div></div></div>';
      h+='</div>'
        +'<div class="cfg-btns">'
        +'<button class="btn-g" onclick="saveSrc(\''+k+'\')">💾 Zapisz URL</button>'
        +'<button class="btn-n" onclick="resetSrc(\''+k+'\')">↩ Reset domyślny</button>'
        +'<button class="btn-n" onclick="testAllSrc(\''+k+'\')">▶ Test wszystkich</button>'
        +'</div>'
        +'<div class="test-res" id="tr_'+k+'"></div>'
        +'<div class="cfg-info">Typ parsera: <b>'+cfg.sources[0].type+'</b> · Częstotliwość aktualizacji: <b>'+cfg.freq+'</b></div>'
        +'</div></div>';
    });
  });

  /* Log */
  h+='<div class="sec">Log pobierania</div>';
  h+='<div class="logbox">'+LOG.slice(0,80).map(l=>'<div class="lr"><span class="lts">'+l.ts+'</span><span class="lic">'+(l.state==='ok'?'<span style="color:var(--G)">●</span>':l.state==='er'?'<span style="color:var(--R)">●</span>':'<span style="color:var(--Y)">●</span>')+'</span><span class="lmsg">'+l.msg.replace(/</g,'&lt;')+'</span></div>').join('')+'</div>';
  h+='</div>';
  el.innerHTML=h;

window.toggleCfg=function(k){
  var hdr=document.getElementById('ch_'+k);
  var body=document.getElementById('cb_'+k);
  if(!hdr||!body)return;
  var open=body.classList.contains('open');
  body.classList.toggle('open',!open);
  hdr.classList.toggle('open',!open);
};
window.saveSrc=function(k){
  var cfg=CFG[k];if(!cfg)return;
  cfg.sources.forEach((src,i)=>{
    var inp=document.getElementById('si_'+k+'_'+i);
    if(inp&&inp.value.trim())src.url=inp.value.trim();
  });
  /* Add new source if filled */
  var newInp=document.getElementById('si_'+k+'_new');
  if(newInp&&newInp.value.trim()){
    cfg.sources.push({name:'Custom '+(cfg.sources.length+1),url:newInp.value.trim(),type:'fred_csv'});
  }
  cfgSave();
  var tr=document.getElementById('tr_'+k);
  if(tr){tr.className='test-res tok';tr.style.display='block';tr.textContent='✓ Zapisano '+cfg.sources.length+' źródeł do localStorage.';}
};
window.resetSrc=function(k){
  if(!confirm('Reset do domyślnych URL dla '+k+'?'))return;
  /* rebuild from fs() */
  var sym=CFG[k].sources[0].url.split('series_id=')[1]||CFG[k].sources[0].url.split('symbol=')[1]||'';
  if(sym)CFG[k].sources=fs(sym);
  cfgSave();RENDERED.sources=false;renderSources();
};
window.testAllSrc=async function(k){
  var tr=document.getElementById('tr_'+k);
  if(tr){tr.className='test-res';tr.style.display='block';tr.style.background='var(--Yd)';tr.style.color='var(--Y)';tr.textContent='Testowanie…';}
  var cfg=CFG[k];var results=[];
  for(var i=0;i<cfg.sources.length;i++){
    var src=cfg.sources[i];
    try{
      var res=await trySrc(src);
      var val=res&&res.current!=null?res.current:res;
      results.push('Źródło '+(i+1)+' ['+src.name+']: ✓ OK'+(val!=null?' val='+JSON.stringify(val).slice(0,30):''));
      src._lastOk=true;
    }catch(e){
      results.push('Źródło '+(i+1)+' ['+src.name+']: ✗ '+e.message);
      src._lastOk=false;
    }
  }
  if(tr){
    var allOk=results.every(r=>r.includes('✓'));
    tr.className='test-res '+(allOk?'tok':'tfail');
    tr.style.background='';tr.style.color='';
    tr.textContent=results.join(' | ');
  }
  RENDERED.sources=false;renderSources();
};

/* ===========================================
   MAIN INIT
=========================================== */
/* ── PROXY DETECTION ──────────────────────────────────────────────────────
   Runs a quick test fetch against a known good FRED endpoint.
   Reorders PROXIES_FULL to put the fastest working proxy first.
   This runs once at startup and ensures we don't waste 4×14s on dead proxies.
───────────────────────────────────────────────────────────────────────── */
/* ================================================================
   ARCHITEKTURA v30.1:
   
   FRED: portfel.dzonyiks.workers.dev?series=SYMBOL
         Worker sam wywoluje FRED API server-side — nie jest blokowany.
         WAZNE: Worker musi byc zaktualizowany do nowego kodu!
         Plik worker: cloudflare_worker_v30.js (w ZIP)
   
   PROXY URL (stooq, CNN etc.): portfel.dzonyiks.workers.dev?url=URL
         Stooq i CNN nie blokuja proxy — dziala.
   
   FALLBACK: STATIC_FRED — ostatnie znane wartosci gdy siec zawiedzie.
   ================================================================ */

var WORKER = 'https://portfel.dzonyiks.workers.dev';
var WORKER_SERIES = WORKER + '?series=';  /* FRED dedicated endpoint */
var WORKER_PROXY  = WORKER + '?url=';     /* Generic proxy for stooq/CNN */

/* Static fallback data — updated periodically, used when all sources fail */
var STATIC_FRED = {
  fedfunds: 4.33, m2: 21439.3, fed_bs: 6745000, rrp: 78.2, sofr: 4310000,
  ib01: 4.23, cpi: 2.82, core_cpi: 3.35, tips: 2.43, yc: 0.11,
  hy: 2.84, move: 92.3, sahm: 0.23, unrate: 4.1, indprod: 103.2,
  nfci: -0.44, vixf: 22.4, sp500f: 5667,
  _date: '2025-11'
};

async function detectWorkingProxy(){
  /* Test URL: tiny FRED series — DGS1MO (1M T-bill, daily, small) */
  var testUrl = FAPI + 'DGS1MO';
  setS('ld','Szukam dzialajacego proxy...');
  for(var i=0;i<PROXIES_FULL.length;i++){
    try{
      var full = PROXIES_FULL[i] + encodeURIComponent(testUrl);
      var ctrl = new AbortController();
      var timer = setTimeout(()=>ctrl.abort(), 9000);
      var r = await fetch(full, {signal:ctrl.signal, cache:'no-store'});
      clearTimeout(timer);
      var txt = await r.text();
      /* Check if we got a real FRED JSON response */
      if(txt && txt.includes('"observations"')){
        /* Move working proxy to front */
        var working = PROXIES_FULL.splice(i, 1)[0];
        PROXIES_FULL.unshift(working);
        setS('ok','Proxy OK: ' + working.slice(8, 28));
        return;
      }
      /* Check if it returned allorigins wrapper */
      if(txt && txt.includes('"contents"') && txt.includes('observations')){
        var working2 = PROXIES_FULL.splice(i, 1)[0];
        PROXIES_FULL.unshift(working2);
        setS('ok','Proxy (wrapped) OK: ' + working2.slice(8, 28));
        return;
      }
    }catch(e){ /* try next */ }
  }
  /* No proxy worked for FRED API — fall back to ivo-welch direct */
  setS('er','Uwaga: brak dzialajacego proxy dla FRED API. Probuje ivo-welch...');
}


async function init(){
  setS('ld','Start...');
  var lupd=document.getElementById('lupd');
  if(lupd)lupd.textContent='';

  /* Self-test: find working proxy before main fetch */
  await detectWorkingProxy();

  /* Parallel fetch: FRED + Stooq + F&G + crypto */
  await Promise.allSettled([
    fetchFredAll(),
    fetchStooq(),
    fetchSP12M(),
  ]);
  /* Sequential after prices are loaded */
  await fetchCFG();  /* Crypto F&G first - used as F&G fallback */
  await fetchFG();

  renderTicker();
  calcScore();

  /* Render active tab */
  var activeTab=document.querySelector('.tab.on');
  if(activeTab){RENDERED={};renderTab(activeTab.dataset.t);}

  if(lupd)lupd.textContent='Aktualizacja: '+new Date().toLocaleTimeString('pl-PL',{hour:'2-digit',minute:'2-digit'});
  setS('ok','Gotowe — '+Object.keys(D).filter(k=>k[0]!=='_').length+' serii FRED, '+Object.keys(DQ).length+' cen stooq');

  /* Auto-refresh every 15 min */
  setTimeout(function refresh(){
    D={};DQ={};SC=null;RENDERED={};
    init().then(()=>setTimeout(refresh,15*60*1000));
  },15*60*1000);
}

/* ── LIVE PROXY TEST FUNCTIONS ─────────────────────────────────────────── */
async function runProxyTest(){
  var el=document.getElementById('proxy-test-res');
  if(el)el.innerHTML='Testowanie proxy...';
  var results=[];
  var testUrl=FAPI+'DGS1MO';
  for(var i=0;i<PROXIES_FULL.length;i++){
    var p=PROXIES_FULL[i];
    try{
      var t0=Date.now();
      var full=p+encodeURIComponent(testUrl);
      var ctrl=new AbortController();setTimeout(()=>ctrl.abort(),8000);
      var r=await fetch(full,{signal:ctrl.signal,cache:'no-store'});
      var txt=await r.text();
      var ms=Date.now()-t0;
      var ok=txt&&txt.includes('"observations"');
      var wrapped=txt&&txt.includes('"contents"')&&txt.includes('observations');
      results.push('<span style="color:'+(ok||wrapped?'var(--G)':'var(--R)')+'">['+(ok||wrapped?'OK':'FAIL')+'] '+p.slice(8,32)+'</span> '+(ok||wrapped?'('+ms+'ms':'FAIL: '+txt.slice(0,40)));
    }catch(e){results.push('<span style="color:var(--R)">[ERR] '+p.slice(8,32)+'</span> '+e.message.slice(0,50));}
  }
  if(el)el.innerHTML=results.join('<br>');
}
async function runFREDTest(){
  var el=document.getElementById('proxy-test-res');
  if(el)el.innerHTML='Testowanie FRED M2SL...';
  try{
    var txt=await proxyFetch(FAPI+'M2SL',12000);
    var preview=txt.slice(0,150).replace(/</g,'&lt;');
    if(el)el.innerHTML='<span style="color:var(--G)">OK — pierwsze 150 znakow:</span><br><code>'+preview+'</code>';
  }catch(e){
    if(el)el.innerHTML='<span style="color:var(--R)">BLAD: '+e.message+'</span><br>Sprobuj recznie: <a href="https://api.allorigins.win/raw?url='+encodeURIComponent(FAPI+'M2SL')+'" target="_blank" style="color:var(--B)">Test allorigins</a>';
  }
}
async function runFGTest(){
  var el=document.getElementById('proxy-test-res');
  if(el)el.innerHTML='Testowanie F&G CNN...';
  try{
    var txt=await proxyFetch('https://production.dataviz.cnn.io/index/fearandgreed/graphdata',10000);
    var preview=txt.slice(0,200).replace(/</g,'&lt;');
    if(el)el.innerHTML='<span style="color:var(--G)">F&G OK:</span><br><code>'+preview+'</code>';
  }catch(e){
    if(el)el.innerHTML='<span style="color:var(--R)">F&G BLAD: '+e.message+'</span>';
  }
}
