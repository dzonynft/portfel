<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>MacroTerminal v28</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📊</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/plotly.js/2.27.0/plotly.min.js"></script>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#030811;--bg1:#060e1c;--bg2:#0a1628;--bg3:#0e1f38;--bg4:#162645;
  --br:rgba(255,255,255,.055);--br2:rgba(255,255,255,.10);--br3:rgba(255,255,255,.17);
  --G:#00e5a8;--Gd:rgba(0,229,168,.09);--Gb:rgba(0,229,168,.22);
  --R:#ff3355;--Rd:rgba(255,51,85,.09);--Rb:rgba(255,51,85,.22);
  --Y:#f5c040;--Yd:rgba(245,192,64,.09);
  --B:#2a9df5;--Bd:rgba(42,157,245,.09);--Bb:rgba(42,157,245,.22);
  --V:#9b7ef8;--Vd:rgba(155,126,248,.09);
  --O:#ff7c3e;
  --t0:#dceeff;--t1:#5a82a8;--t2:#2e4f6e;--t3:#16303f;
  --sans:'Inter',sans-serif;--mono:'JetBrains Mono',monospace;
  --r:8px;--rl:12px;
}
html,body{height:100%;background:var(--bg);color:var(--t0);font-family:var(--mono);font-size:12px;overflow:hidden;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:3px;height:3px}::-webkit-scrollbar-thumb{background:var(--bg4)}

/* ── APP SHELL ── */
.app{display:grid;grid-template-rows:52px 28px 42px 1fr;height:100vh}

/* ── TOPBAR ── */
.topbar{background:rgba(3,8,17,.97);backdrop-filter:blur(20px);border-bottom:1px solid var(--br);display:flex;align-items:center;gap:14px;padding:0 22px;position:relative;z-index:200}
.topbar::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--G) 30%,var(--B) 70%,transparent);opacity:.4}
.logo{font-family:var(--sans);font-weight:700;font-size:13px;letter-spacing:.3px;color:var(--t0)}
.logo-tag{font-size:9px;color:var(--t2);letter-spacing:1px;font-weight:500;margin-left:4px}
.verdict-pill{padding:4px 16px;border-radius:4px;font-family:var(--sans);font-size:11px;font-weight:700;letter-spacing:.5px;border:1px solid;transition:all .4s;flex-shrink:0}
.topbar-score{display:flex;align-items:center;gap:5px;font-family:var(--sans)}
.ts-num{font-size:17px;font-weight:700;font-variant-numeric:tabular-nums;transition:color .4s}
.ts-denom{font-size:10px;color:var(--t2)}
.sdot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.s-ok{background:var(--G);box-shadow:0 0 7px var(--G)}
.s-ld{background:var(--Y);animation:blink 1s infinite}
.s-er{background:var(--R)}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.25}}
#smsg{font-size:10px;color:var(--t1);max-width:240px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tr{margin-left:auto;display:flex;align-items:center;gap:10px}
#clk{font-size:10px;color:var(--t2);font-variant-numeric:tabular-nums}
.btn{font-family:var(--mono);font-size:9.5px;font-weight:600;padding:5px 12px;border-radius:4px;border:1px solid var(--br2);background:transparent;color:var(--t1);cursor:pointer;transition:all .15s;letter-spacing:.4px}
.btn:hover{border-color:var(--br3);color:var(--t0);background:var(--bg3)}

/* ── TICKER ── */
.ticker{background:var(--bg1);border-bottom:1px solid var(--br);overflow:hidden;display:flex;align-items:center}
.tt{display:flex;white-space:nowrap;animation:scrl 130s linear infinite}
.tt:hover{animation-play-state:paused}
@keyframes scrl{to{transform:translateX(-50%)}}
.ti{display:inline-flex;align-items:center;gap:7px;padding:0 18px;border-right:1px solid var(--br);height:28px}
.tn{font-size:9px;color:var(--t2);letter-spacing:.5px}.tp{font-size:11px;font-weight:500;font-variant-numeric:tabular-nums}.tc{font-size:9px}
.up{color:var(--G)}.dn{color:var(--R)}.neu{color:var(--t1)}

/* ── TABS ── */
.tabs{background:var(--bg1);border-bottom:1px solid var(--br);display:flex;align-items:stretch;padding:0 8px}
.tab{font-family:var(--sans);font-size:10.5px;font-weight:600;letter-spacing:.3px;padding:0 15px;color:var(--t2);border:none;background:transparent;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s;white-space:nowrap}
.tab:hover{color:var(--t1)}.tab.on{color:var(--t0);border-bottom-color:var(--G)}
.tspc{flex:1}.lupd{font-size:9px;color:var(--t3);display:flex;align-items:center;padding-right:8px}

/* ── PANELS ── */
.panel{display:none;height:100%;overflow-y:auto;overflow-x:hidden}.panel.on{display:block}
.wrap{padding:16px 22px 28px}
.sec{font-family:var(--sans);font-size:9px;font-weight:700;letter-spacing:1.5px;color:var(--t2);text-transform:uppercase;margin:20px 0 10px;display:flex;align-items:center;gap:8px}
.sec:first-child{margin-top:0}.sec::after{content:'';flex:1;height:1px;background:var(--br)}

/* ── GRID ── */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:12px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:12px}
.g5{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:12px}

/* ── CARDS ── */
.card{background:var(--bg2);border:1px solid var(--br);border-radius:var(--r);transition:border-color .2s}
.card:hover{border-color:var(--br2)}
.card.G{border-left:2px solid var(--G)}.card.R{border-left:2px solid var(--R)}.card.Y{border-left:2px solid var(--Y)}.card.B{border-left:2px solid var(--B)}
.cp{padding:14px 16px}

/* ── KPI ── */
.kpi{padding:14px 16px}
.kl{font-family:var(--sans);font-size:8.5px;font-weight:700;letter-spacing:1.2px;color:var(--t2);text-transform:uppercase;margin-bottom:5px}
.kv{font-size:28px;font-weight:600;line-height:1;margin-bottom:2px;font-variant-numeric:tabular-nums;font-family:var(--sans)}
.ks{font-size:10px;color:var(--t1)}
.kbadge{display:inline-block;margin-top:6px;font-family:var(--sans);font-size:8.5px;font-weight:700;padding:2px 8px;border-radius:3px;letter-spacing:.4px}

/* ── HERO DECISION ── */
.hero{background:var(--bg2);border:1px solid var(--br2);border-radius:var(--rl);padding:22px 26px;margin-bottom:14px;position:relative;overflow:hidden;display:grid;grid-template-columns:1fr 220px;gap:24px;align-items:start}
.hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 50% 90% at 0% 50%,var(--vhg,rgba(0,229,168,.07)),transparent 60%);pointer-events:none}
.h-eye{font-family:var(--sans);font-size:9px;font-weight:700;letter-spacing:1.5px;color:var(--t2);text-transform:uppercase;margin-bottom:8px}
.h-word{font-family:var(--sans);font-size:46px;font-weight:700;line-height:1;letter-spacing:-1.5px;margin-bottom:10px;transition:color .5s}
.h-bar-row{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.h-track{width:180px;height:4px;background:rgba(255,255,255,.06);border-radius:99px;overflow:hidden}
.h-fill{height:4px;border-radius:99px;transition:width 1.2s cubic-bezier(.4,0,.2,1)}
.h-score{font-family:var(--sans);font-size:13px;font-weight:700}
.h-chips{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:14px}
.chip{font-family:var(--sans);font-size:9px;font-weight:700;padding:3px 9px;border-radius:3px;border:1px solid;white-space:nowrap;letter-spacing:.3px}
.cG{background:var(--Gd);color:var(--G);border-color:var(--Gb)}.cR{background:var(--Rd);color:var(--R);border-color:var(--Rb)}
.cY{background:var(--Yd);color:var(--Y);border-color:rgba(245,192,64,.3)}.cB{background:var(--Bd);color:var(--B);border-color:var(--Bb)}
.cV{background:var(--Vd);color:var(--V);border-color:rgba(155,126,248,.28)}
.h-rationale{font-size:11px;color:var(--t1);line-height:1.8;margin-top:12px;padding-top:12px;border-top:1px solid var(--br)}
.h-right{display:flex;flex-direction:column;gap:10px;position:relative}
/* ring */
.ring-box{background:var(--bg3);border:1px solid var(--br2);border-radius:var(--r);padding:14px 16px;display:flex;align-items:center;gap:14px}
.ring-wrap{position:relative;flex-shrink:0}
.ring-wrap svg{display:block;transform:rotate(-90deg)}
.ring-num{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-family:var(--sans);font-size:16px;font-weight:700;text-align:center}
.ri-v{font-family:var(--sans);font-size:20px;font-weight:700;line-height:1;margin-bottom:2px}
.ri-l{font-size:8.5px;color:var(--t2);letter-spacing:.5px;text-transform:uppercase;margin-bottom:5px}
.ri-s{font-size:9.5px;color:var(--t1);line-height:1.65}
/* score dims */
.sdims{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:12px}
.sdim{background:var(--bg2);border:1px solid var(--br);border-radius:var(--r);padding:10px 11px;text-align:center}
.sdim-l{font-family:var(--sans);font-size:8px;font-weight:700;letter-spacing:.5px;color:var(--t2);text-transform:uppercase;margin-bottom:5px}
.sdim-v{font-family:var(--sans);font-size:20px;font-weight:700;line-height:1;margin-bottom:2px}
.sdim-p{font-size:10px;color:var(--t1)}
.sdim-bar{height:3px;border-radius:99px;background:rgba(255,255,255,.06);margin-top:6px;overflow:hidden}
.sdim-f{height:3px;border-radius:99px}
/* dm */
.dmcard{background:var(--bg3);border:1px solid var(--br2);border-radius:var(--r);padding:11px 13px}
.dm-lbl{font-family:var(--sans);font-size:8px;font-weight:700;letter-spacing:1px;color:var(--t2);text-transform:uppercase;margin-bottom:4px}
.dm-sig{font-family:var(--sans);font-size:14px;font-weight:700;margin-bottom:5px}
.dm-n{font-size:9.5px;color:var(--t1);line-height:1.7}

/* ── GAUGE ── */
.gc{padding:14px 16px}
.gc-top{display:flex;justify-content:space-between;align-items:start;margin-bottom:6px}
.gc-l{font-family:var(--sans);font-size:8.5px;font-weight:700;letter-spacing:1px;color:var(--t2);text-transform:uppercase}
.gc-src{font-size:8px;color:var(--t3)}
.gc-v{font-size:30px;font-weight:600;line-height:1;margin-bottom:2px;font-variant-numeric:tabular-nums;font-family:var(--sans)}
.gc-st{font-family:var(--sans);font-size:9.5px;font-weight:700;letter-spacing:.3px;margin-bottom:9px}
.gc-track{position:relative;height:4px;background:rgba(255,255,255,.06);border-radius:99px;margin-bottom:3px}
.gc-fill{position:absolute;left:0;top:0;height:4px;border-radius:99px;background:linear-gradient(90deg,var(--R),var(--Y),var(--G));transition:width .9s}
.gc-pin{position:absolute;top:50%;transform:translate(-50%,-50%);width:10px;height:10px;border-radius:50%;background:#fff;border:2px solid var(--bg);box-shadow:0 0 0 1px rgba(255,255,255,.2);transition:left .9s}
.gc-ticks{display:flex;justify-content:space-between;font-size:8px;color:var(--t3);margin-top:2px}
.gc-ctx{display:grid;grid-template-columns:repeat(3,1fr);gap:4px;margin-top:8px}
.gcc{background:var(--bg3);border-radius:4px;padding:5px 6px;text-align:center}
.gcc-l{font-size:8px;color:var(--t2);margin-bottom:1px}.gcc-v{font-size:11.5px;font-weight:600;font-family:var(--sans)}
.gc-exp{font-size:9.5px;color:var(--t1);line-height:1.65;margin-top:9px;padding-top:9px;border-top:1px solid var(--br)}
/* returns table */
.fg-rets{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-top:8px}
.fgr{background:var(--bg3);border-radius:4px;padding:7px 9px;text-align:center}
.fgr-l{font-size:8px;color:var(--t2);margin-bottom:2px}
.fgr-v{font-family:var(--sans);font-size:14px;font-weight:700}

/* ── SPARKLINE ── */
.spark{display:flex;align-items:flex-end;gap:2px;height:34px}
.sb{flex:1;min-width:4px;border-radius:2px 2px 0 0;background:var(--bg4)}
.sbG{background:var(--G)}.sbR{background:var(--R)}.sbY{background:var(--Y)}

/* ── CRISIS CARDS ── */
.cg4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:12px}
.cc{background:var(--bg2);border:1px solid var(--br);border-radius:var(--r);padding:12px 14px;position:relative;overflow:hidden;transition:border-color .2s,transform .2s;cursor:default}
.cc:hover{transform:translateY(-2px);border-color:var(--br2)}
.cc::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px}
.cc-era{font-family:var(--sans);font-size:8.5px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;margin-bottom:2px}
.cc-title{font-family:var(--sans);font-size:12px;font-weight:700;margin-bottom:8px}
.cc-row{display:flex;justify-content:space-between;padding:3px 0;border-bottom:1px solid var(--br)}.cc-row:last-of-type{border:none}
.cc-k{font-size:8.5px;color:var(--t2)}.cc-v{font-size:9.5px;font-weight:600}
.cc-res{font-size:9px;color:var(--t1);line-height:1.6;margin-top:8px;padding-top:7px;border-top:1px solid var(--br)}
.cc-badge{display:inline-block;margin-top:5px;padding:2px 7px;border-radius:3px;font-size:8px;font-weight:700;letter-spacing:.5px;font-family:var(--sans)}

/* ── SIGNAL TABLE ── */
.sigtbl{background:var(--bg2);border:1px solid var(--br);border-radius:var(--r);overflow:hidden;margin-bottom:12px}
.sg-grp{padding:5px 13px;background:rgba(255,255,255,.02);font-family:var(--sans);font-size:8.5px;font-weight:700;letter-spacing:1px;color:var(--t2);text-transform:uppercase;border-bottom:1px solid var(--br)}
.sg-row{display:grid;grid-template-columns:1fr 80px 105px 1fr;align-items:center;padding:7px 13px;border-bottom:1px solid var(--br);transition:background .12s}
.sg-row:hover{background:rgba(255,255,255,.015)}.sg-row:last-child{border-bottom:none}
.sg-row.hd{background:var(--bg3);font-family:var(--sans);font-size:8.5px;color:var(--t2);letter-spacing:.5px;font-weight:600}
.sg-n{font-size:10.5px}.sg-v{font-size:11.5px;font-weight:600;text-align:center;font-variant-numeric:tabular-nums}
.pill{font-family:var(--sans);font-size:8.5px;font-weight:700;padding:2px 8px;border-radius:3px;text-align:center;display:inline-block;letter-spacing:.3px}
.pG{background:var(--Gd);color:var(--G);border:1px solid var(--Gb)}.pR{background:var(--Rd);color:var(--R);border:1px solid var(--Rb)}.pY{background:var(--Yd);color:var(--Y);border:1px solid rgba(245,192,64,.3)}
.sg-d{font-size:9.5px;color:var(--t2);padding-left:10px}

/* ── CHART BOX ── */
.chartbox{background:var(--bg2);border:1px solid var(--br);border-radius:var(--r);overflow:hidden;margin-bottom:12px}
.chdr{padding:10px 14px 0;display:flex;justify-content:space-between;align-items:center}
.ch-t{font-family:var(--sans);font-size:11px;font-weight:600;color:var(--t0)}
.ch-s{font-size:9px;color:var(--t2)}
.chbody{padding:4px 4px 0}

/* ── INDICATORS ── */
.igrid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:12px}
.ic{background:var(--bg2);border:1px solid var(--br);border-radius:var(--r);padding:12px 14px;transition:border-color .2s,transform .15s}
.ic:hover{border-color:var(--br2);transform:translateY(-1px)}
.ic.G{border-left:2px solid var(--G)}.ic.R{border-left:2px solid var(--R)}.ic.Y{border-left:2px solid var(--Y)}
.ic-h{display:flex;justify-content:space-between;margin-bottom:4px}
.ic-t{font-family:var(--sans);font-size:9.5px;font-weight:600;color:var(--t1)}.ic-s{font-size:8px;color:var(--t3)}
.ic-v{font-size:22px;font-weight:600;line-height:1;margin-bottom:2px;font-family:var(--sans)}
.ic-d{font-size:8.5px;color:var(--t2);margin-bottom:5px}
.ic-badge{font-family:var(--sans);font-size:8.5px;font-weight:700;padding:2px 7px;border-radius:3px;display:inline-block;margin-bottom:6px}
.ic-desc{font-size:9.5px;color:var(--t2);line-height:1.6;border-top:1px solid var(--br);padding-top:6px;margin-top:4px}
.ic-io{font-size:9.5px;line-height:1.7;margin-top:4px}

/* ── LINKS ── */
.lgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;margin-bottom:12px}
.lnk{display:block;padding:8px 10px;text-align:center;background:var(--bg2);border:1px solid var(--br);border-radius:var(--r);font-family:var(--sans);font-size:9.5px;font-weight:600;color:var(--B);text-decoration:none;transition:all .15s}
.lnk:hover{border-color:var(--Bb);background:var(--Bd);transform:translateY(-1px)}

/* ── LIQUIDITY LAYERS ── */
.llayers{background:var(--bg2);border:1px solid var(--br);border-radius:var(--r);overflow:hidden;margin-bottom:12px}
.ll{padding:12px 15px;border-bottom:1px solid var(--br);display:grid;grid-template-columns:72px 1fr 165px;gap:11px;align-items:start}
.ll:last-child{border-bottom:none}
.ll-tag{font-family:var(--sans);font-size:18px;font-weight:700}.ll-sub{font-size:8px;color:var(--t2);letter-spacing:.5px;margin-top:2px;font-weight:600}
.ll-def{font-size:10px;color:var(--t1);line-height:1.7}
.ll-sig{font-size:9.5px;padding:6px 9px;border-radius:4px;line-height:1.6}
.liqcyc{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:12px}
.lyc{background:var(--bg2);border:1px solid var(--br);border-radius:var(--r);padding:11px 13px}
.lyc-n{font-family:var(--sans);font-size:20px;font-weight:700;margin-bottom:3px}
.lyc-t{font-family:var(--sans);font-size:10.5px;font-weight:700;margin-bottom:4px}
.lyc-d{font-size:9.5px;color:var(--t2);line-height:1.65}
.lyc-a{font-family:var(--sans);font-size:9.5px;font-weight:700;margin-top:6px;padding:3px 8px;border-radius:3px}

/* ── COT ── */
.cot-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:12px}
.ca{background:var(--bg2);border:1px solid var(--br);border-radius:var(--r);padding:13px 14px}
.ca-n{font-family:var(--sans);font-size:11.5px;font-weight:700;margin-bottom:2px}
.ca-sub{font-size:8px;color:var(--t2);letter-spacing:.5px;text-transform:uppercase;margin-bottom:7px;font-weight:600}
.ca-d{font-size:10px;color:var(--t1);line-height:1.65}
.ca-rule{font-size:9.5px;font-weight:600;margin-top:7px;padding:5px 8px;border-radius:4px;line-height:1.4}
.cotm{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.cm{background:var(--bg2);border:1px solid var(--br);border-radius:var(--r);padding:13px 14px}
.cm-h{display:flex;justify-content:space-between;margin-bottom:9px}
.cm-n{font-family:var(--sans);font-size:12px;font-weight:700}.cm-c{font-size:8.5px;color:var(--t3)}
.cm-bar-row{display:grid;grid-template-columns:92px 1fr 46px;align-items:center;gap:6px;margin-bottom:6px}
.cm-bl{font-size:9px;color:var(--t1);font-weight:600}
.cm-track{height:5px;background:rgba(255,255,255,.05);border-radius:99px;overflow:hidden}
.cm-f{height:5px;border-radius:99px}
.cm-bv{font-size:9px;font-weight:700;text-align:right;font-variant-numeric:tabular-nums}
.cm-sig{font-family:var(--sans);font-size:9.5px;font-weight:700;margin-top:8px;padding:5px 8px;border-radius:4px;line-height:1.5}
.cm-note{font-size:9.5px;color:var(--t2);line-height:1.6;margin-top:6px}

/* ── PORTFOLIO ── */
.dmbar{border-radius:var(--r);padding:12px 15px;display:flex;align-items:center;gap:14px;flex-wrap:wrap;margin-bottom:12px}
.dmbar.bull{background:rgba(0,229,168,.05);border:1px solid rgba(0,229,168,.15)}
.dmbar.bear{background:rgba(245,192,64,.05);border:1px solid rgba(245,192,64,.15)}
.dml{font-family:var(--sans);font-size:8.5px;font-weight:700;letter-spacing:1px;color:var(--t2);text-transform:uppercase;margin-bottom:3px}
.dms{font-family:var(--sans);font-size:18px;font-weight:700}
.dmn{font-size:10px;color:var(--t1);line-height:1.7}
.pgrid{display:grid;grid-template-columns:repeat(5,1fr);gap:9px;margin-bottom:12px}
.pc{background:var(--bg2);border:1px solid var(--br);border-radius:var(--r);padding:10px 9px;text-align:center;transition:all .2s}
.pc:hover{transform:translateY(-2px);border-color:var(--br2)}
.pc-id{font-family:var(--sans);font-size:15px;font-weight:700;margin-bottom:2px}
.pc-nm{font-size:8.5px;color:var(--t1);margin-bottom:5px}
.pc-b{font-family:var(--sans);font-size:11.5px;font-weight:700;margin-bottom:4px}
.pc-tp{font-size:7.5px;font-weight:700;padding:1px 6px;border-radius:2px;display:inline-block;margin-bottom:5px}
.pc-et{font-size:8px;color:var(--t2);line-height:1.6;margin-bottom:5px}
.pc-dm{font-size:9.5px;font-weight:700}
.tblwrap{background:var(--bg2);border:1px solid var(--br);border-radius:var(--r);overflow:hidden;margin-bottom:12px}
.stbl{width:100%;border-collapse:collapse;font-size:10.5px}
.stbl th{background:var(--bg3);color:var(--t2);padding:6px 11px;text-align:left;font-family:var(--sans);font-size:8px;font-weight:700;letter-spacing:.5px;border-bottom:1px solid var(--br)}
.stbl td{padding:6px 11px;border-bottom:1px solid var(--br);color:var(--t1)}
.stbl tr:hover td{background:rgba(255,255,255,.015)}.stbl tr:last-child td{border-bottom:none}
.ptag{padding:1px 6px;border-radius:2px;font-weight:700;font-size:8.5px}
.rcbox{background:var(--bg2);border:1px solid var(--br);border-radius:var(--r);padding:10px 13px;font-size:10px;color:var(--t2);line-height:1.9;margin-bottom:12px}
.rcbox b{color:var(--t0)}
.rbar{display:flex;gap:2px;align-items:center}
.rs{width:6px;height:6px;border-radius:1px;background:var(--bg4)}

/* ── JOURNAL ── */
.jtop{display:flex;gap:10px;margin-bottom:12px;align-items:start}
.jtop textarea{flex:1;background:var(--bg2);border:1px solid var(--br);border-radius:var(--r);color:var(--t0);font-family:var(--mono);font-size:11px;padding:10px 12px;resize:vertical;min-height:78px;outline:none;transition:border-color .2s}
.jtop textarea:focus{border-color:var(--br2)}.jtop textarea::placeholder{color:var(--t3)}
.jmeta{display:flex;flex-direction:column;gap:7px;min-width:160px}
.jsel{background:var(--bg2);border:1px solid var(--br);border-radius:var(--r);color:var(--t1);font-family:var(--mono);font-size:10px;padding:5px 8px;outline:none;cursor:pointer}
.jbtn{font-family:var(--sans);font-size:10px;font-weight:700;padding:7px 14px;border-radius:4px;border:1px solid var(--Gb);background:var(--Gd);color:var(--G);cursor:pointer;transition:all .15s;letter-spacing:.3px}
.jbtn:hover{background:rgba(0,229,168,.16)}
.jlist{display:flex;flex-direction:column;gap:8px}
.je{background:var(--bg2);border:1px solid var(--br);border-radius:var(--r);padding:12px 14px}
.je-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.je-dt{font-size:9px;color:var(--t2);font-variant-numeric:tabular-nums}
.je-tag{font-family:var(--sans);font-size:8.5px;font-weight:700;padding:2px 7px;border-radius:2px}
.je-body{font-size:11px;color:var(--t1);line-height:1.7}
.je-score{font-size:10px;color:var(--t2);margin-top:5px}
.jdel{font-size:9px;background:transparent;border:none;color:var(--t3);cursor:pointer;padding:2px 5px;transition:color .15s}
.jdel:hover{color:var(--R)}

/* ── SOURCES ── */
.src-list{display:flex;flex-direction:column;gap:9px}
.sri{background:var(--bg2);border:1px solid var(--br);border-radius:var(--r);padding:12px 14px;display:grid;grid-template-columns:1fr 80px 110px;gap:10px;align-items:center}
.sri-name{font-family:var(--sans);font-size:11px;font-weight:600;margin-bottom:2px}
.sri-url{font-size:9px;color:var(--t2);word-break:break-all}
.sri-desc{font-size:8.5px;color:var(--t3);margin-top:2px}
.ss{font-family:var(--sans);font-size:8.5px;font-weight:700;padding:3px 8px;border-radius:3px;text-align:center;display:inline-block}
.ss-live{background:var(--Gd);color:var(--G)}.ss-fail{background:var(--Rd);color:var(--R)}.ss-static{background:var(--Yd);color:var(--Y)}.ss-unused{background:var(--bg4);color:var(--t2)}
.src-actions{display:flex;flex-direction:column;gap:4px}
.bts{font-family:var(--mono);font-size:8px;font-weight:600;padding:3px 8px;border-radius:3px;border:1px solid var(--br2);background:transparent;color:var(--t1);cursor:pointer;transition:all .12s;letter-spacing:.3px}
.bts:hover{color:var(--t0);background:var(--bg3)}
.cform{background:var(--bg2);border:1px solid var(--br2);border-radius:var(--r);padding:14px 16px;margin-top:12px}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:8px}
.ff{display:flex;flex-direction:column;gap:4px}
.ff label{font-family:var(--sans);font-size:8.5px;font-weight:700;letter-spacing:.5px;color:var(--t2);text-transform:uppercase}
.ff input,.ff select{background:var(--bg3);border:1px solid var(--br);border-radius:4px;color:var(--t0);font-family:var(--mono);font-size:10.5px;padding:6px 9px;outline:none;transition:border-color .2s}
.ff input:focus,.ff select:focus{border-color:var(--br2)}
.tres{margin-top:8px;font-size:10px;padding:7px 10px;border-radius:4px;display:none}
.tok{background:var(--Gd);color:var(--G)}.tfail{background:var(--Rd);color:var(--R)}

/* ── DATA PANEL ── */
.dstats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:12px}
.ds{background:var(--bg2);border:1px solid var(--br);border-radius:var(--r);padding:13px 15px}
.ds-l{font-family:var(--sans);font-size:8.5px;font-weight:700;letter-spacing:1px;color:var(--t2);text-transform:uppercase;margin-bottom:6px}
.ds-n{font-family:var(--sans);font-size:26px;font-weight:700;line-height:1;margin-bottom:2px}
.ds-s{font-size:9.5px;color:var(--t2)}
.logbox{background:var(--bg1);border:1px solid var(--br);border-radius:var(--r);padding:10px 12px;font-size:9.5px;line-height:1.9;max-height:320px;overflow-y:auto}
.lr{display:flex;gap:8px;padding:1px 0;border-bottom:1px solid rgba(255,255,255,.02)}
.lts{color:var(--t3);flex-shrink:0;font-size:8.5px;width:52px;font-variant-numeric:tabular-nums}
.lic{flex-shrink:0;width:10px;text-align:center}.lmsg{color:var(--t1);font-size:9.5px}

/* ── ANIM ── */
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.fu{animation:fadeUp .3s ease both}
.ldg{display:flex;flex-direction:column;align-items:center;justify-content:center;height:260px;gap:12px}
.spin{width:24px;height:24px;border-radius:50%;border:2px solid var(--bg3);border-top-color:var(--G);animation:sp .7s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.js-plotly-plot .plotly .main-svg{background:transparent!important}

<div class="app">

<script>
'use strict';
/* ═══════════════════════════════════════════════════════════
   MacroTerminal v28 — Professional Investment Decision System
   
   DATA SOURCES:
   - stooq.com       → price CSV for all assets
   - FRED St. Louis  → M2, Fed rate, WALCL, SOFRVOL, VIX, etc.
   - CNN dataviz     → Fear & Greed Index live
   - alternative.me  → Crypto Fear & Greed 30d
   - treasury.gov    → US public debt
   
   ALL fetches routed via Cloudflare Worker proxy:
   https://portfel.dzonyiks.workers.dev
   
   SCORING: 5 dimensions × (−10…+10) each
   Sentiment + Liquidity + Positioning + Cycle + Momentum
   Sum −50…+50 → mapped to verdict & 0-100 display score
═══════════════════════════════════════════════════════════ */

/* ── SOURCES CONFIG (user-editable at runtime) ── */
var SRCS = {
  proxy:    { name:'Cloudflare CORS Proxy', url:'https://portfel.dzonyiks.workers.dev', desc:'Routes all fetches — bypasses browser CORS', status:'live', editable:false },
  stooq:    { name:'stooq.com', url:'https://stooq.com/q/d/l/', desc:'Daily CSV: indices, FX, commodities, ETF', status:'unknown', editable:false },
  fred:     { name:'FRED St. Louis Fed', url:'https://fred.stlouisfed.org/graph/fredgraph.csv', desc:'Macro: M2, WALCL, SOFRVOL, VIX, Sahm, HY, RRP…', status:'unknown', editable:false },
  cnn:      { name:'CNN Fear & Greed', url:'https://production.dataviz.cnn.io/index/fearandgreed/graphdata', desc:'Live F&G score + history', status:'unknown', editable:false },
  cryptofg: { name:'alternative.me', url:'https://api.alternative.me/fng/?limit=30&format=json', desc:'Crypto Fear & Greed 30d', status:'unknown', editable:false },
  treasury: { name:'fiscaldata.treasury.gov', url:'https://api.fiscaldata.treasury.gov/services/api/fiscal_service/v2/accounting/od/debt_to_penny', desc:'US national debt outstanding', status:'unknown', editable:false },
  cftc:     { name:'CFTC.gov COT', url:'https://www.cftc.gov/MarketReports/CommitmentsofTraders/index.htm', desc:'Commitments of Traders — structural reference', status:'static', editable:false },
  custom1:  { name:'Własne źródło 1', url:'', desc:'Dodaj własny URL do testów', status:'unused', editable:true },
  custom2:  { name:'Własne źródło 2', url:'', desc:'Dodaj własny URL do testów', status:'unused', editable:true },
};
var PROXY = SRCS.proxy.url;

/* ── STATE ── */
var D = { q:{}, f:{}, fg:null, cfg:null, treasury:null, sp12m:null, sp12m_src:'—' };
var LOG = [], SC = null;
var JRN_KEY = 'mt28_journal';

/* ── STATIC FALLBACKS (verified Mar 2026) ── */
var ST = { fed:3.75, fedDate:'Gru 2025', ism:52.4, ismDate:'Lut 2026', cape:36.2, buffett:196 };

/* ── LOGGING ── */
function setS(state, msg) {
  var d = document.getElementById('sd'), t = document.getElementById('smsg');
  if (d) d.className = 'sdot '+(state==='ok'?'s-ok':state==='er'?'s-er':'s-ld');
  if (t) t.textContent = (msg||'').slice(0,68);
  LOG.unshift({ts:new Date().toLocaleTimeString('pl-PL'), state:state, msg:msg||''});
  if (LOG.length > 160) LOG.pop();
}
setInterval(function(){
  var e = document.getElementById('clk');
  if (e) e.textContent = new Date().toLocaleString('pl-PL',{weekday:'short',day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit',second:'2-digit'});
},1000);

/* ── FORMATTERS ── */
function fN(v,d){ d=d==null?2:d; return(v==null||isNaN(v))?'—':Number(v).toLocaleString('pl-PL',{minimumFractionDigits:d,maximumFractionDigits:d}); }
function fP(p){ if(p==null)return'—'; return(p>=0?'+':'')+Number(p).toFixed(2)+'%'; }
function dC(p){ return p>0?'up':p<0?'dn':'neu'; }
function pS(v){ if(v==null)return'—'; return(v>=0?'+':'')+Number(v).toFixed(1)+'%'; }
function fgC(s){ if(s==null)return'#5a82a8'; if(s<=24)return'#ff3355'; if(s<=44)return'#ff7c3e'; if(s<=55)return'#f5c040'; return'#00e5a8'; }
function fgL(s){ if(s==null)return'—'; if(s<=24)return'EXTREME FEAR'; if(s<=44)return'FEAR'; if(s<=55)return'NEUTRAL'; if(s<=74)return'GREED'; return'EXTREME GREED'; }

/* ═══════════════════════════════
   FETCH LAYER
═══════════════════════════════ */
async function pGet(url, ms) {
  ms = ms||14000;
  var full = PROXY+'?url='+encodeURIComponent(url);
  var ctrl = new AbortController();
  var timer = setTimeout(function(){ ctrl.abort(); }, ms);
  try {
    var r = await fetch(full, {signal:ctrl.signal});
    clearTimeout(timer);
    if (!r.ok) throw new Error('HTTP '+r.status);
    return r;
  } catch(e) { clearTimeout(timer); throw e; }
}

/* stooq symbols */
var SQ = {
  sp500:'^spx',nasdaq:'^ndx',dj:'^dji',
  gold:'xauusd',silver:'xagusd',oil:'cl.f',natgas:'ng.f',copper:'hg.f',
  usdpln:'usdpln',eurpln:'eurpln',eurusd:'eurusd',gbpusd:'gbpusd',usdjpy:'usdjpy',dxy:'dxy',
  us10y:'10usy.b',us2y:'2usy.b',
  btcusd:'btcusd',ethusd:'ethusd',wig20:'wig20',vix:'^vix',
  isac:'isac.uk',spy:'spy.us',qqq:'qqq.us'
};
async function sOne(sym) {
  var r = await pGet('https://stooq.com/q/d/l/?s='+encodeURIComponent(sym)+'&i=d', 11000);
  var txt = await r.text();
  if (!txt || txt.indexOf('No data')!==-1 || txt.trim().length<20) throw new Error('no data');
  var lines = txt.trim().split('\n').filter(function(l){ return l && l.indexOf('Date')===-1; });
  if (!lines.length) throw new Error('empty');
  function pl(l){ var a=l.split(','); return{close:parseFloat(a[4]),date:a[0]}; }
  var last=pl(lines[lines.length-1]), prev=lines.length>1?pl(lines[lines.length-2]):last;
  if (isNaN(last.close)) throw new Error('NaN');
  return{price:last.close,prev:prev.close,change:prev.close?(last.close-prev.close)/prev.close*100:0,date:last.date};
}
async function fetchStooq() {
  setS('ld','Stooq: pobieranie kursów…');
  var keys=Object.keys(SQ);
  var res=await Promise.allSettled(keys.map(function(k){ return sOne(SQ[k]); }));
  D.q={}; var ok=0,fail=0;
  res.forEach(function(r,i){ if(r.status==='fulfilled'){D.q[keys[i]]=r.value;ok++;}else{fail++;} });
  SRCS.stooq.status=ok>10?'live':'partial';
  setS(ok>10?'ok':'er','Stooq: '+ok+' OK, '+fail+' err');
}
async function fetchSP12M() {
  try {
    var now=new Date(),ya=new Date(now); ya.setFullYear(ya.getFullYear()-1);
    function d8(d){ return d.getFullYear()+String(d.getMonth()+1).padStart(2,'0')+String(d.getDate()).padStart(2,'0'); }
    var r=await pGet('https://stooq.com/q/d/l/?s=%5Espx&d1='+d8(ya)+'&d2='+d8(now)+'&i=w',12000);
    var txt=await r.text();
    if (!txt||txt.indexOf('No data')!==-1) throw new Error('no data');
    var lines=txt.trim().split('\n').filter(function(l){ return l&&l.indexOf('Date')===-1; });
    if (lines.length<2) throw new Error('too few');
    function pv(l){ return parseFloat(l.split(',')[4]); }
    var first=pv(lines[0]),last=pv(lines[lines.length-1]);
    if (!first||!last||isNaN(first)||isNaN(last)) throw new Error('NaN');
    D.sp12m=(last-first)/first*100; D.sp12m_src='stooq weekly 1Y';
  } catch(e){ D.sp12m=null; D.sp12m_src='err:'+e.message; }
}

/* FRED series map */
var FM = {
  fedfunds:'FEDFUNDS',m2:'M2SL',yield_curve:'T10Y2Y',fed_bs:'WALCL',
  cpi:'CPIAUCSL',core_cpi:'CPILFESL',tips10y:'T10YIE',unrate:'UNRATE',
  sahm:'SAHMREALTIME',jolts:'JTSJOL',hy_spread:'BAMLH0A0HYM2',
  nfci:'NFCI',indprod:'INDPRO',vixfred:'VIXCLS',sp500fred:'SP500',
  ib01_yield:'DGS1MO',sofr:'SOFRVOL',rrp:'RRPONTSYD',move:'MOVE'
};
async function fOne(id) {
  var r=await pGet('https://fred.stlouisfed.org/graph/fredgraph.csv?id='+id,18000);
  var txt=await r.text();
  if (txt.trim().charAt(0)==='<') throw new Error('got HTML');
  var rows=txt.trim().split('\n').slice(1).map(function(l){
    var p=l.split(','),d=(p[0]||'').trim(),v=(p[1]||'').trim();
    return{date:d,val:(v==='.'||v==='')?null:parseFloat(v)};
  }).filter(function(x){ return x.date&&x.val!==null&&isFinite(x.val); });
  if (!rows.length) throw new Error('empty');
  var last=rows[rows.length-1],p1=rows.length>1?rows[rows.length-2]:last;
  var p3=rows.length>3?rows[rows.length-4]:rows[0];
  var p6=rows.length>6?rows[rows.length-7]:rows[0];
  var p12=rows.length>12?rows[rows.length-13]:rows[0];
  return{
    current:last.val,date:last.date,prev:p1.val,
    trend3m:p3.val&&p3.val!==0?(last.val-p3.val)/Math.abs(p3.val)*100:null,
    trend6m:p6.val&&p6.val!==0?(last.val-p6.val)/Math.abs(p6.val)*100:null,
    yoy:p12.val&&p12.val!==0?(last.val-p12.val)/Math.abs(p12.val)*100:null,
    series:rows.slice(-60)
  };
}
async function fetchFred() {
  setS('ld','FRED: dane makroekonomiczne…');
  D.f={}; var keys=Object.keys(FM); var ok=0,fail=0;
  for (var i=0;i<keys.length;i+=3) {
    var batch=keys.slice(i,i+3);
    setS('ld','FRED '+(Math.floor(i/3)+1)+'/'+Math.ceil(keys.length/3)+': '+batch.join(', '));
    var res=await Promise.allSettled(batch.map(function(k){ return fOne(FM[k]); }));
    res.forEach(function(r,j){
      if(r.status==='fulfilled'){D.f[batch[j]]=r.value;ok++;}
      else{fail++;setS('er','FRED '+FM[batch[j]]+': '+(r.reason&&r.reason.message||'?'));}
    });
    if (i+3<keys.length) await new Promise(function(res){ setTimeout(res,145); });
  }
  if (!D.q.vix&&D.f.vixfred) D.q.vix={price:D.f.vixfred.current,prev:D.f.vixfred.prev,change:0,date:D.f.vixfred.date};
  SRCS.fred.status=ok>12?'live':'partial';
  setS(ok>12?'ok':'er','FRED: '+ok+' OK, '+fail+' err');
}

async function fetchFG() {
  setS('ld','F&G CNN…'); D.fg=null;
  /* CNN primary */
  try {
    var r=await pGet('https://production.dataviz.cnn.io/index/fearandgreed/graphdata',10000);
    var txt=await r.text();
    if (txt.trim().charAt(0)==='<') throw new Error('HTML response');
    var j=JSON.parse(txt), fg=j.fear_and_greed||j;
    var score=Math.round(parseFloat(fg.score||fg.current_value||0));
    if (score>0&&score<=100){
      D.fg={score:score,prev_close:Math.round(parseFloat(fg.previous_close||0))||null,prev_week:Math.round(parseFloat(fg.previous_1_week||0))||null,prev_month:Math.round(parseFloat(fg.previous_1_month||0))||null,source:'CNN'};
      SRCS.cnn.status='live'; setS('ok','F&G CNN: '+score); return;
    }
    throw new Error('invalid score');

/* ═══════════════════════════════
   SCORING ENGINE — 5 dimensions
═══════════════════════════════ */
function calcScore() {
  var q=D.q||{},f=D.f||{};
  var vix=(q.vix&&q.vix.price)||(f.vixfred&&f.vixfred.current)||29.5;
  var fg=D.fg?D.fg.score:null;
  var sp12m=D.sp12m!=null?D.sp12m:((f.sp500fred&&f.sp500fred.yoy!=null)?f.sp500fred.yoy:17.7);
  var ib01=(f.ib01_yield&&f.ib01_yield.current!=null)?f.ib01_yield.current:4.15;
  var sahm=(f.sahm&&f.sahm.current!=null)?f.sahm.current:0.30;
  var yc=(f.yield_curve&&f.yield_curve.current!=null)?f.yield_curve.current:null;
  var hy=(f.hy_spread&&f.hy_spread.current!=null)?f.hy_spread.current:2.84;
  var fed=(f.fedfunds&&f.fedfunds.current!=null)?f.fedfunds.current:ST.fed;
  var cpi=(f.cpi&&f.cpi.yoy!=null)?f.cpi.yoy:null;
  var m2yoy=(f.m2&&f.m2.yoy!=null)?f.m2.yoy:null;
  var sofrT3=(f.sofr&&f.sofr.trend3m!=null)?f.sofr.trend3m:null;
  var sofrT6=(f.sofr&&f.sofr.trend6m!=null)?f.sofr.trend6m:null;
  var move=(f.move&&f.move.current!=null)?f.move.current:null;

  /* 1. SENTYMENT */
  var s1=0;
  if(vix>=40)s1=10;else if(vix>=30)s1=7;else if(vix>=20)s1=3;else if(vix>=15)s1=0;else s1=-5;
  var fg_p=0;
  if(fg!=null){if(fg<=20)fg_p=10;else if(fg<=40)fg_p=5;else if(fg<=60)fg_p=0;else if(fg<=80)fg_p=-5;else fg_p=-10;}
  s1=Math.max(-10,Math.min(10,Math.round((s1+fg_p)/2)));
  if(move!=null){if(move>140)s1=Math.min(10,s1+3);else if(move<70)s1=Math.max(-10,s1-2);}

  /* 2. PŁYNNOŚĆ */
  var s2=0;
  if(m2yoy!=null){if(m2yoy>6)s2+=5;else if(m2yoy>3)s2+=3;else if(m2yoy<0)s2-=5;}
  if(sofrT3!=null){if(sofrT3>5)s2+=3;else if(sofrT3<-10)s2-=3;}
  if(sofrT6!=null){if(sofrT6>5)s2+=2;else if(sofrT6<-10)s2-=2;}
  if(fed<3)s2+=2;else if(fed>5)s2-=2;
  s2=Math.max(-10,Math.min(10,s2));

  /* 3. POSITIONING (COT proxy from VIX pattern + yield curve) */
  var s3=0;
  if(vix>=40)s3=10;else if(vix>=30)s3=7;else if(vix>=25)s3=4;else if(vix>=20)s3=1;else if(vix<15)s3=-5;
  if(yc!=null){if(yc>0.5)s3=Math.min(10,s3+1);else if(yc<-0.2)s3=Math.max(-10,s3-2);}
  s3=Math.max(-10,Math.min(10,s3));

  /* 4. CYKL */
  var s4=0;
  if(sahm<0.3)s4+=4;else if(sahm>0.5)s4-=6;
  if(hy<3.5)s4+=3;else if(hy>6)s4-=5;
  if(ST.ism>52)s4+=2;else if(ST.ism<47)s4-=3;
  s4=Math.max(-10,Math.min(10,s4));

  /* 5. MOMENTUM */
  var s5=0;
  if(sp12m>ib01)s5+=6;else s5-=4;
  if(ST.cape<20)s5+=2;else if(ST.cape>35)s5-=3;
  if(cpi!=null){if(cpi<2.5)s5+=2;else if(cpi>4)s5-=3;}
  s5=Math.max(-10,Math.min(10,s5));

  var total=s1+s2+s3+s4+s5;
  var norm=Math.round((total+50)/100*100);
  var verdict,color,vhg;
  if(total>=20){verdict='KUP';color='#00e5a8';vhg='rgba(0,229,168,.09)';}
  else if(total>=5){verdict='AKUMULUJ';color='#00e5a8';vhg='rgba(0,229,168,.07)';}
  else if(total>=-5){verdict='NEUTRALNIE';color='#f5c040';vhg='rgba(245,192,64,.07)';}
  else if(total>=-20){verdict='REDUKUJ';color='#ff7c3e';vhg='rgba(255,124,62,.07)';}
  else{verdict='SPRZEDAJ';color='#ff3355';vhg='rgba(255,51,85,.08)';}
  if(vix>=28&&total>=-10){verdict='KUP (PANIKA)';color='#00e5a8';vhg='rgba(0,229,168,.12)';}

  var dims=[
    {label:'Sentyment',pts:s1,v:fg!=null?String(fg):vix.toFixed(0),sub:'VIX/F&G',max:10},
    {label:'Płynność',pts:s2,v:m2yoy!=null?pS(m2yoy):'—',sub:'M2 YoY',max:10},
    {label:'Positioning',pts:s3,v:vix.toFixed(1),sub:'COT/VIX',max:10},
    {label:'Cykl',pts:s4,v:sahm.toFixed(2),sub:'Sahm/HY',max:10},
    {label:'Momentum',pts:s5,v:pS(sp12m),sub:'DM/CAPE',max:10},
  ];
  SC={total:total,norm:norm,verdict:verdict,color:color,vhg:vhg,dims:dims,vix:vix,fg:fg,sp12m:sp12m,ib01:ib01,dm_bull:sp12m>ib01,sahm:sahm,yc:yc,hy:hy,fed:fed,cpi:cpi,m2yoy:m2yoy};

  /* update topbar */
  var vp=document.getElementById('vp');
  if(vp){
    vp.textContent=verdict;
    var bc=total>=5?'rgba(0,229,168,.1)':total>=-5?'rgba(245,192,64,.08)':'rgba(255,51,85,.1)';
    var brd=total>=5?'rgba(0,229,168,.3)':total>=-5?'rgba(245,192,64,.25)':'rgba(255,51,85,.28)';
    vp.style.background=bc;vp.style.color=color;vp.style.borderColor=brd;
  }
  var tsn=document.getElementById('tsn');
  if(tsn){tsn.textContent=norm;tsn.style.color=color;}
  return SC;
}

  /* ring */
  var R=34,Ci=2*Math.PI*R,dash=sc.norm/100*Ci;
  /* score dims */
  var dimH=sc.dims.map(function(d){
    var pct=Math.round((d.pts+10)/20*100),c=d.pts>=0?'#00e5a8':'#ff3355';
    return '<div class="sdim"><div class="sdim-l">'+d.label+'</div><div class="sdim-v" style="color:'+c+'">'+d.v+'</div><div class="sdim-p" style="color:'+c+'">'+(d.pts>=0?'+':'')+d.pts+' pkt</div><div class="sdim-bar"><div class="sdim-f" style="width:'+pct+'%;background:'+c+'"></div></div><div style="font-size:8px;color:var(--t2);margin-top:3px">'+d.sub+'</div></div>';
  }).join('');
  /* rationale */
  var bull=[],bear=[];
  if(sc.vix>=28)bull.push('VIX '+sc.vix.toFixed(0)+' (panika=okazja)');
  if(sc.fg!=null&&sc.fg<=35)bull.push('F&G='+sc.fg+' strach');
  if(sc.dm_bull)bull.push('Dual Momentum byczo');
  if(sc.sahm<0.3)bull.push('Brak recesji Sahm='+sc.sahm.toFixed(2));
  if(sc.hy<3.5)bull.push('Risk-on HY='+sc.hy.toFixed(2)+'%');
  if(sc.vix<18)bear.push('VIX='+sc.vix.toFixed(0)+' euforia');
  if(sc.fg!=null&&sc.fg>=65)bear.push('F&G='+sc.fg+' chciwość');
  if(!sc.dm_bull)bear.push('SP500&lt;IB01 (momentum niedźwiedzi)');
  if(sc.sahm>=0.5)bear.push('Sahm='+sc.sahm.toFixed(2)+' RECESJA');
  if(ST.cape>35)bear.push('CAPE='+ST.cape+'x drogie');
  var rat='';
  if(bull.length)rat+='<span style="color:var(--G)">▲ '+(bull.join(' · '))+'.</span><br>';
  if(bear.length)rat+='<span style="color:var(--R)">▼ '+(bear.join(' · '))+'.</span><br>';
  var vixCtx=sc.vix>=40?'Panika jak 2020/2008':sc.vix>=28?'Podwyższony jak 2018/2022':sc.vix>=20?'Umiarkowany (2011-like)':'Niski jak Q4 2021 — uwaga';
  rat+='<br><b style="color:var(--t0)">Kontekst:</b> VIX '+sc.vix.toFixed(1)+' — '+vixCtx+'. '+(sc.dm_bull?'Dual Momentum: SP500 &gt; IB01 → DCA w ISAC/VWCE.':'Dual Momentum: SP500 &lt; IB01 → przesuń do IB01.')+'<br><b style="color:var(--Y)">Avg czas od VIX &gt; 28 do lokalnego dołka: 2–5 tygodni (historia: 2011, 2018, 2022).</b>';
  /* crisis grid */
  var crH=CRISES.map(function(c,idx){
    var rows=c.rows.map(function(r){return'<div class="cc-row"><span class="cc-k">'+r[0]+'</span><span class="cc-v" style="color:'+(c.isNow?'var(--Y)':'var(--t0)')+'">'+r[1]+'</span></div>';}).join('');
    var badge=c.badge?('<span class="cc-badge" style="background:'+c.bc+';color:'+c.color+';border:1px solid '+c.color+'40">'+c.badge+'</span>'):'';
    return '<style>.cc:nth-of-type('+(idx+1)+')::after{background:'+c.color+'}</style><div class="cc"><div class="cc-era" style="color:'+c.color+'">'+c.era+'</div><div class="cc-title">'+c.title+'</div>'+rows+'<div class="cc-res" style="color:'+c.color+'">'+c.res+'</div>'+badge+'</div>';
  }).join('');
  /* sig table */
  var sigsData=[
    {g:'Sentyment',sigs:[
      {n:'VIX',v:sc.vix.toFixed(1),s:sc.vix>=28?1:sc.vix<18?-1:0,d:'Kontrariański: >28=panika=okazja DCA · <15=euforia'},
      {n:'Fear&Greed',v:sc.fg!=null?String(sc.fg):'?',s:sc.fg!=null?(sc.fg<=35?1:sc.fg>=65?-1:0):0,d:'≤35=strach=kupuj · ≥65=chciwość=uwaga'},
    ]},
    {g:'Płynność',sigs:[
      {n:'M2 YoY',v:sc.m2yoy!=null?pS(sc.m2yoy):'?',s:sc.m2yoy!=null?(sc.m2yoy>3?1:sc.m2yoy<0?-1:0):0,d:'>3%=płynność rośnie · <0%=kontrakcja (2022!)'},
      {n:'Fed Rate',v:sc.fed.toFixed(2)+'%',s:sc.fed<3?1:sc.fed>5?-1:0,d:'<3%=luźny · >5%=restrykcyjny'},
    ]},
    {g:'Momentum',sigs:[
      {n:'Dual Momentum',v:pS(sc.sp12m),s:sc.dm_bull?1:-1,d:'SP500 12M vs IB01 yield ('+sc.ib01.toFixed(2)+'%)'},
      {n:'CAPE Shiller',v:ST.cape+'x',s:-1,d:'36.2x, norma 16x — rynek drogi (zawsze bear)'},
    ]},
    {g:'Cykl',sigs:[
      {n:'Sahm Rule',v:sc.sahm.toFixed(2),s:sc.sahm<0.3?1:sc.sahm>0.5?-1:0,d:'<0.30=ok · >0.50=RECESJA w toku'},
      {n:'HY Spread',v:sc.hy.toFixed(2)+'%',s:sc.hy<3.5?1:sc.hy>6?-1:0,d:'<3.5%=risk-on · >6%=stres kredytowy'},
      {n:'ISM PMI',v:ST.ism.toFixed(1),s:ST.ism>52?1:0,d:'>50=ekspansja ('+ST.ismDate+')'},
    ]},
  ];
  var sigH='<div class="sigtbl"><div class="sg-row hd"><div>Wskaźnik</div><div style="text-align:center">Wartość</div><div style="text-align:center">Sygnał</div><div>Interpretacja</div></div>';
  sigsData.forEach(function(grp){
    sigH+='<div class="sg-grp">'+grp.g+'</div>';
    grp.sigs.forEach(function(s){
      var pc=s.s>0?'pG':s.s<0?'pR':'pY',lbl=s.s>0?'▲ Byczo':s.s<0?'▼ Niedźwiedzi':'— Neutral',vc=s.s>0?'var(--G)':s.s<0?'var(--R)':'var(--Y)';
      sigH+='<div class="sg-row"><div class="sg-n">'+s.n+'</div><div class="sg-v" style="color:'+vc+'">'+s.v+'</div><div style="text-align:center"><span class="pill '+pc+'">'+lbl+'</span></div><div class="sg-d">'+s.d+'</div></div>';
    });
  });
  sigH+='</div>';

  el.innerHTML='<div class="wrap fu">'
  +'<div class="hero" style="--vhg:'+sc.vhg+'">'
  +'<div>'
  +'<div class="h-eye">Decision Engine · '+new Date().toLocaleDateString('pl-PL',{day:'2-digit',month:'long',year:'numeric'})+'</div>'
  +'<div class="h-word" style="color:'+sc.color+'">'+sc.verdict+'</div>'
  +'<div class="h-bar-row"><div class="h-track"><div class="h-fill" style="width:'+sc.norm+'%;background:'+sc.color+'"></div></div><span class="h-score" style="color:'+sc.color+'">'+sc.norm+'<span style="font-size:10px;color:var(--t2)">/100</span></span></div>'
  +'<div class="h-chips">'
  +'<span class="chip '+(sc.dm_bull?'cG':'cY')+'">'+(sc.dm_bull?'▲ AKCJE ETF':'▼ IB01/EDO')+'</span>'
  +'<span class="chip '+(sc.vix>=28?'cG':'cB')+'">VIX '+sc.vix.toFixed(1)+'</span>'
  +'<span class="chip '+(sc.fg!=null&&sc.fg<=35?'cG':sc.fg!=null&&sc.fg>=65?'cR':'cY')+'">F&amp;G '+(sc.fg!=null?sc.fg:'…')+'</span>'
  +'<span class="chip cV">CAPE '+ST.cape+'x</span>'
  +'<span class="chip cY">Total '+(sc.total>=0?'+':'')+sc.total+'/50</span>'
  +'</div>'
  +'<div class="h-rationale">'+rat+'</div>'
  +'</div>'
  +'<div class="h-right">'
  +'<div class="ring-box">'
  +'<div class="ring-wrap"><svg width="74" height="74" viewBox="0 0 74 74"><circle cx="37" cy="37" r="'+R+'" fill="none" stroke="rgba(255,255,255,.06)" stroke-width="6"/><circle cx="37" cy="37" r="'+R+'" fill="none" stroke="'+sc.color+'" stroke-width="6" stroke-dasharray="'+dash+' '+Ci+'" stroke-linecap="round" style="transition:stroke-dasharray .9s"/></svg><div class="ring-num" style="color:'+sc.color+'">'+sc.norm+'</div></div>'
  +'<div><div class="ri-v" style="color:'+sc.color+'">'+sc.norm+'/100</div><div class="ri-l">Composite Score</div><div class="ri-s">'+bull.length+' bull · '+bear.length+' bear<br>5 wymiarów · ±10 każdy</div></div>'
  +'</div>'
  +'<div class="dmcard"><div class="dm-lbl">Dual Momentum</div><div class="dm-sig" style="color:'+(sc.dm_bull?'var(--G)':'var(--Y)')+'">'+(sc.dm_bull?'▲ AKCJE ETF':'▼ IB01')+'</div><div class="dm-n">SP500 12M: <b style="color:'+(sc.dm_bull?'var(--G)':'var(--R)')+'">'+pS(sc.sp12m)+'</b><br>IB01 yield: <b>'+sc.ib01.toFixed(2)+'%</b><br>Spread: <b style="color:'+(sc.dm_bull?'var(--G)':'var(--R)')+'">'+(sc.sp12m-sc.ib01).toFixed(1)+' pp</b></div></div>'
  +'</div>'
  +'</div>'
  +'<div class="sec">System scoringowy — 5 wymiarów</div>'
  +'<div class="sdims">'+dimH+'</div>'
  +'<div class="chartbox"><div class="chdr"><span class="ch-t">Score per wymiar</span><span class="ch-s">−10…+10 każdy | suma: '+(sc.total>=0?'+':'')+sc.total+'</span></div><div class="chbody"><div id="ch-dims" style="height:160px"></div></div></div>'
  +'<div class="sec">Porównanie do kryzysów historycznych</div>'
  +'<div class="cg4">'+crH+'</div>'
  +'<div class="chartbox"><div class="chdr"><span class="ch-t">VIX + F&amp;G: obecny rynek vs historia</span><span class="ch-s">kryzysy 2008/2018/2020/2022</span></div><div class="chbody"><div id="ch-crisis" style="height:220px"></div></div></div>'
  +'<div class="sec">Wszystkie sygnały</div>'
  +sigH
  +'<div style="margin-top:12px;background:rgba(0,229,168,.04);border:1px solid rgba(0,229,168,.1);border-radius:var(--r);padding:10px 13px;font-size:10.5px;color:var(--t1);line-height:1.8">'
  +'<b style="color:var(--t0)">Howard Marks: "Knowing Where We Stand"</b> — system analizuje 5 wymiarów: sentyment (VIX/F&amp;G), płynność (M2/SOFR), positioning (COT/VIX), cykl (Sahm/HY), momentum (DualMomentum/CAPE). Suma: '+(sc.total>=0?'+':'')+sc.total+'/50. Próg KUP: ≥+20 | Akumuluj: +5..+20 | Neutral: ±5 | Redukuj: −5..−20 | Sprzedaj: &lt;−20.'
  +'</div>'
  +'</div>';
  setTimeout(function(){ plotScoreDims('ch-dims'); plotCrisisCompare('ch-crisis'); },50);
}

function renderPortfolio(){
  var el=document.getElementById('p-portfolio');if(!el)return;

  var sp12m=D.sp12m!=null?D.sp12m:((f.sp500fred&&f.sp500fred.yoy!=null)?f.sp500fred.yoy:17.7);
  var ib01=(f.ib01_yield&&f.ib01_yield.current!=null)?f.ib01_yield.current:4.15;
  var dm=sp12m>ib01,sched=buildSched();
  var rC=['','#00e5a8','#00e5a8','#84cc16','#f5c040','#ff7c3e','#ff3355','#dc2626'];
  function rb(r){var h='<div class="rbar">';for(var i=0;i<7;i++)h+='<div class="rs" style="background:'+(i<r?rC[r]:'var(--bg4)')+'"></div>';return h+'<span style="font-size:8.5px;color:'+rC[r]+';margin-left:4px">'+r+'/7</span></div>';}
  var ports=PORTS.map(function(p){
    return'<div class="pc" style="border-color:'+p.color+'20">'
      +'<div class="pc-id" style="color:'+p.color+'">'+p.id+'</div><div class="pc-nm">'+p.name+'</div>'
      +'<div class="pc-b">'+(p.usd?'<span style="color:var(--G)">$'+p.usd+'</span>':'')+' '+(p.eur?'<span style="color:var(--Y)">€'+p.eur+'</span>':'')+'</div>'
      +'<div class="pc-tp" style="background:'+p.color+'15;color:'+p.color+'">'+p.type+'</div>'
      +'<div class="pc-et">'+p.etfs.join('<br>')+'</div>'
      +'<div class="pc-dm" style="color:'+(dm?p.color:'var(--Y)')+'">DM: '+(dm?p.etfs[0].split(' ')[0]:p.safe)+'</div>'
      +(p.sp?'<div style="font-size:8px;color:var(--Y);margin-top:3px">'+p.sp+'</div>':'')
      +'</div>';
  }).join('');
  var sr=sched.slice(0,35).map(function(r){
    var etf=dm?r.p.etfs[0].split(' ')[0]:r.p.safe,sea=r.boost>1;
    return'<tr><td style="color:var(--t3)">T'+r.w+'</td><td style="white-space:nowrap">Czw '+r.day+'</td>'
      +'<td><span class="ptag" style="background:'+r.p.color+'20;color:'+r.p.color+'">'+r.p.id+'</span></td>'
      +'<td style="color:'+(dm?'var(--G)':'var(--Y)')+';font-weight:600">'+etf+'</td>'
      +'<td style="color:'+(sea?'var(--G)':'var(--t1)')+'">'+(r.usd?'$'+r.usd:'')+'</td>'
      +'<td style="color:'+(sea?'var(--G)':'var(--Y)')+'">'+(r.eur?'€'+r.eur:'')+'</td>'
      +'<td style="font-size:9px;color:'+(sea?'var(--G)':'var(--t3)')+'">'+(sea?'★ +30%':'')+'</td></tr>';
  }).join('');
  var er=ETF_DATA.map(function(e){return'<tr><td style="color:'+e.c+';font-weight:700">'+e.id+'</td><td style="font-size:9.5px;color:var(--t2)">'+e.isin+'</td><td style="color:'+(e.ter<0.1?'var(--G)':'var(--t1)')+';font-weight:600">'+e.ter+'%</td><td style="text-align:center">'+e.h.toLocaleString()+'</td><td>'+rb(e.r)+'</td><td><a href="https://www.justetf.com/en/etf-profile.html?isin='+e.isin+'" target="_blank" style="color:var(--B);font-size:9px">justETF →</a></td></tr>';}).join('');
  el.innerHTML='<div class="wrap">'
  +'<div class="dmbar '+(dm?'bull':'bear')+'">'
  +'<div><div class="dml">Dual Momentum Signal</div><div class="dms" style="color:'+(dm?'var(--G)':'var(--Y)')+'">'+(dm?'▲ Kup akcje ETF':'▼ Przejdź na IB01')+'</div></div>'
  +'<div class="dmn">SP500 12M: <b style="color:'+(dm?'var(--G)':'var(--R)')+'">'+pS(sp12m)+'</b> vs IB01: <b>'+ib01.toFixed(2)+'%</b><br>Spread: '+(sp12m-ib01).toFixed(1)+' pp · '+(dm?'Kontynuuj DCA w akcje.':'Przenieś na IB01/EDO.')+'</div>'
  +'</div>'
  +'<div class="sec">5 portfeli — DCA 2026</div><div class="pgrid">'+ports+'</div>'
  +'<div class="sec">Harmonogram — co Czwartek</div>'
  +'<div class="tblwrap"><table class="stbl"><thead><tr><th>Tyg</th><th>Data</th><th>Port</th><th>Kup ETF</th><th>USD</th><th>EUR</th><th>Uwaga</th></tr></thead><tbody>'+sr+'<tr><td colspan="7" style="padding:7px 11px;font-size:9px;color:var(--t3);text-align:center">… rotacja P1→P5 do 2026 Q4</td></tr></tbody></table></div>'
  +'<div class="rcbox"><b>Zasady DCA:</b> Czwartek (+0.11% avg) · <b style="color:var(--G)">+30% Sierpień/Wrzesień</b> · Dual Momentum: sprawdzaj 1. miesiąca · <b style="color:var(--G)">VIX&gt;30 = zwiększaj DCA</b> · Rebalans 28 Gru · IKZE ~9 388 PLN · IKE ~23 470 PLN</div>'
  +'<div class="sec">Baza ETF</div>'
  +'<div class="tblwrap"><table class="stbl"><thead><tr><th>ETF</th><th>ISIN</th><th>TER</th><th>Holdings</th><th>Ryzyko SRI</th><th>Link</th></tr></thead><tbody>'+er+'</tbody></table></div>'
  +'</div>';
}

/* ═══════════════════════════════
   RENDER: JOURNAL
═══════════════════════════════ */
function renderJournal(){
  var el=document.getElementById('p-journal');if(!el)return;
  var entries=jLoad();
  var tc={'kupuję':'var(--G)','sprzedaję':'var(--R)','obserwuję':'var(--B)','analiza':'var(--V)','notatka':'var(--t1)'};
  var listH=entries.length?entries.map(function(e){
    var c=tc[e.tag]||'var(--t1)';
    return'<div class="je"><div class="je-hd"><span class="je-dt">'+e.date+'</span><span class="je-tag" style="background:rgba(255,255,255,.04);color:'+c+';border:1px solid rgba(255,255,255,.1)">'+e.tag+'</span><button class="jdel" data-id="'+e.id+'">✕</button></div><div class="je-body">'+e.text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>')+'</div>'+(e.score!=null?'<div class="je-score">Score: <b style="color:var(--B)">'+e.score+'/100</b> · <b>'+e.verdict+'</b></div>':'')+'</div>';
  }).join(''):'<div style="color:var(--t3);text-align:center;padding:30px;font-size:11px">Brak wpisów — dodaj pierwszą notatkę maklera</div>';
  el.innerHTML='<div class="wrap">'
  +'<div class="sec">Dziennik maklera — '+(entries.length)+' wpisów</div>'
  +'<div class="jtop"><textarea id="jt" placeholder="Co obserwujesz? Dlaczego kupujesz/sprzedajesz/czekasz? VIX '+((SC&&SC.vix)||29.5).toFixed(0)+', F&G '+((SC&&SC.fg)||'?')+'…"></textarea>'
  +'<div class="jmeta"><select class="jsel" id="jtag"><option value="notatka">📝 Notatka</option><option value="kupuję">📈 Kupuję</option><option value="sprzedaję">📉 Sprzedaję</option><option value="obserwuję">👁 Obserwuję</option><option value="analiza">🔬 Analiza</option></select>'
  +(SC?'<div style="font-size:9.5px;color:var(--t1);padding:3px 0">Score: <b style="color:var(--B)">'+SC.norm+'/100</b><br>'+SC.verdict+'</div>':'')
  +'<button class="jbtn" id="jsave">ZAPISZ</button></div></div>'
  +'<div class="jlist" id="jlist">'+listH+'</div>'
  +'</div>';
  document.getElementById('jsave').addEventListener('click',function(){
    var txt=document.getElementById('jt').value.trim(),tag=document.getElementById('jtag').value;
    if(!txt)return; jAdd(txt,tag); renderJournal();
  });
  el.querySelectorAll('.jdel').forEach(function(btn){
    btn.addEventListener('click',function(){ jDel(parseInt(btn.getAttribute('data-id'))); renderJournal(); });
  });
}

/* ═══════════════════════════════
   RENDER: SOURCES
═══════════════════════════════ */
function renderSources(){
  var el=document.getElementById('p-sources');if(!el)return;
  var sq=Object.keys(D.q||{}).length,fr=Object.keys(D.f||{}).length;
  function sri(key,s){
    var st=s.status==='live'?'ss-live':s.status==='fail'?'ss-fail':s.status==='static'?'ss-static':'ss-unused';
    var stxt=s.status==='live'?'LIVE':s.status==='fail'?'FAIL':s.status==='unused'?'BRAK':s.status.toUpperCase();
    return'<div class="sri" data-key="'+key+'"><div><div class="sri-name">'+s.name+'</div><div class="sri-url">'+(s.url||'—')+'</div><div class="sri-desc">'+s.desc+'</div></div><div style="text-align:center"><span class="ss '+st+'">'+stxt+'</span></div><div class="src-actions"><button class="bts" data-test="'+key+'">TEST</button>'+(s.editable?'<button class="bts" data-edit="'+key+'">EDYTUJ</button>':'')+'</div></div>';
  }
  var logH=LOG.slice(0,60).map(function(l){
    var c=l.state==='er'?'var(--R)':l.state==='ok'?'var(--G)':'var(--Y)',mc=l.state==='er'?'#fca5a5':'var(--t1)',ic=l.state==='er'?'✗':l.state==='ok'?'✓':'↻';
    return'<div class="lr"><span class="lts">'+l.ts+'</span><span class="lic" style="color:'+c+'">'+ic+'</span><span class="lmsg" style="color:'+mc+'">'+l.msg+'</span></div>';
  }).join('');
  el.innerHTML='<div class="wrap">'
  +'<div class="dstats">'
  +'<div class="ds"><div class="ds-l">Stooq</div><div class="ds-n" style="color:'+(sq>12?'var(--G)':'var(--Y)')+'">'+sq+'</div><div class="ds-s">/ '+Object.keys(SQ).length+' symboli</div></div>'
  +'<div class="ds"><div class="ds-l">FRED</div><div class="ds-n" style="color:'+(fr>12?'var(--G)':'var(--Y)')+'">'+fr+'</div><div class="ds-s">/ '+Object.keys(FM).length+' serii</div></div>'
  +'<div class="ds"><div class="ds-l">F&amp;G</div><div class="ds-n" style="color:'+(D.fg?'var(--G)':'var(--R)')+'">'+(D.fg?D.fg.score:'—')+'</div><div class="ds-s">'+(D.fg?D.fg.source:'nie załadowano')+'</div></div>'
  +'<div class="ds"><div class="ds-l">SP500 12M</div><div class="ds-n" style="color:var(--G)">'+pS(D.sp12m)+'</div><div class="ds-s">'+(D.sp12m_src||'—')+'</div></div>'
  +'</div>'
  +'<div class="sec">Zarządzanie źródłami danych</div>'
  +'<div class="src-list" id="srclist">'+Object.keys(SRCS).map(function(k){return sri(k,SRCS[k]);}).join('')+'</div>'
  +'<div class="sec" style="margin-top:16px">Dodaj / edytuj własne źródło</div>'
  +'<div class="cform">'
  +'<div class="frow"><div class="ff"><label>Klucz</label><select id="cf-k"><option value="custom1">custom1</option><option value="custom2">custom2</option></select></div><div class="ff"><label>Nazwa</label><input type="text" id="cf-n" placeholder="np. własny endpoint FRED"></div></div>'
  +'<div class="frow"><div class="ff" style="grid-column:1/-1"><label>URL</label><input type="url" id="cf-u" placeholder="https://fred.stlouisfed.org/graph/fredgraph.csv?id=SERIES_ID"></div></div>'
  +'<div class="frow"><div class="ff" style="grid-column:1/-1"><label>Opis</label><input type="text" id="cf-d" placeholder="Co zwraca ten endpoint?"></div></div>'
  +'<div style="display:flex;gap:8px"><button class="jbtn" id="cf-save">ZAPISZ</button><button class="btn" id="cf-test">TESTUJ URL</button></div>'
  +'<div class="tres" id="cf-res"></div>'
  +'</div>'
  +'<div class="sec">Log zdarzeń</div>'
  +'<div class="logbox">'+(logH||'<div style="color:var(--t3)">Brak logów…</div>')+'</div>'
  +'</div>';
  /* wire buttons */
  el.querySelectorAll('[data-test]').forEach(function(btn){
    btn.addEventListener('click',function(){ testSrc(btn.getAttribute('data-test')); });
  });
  el.querySelectorAll('[data-edit]').forEach(function(btn){
    btn.addEventListener('click',function(){
      var k=btn.getAttribute('data-edit'),s=SRCS[k];
      if(!s)return;
      document.getElementById('cf-k').value=k;
      document.getElementById('cf-n').value=s.name;
      document.getElementById('cf-u').value=s.url;
      document.getElementById('cf-d').value=s.desc;
    });
  });
  document.getElementById('cf-save').addEventListener('click',function(){
    var k=document.getElementById('cf-k').value,n=document.getElementById('cf-n').value.trim(),u=document.getElementById('cf-u').value.trim(),d=document.getElementById('cf-d').value.trim();
    if(!u)return; SRCS[k]={name:n||k,url:u,desc:d||'Własne',status:'unknown',editable:true}; renderSources();
  });
  document.getElementById('cf-test').addEventListener('click',async function(){
    var u=document.getElementById('cf-u').value.trim(),r=document.getElementById('cf-res');
    if(!u||!r)return; r.style.display='block';r.className='tres';r.textContent='Testowanie…';
    try{
      var res=await pGet(u,10000),txt=await res.text();
      var ok=txt.trim().charAt(0)!=='<'&&txt.length>20;
      r.className='tres '+(ok?'tok':'tfail');r.textContent=ok?'OK — '+txt.slice(0,120):'FAIL — odpowiedź HTML lub pusta';
    }catch(e){r.className='tres tfail';r.textContent='FAIL — '+e.message;}
  });
}
async function testSrc(key){
  var s=SRCS[key];if(!s||!s.url)return;
  setS('ld','Test: '+s.name+'…');
  try{
    var r=await pGet(s.url,9000),txt=await r.text();
    s.status=txt.trim().charAt(0)!=='<'&&txt.length>20?'live':'fail';
    setS(s.status==='live'?'ok':'er',s.name+': '+(s.status==='live'?'OK':'FAIL'));
  }catch(e){s.status='fail';setS('er',s.name+': '+e.message);}
  renderSources();
}

/* ═══════════════════════════════
   PIPELINE
═══════════════════════════════ */
async function fetchAll(){
  setS('ld','Inicjalizacja…');
  await Promise.all([fetchStooq(),fetchSP12M()]);
  renderTicker(); calcScore(); renderDecision();
  await Promise.all([fetchFG(),fetchCryptoFG()]);
  calcScore(); renderDecision();
  await fetchFred();
  calcScore(); renderDecision(); renderIndicators(); renderPortfolio(); renderLiquidity();
  await fetchTreasury();
  var tot=Object.keys(D.q||{}).length+Object.keys(D.f||{}).length;
  setS('ok','Załadowane — '+tot+' serii danych');
  var lu=document.getElementById('lupd');if(lu)lu.textContent='odśw. '+new Date().toLocaleTimeString('pl-PL');
  var at=document.querySelector('.tab.on');
  if(at){var t=at.getAttribute('data-t');if(t==='sources')renderSources();if(t==='cot')renderCOT();}
}
setInterval(fetchAll,10*60*1000);

/* ═══════════════════════════════
   TABS
═══════════════════════════════ */
document.addEventListener('DOMContentLoaded',function(){
  document.querySelectorAll('.tab').forEach(function(btn){
    btn.addEventListener('click',function(){
      document.querySelectorAll('.tab').forEach(function(b){b.classList.remove('on');});
      document.querySelectorAll('.panel').forEach(function(p){p.classList.remove('on');});
      btn.classList.add('on');
      var t=btn.getAttribute('data-t');
      var panel=document.getElementById('p-'+t);if(panel)panel.classList.add('on');
      if(t==='sentiment')renderSentiment();
      if(t==='liquidity')renderLiquidity();
      if(t==='cot')renderCOT();
      if(t==='indicators')renderIndicators();
      if(t==='portfolio')renderPortfolio();
      if(t==='journal')renderJournal();
      if(t==='sources')renderSources();
    });
  });
  document.getElementById('bR').addEventListener('click',fetchAll);
  renderJournal();
  fetchAll();
});
</script>
