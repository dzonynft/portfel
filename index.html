<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>MacroTerminal v27</title>
<meta name="viewport" content="width=device-width,initial-scale=0.95">
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📊</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;-webkit-font-smoothing:antialiased}
:root{
  --bg:#05080e;--s1:#080d17;--s2:#0c1420;--s3:#111c2c;--s4:#162438;
  --b0:rgba(255,255,255,.045);--b1:rgba(255,255,255,.09);--b2:rgba(255,255,255,.16);
  --G:#00e5a0;--Gd:rgba(0,229,160,.09);--Gg:rgba(0,229,160,.22);
  --R:#ff4060;--Rd:rgba(255,64,96,.09);
  --Y:#ffc820;--Yd:rgba(255,200,32,.09);
  --B:#3db8f5;--Bd:rgba(61,184,245,.09);
  --V:#a78bfa;--Vd:rgba(167,139,250,.09);
  --O:#ff8c42;
  --t0:#f0f6ff;--t1:#7a9fc0;--t2:#3a5a78;--t3:#1a3050;
  --ff:'Syne',sans-serif;--fm:'JetBrains Mono',monospace;
  --r:10px;--rl:14px;
}
body{background:var(--bg);color:var(--t0);font-family:var(--fm);font-size:12px}
::-webkit-scrollbar{width:3px;height:3px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--s4);border-radius:99px}
.app{display:grid;grid-template-rows:50px 28px 42px 1fr;height:100vh;overflow:hidden}

/* TOP */
.top{background:rgba(5,8,14,.96);backdrop-filter:blur(20px);border-bottom:1px solid var(--b0);
  display:flex;align-items:center;gap:12px;padding:0 20px;position:relative;z-index:100}
.top::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,var(--G) 35%,var(--B) 65%,transparent);opacity:.4}
.logo{font-family:var(--ff);font-size:15px;font-weight:800;letter-spacing:-.5px;
  background:linear-gradient(135deg,var(--t0),#5a8ab0);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.logo-v{font-size:9px;font-weight:500;padding:1px 6px;border-radius:99px;
  background:var(--Gd);color:var(--G);border:1px solid var(--Gg);margin-left:6px}
.sdot{width:7px;height:7px;border-radius:50%;flex-shrink:0;transition:all .3s}
.s-ok{background:var(--G);box-shadow:0 0 8px var(--Gg)}
.s-ld{background:var(--Y);animation:blink 1s ease infinite}
.s-er{background:var(--R)}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
#st{font-size:10px;color:var(--t1);max-width:300px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tr{margin-left:auto;display:flex;align-items:center;gap:10px}
#clk{font-size:10px;color:var(--t2);font-variant-numeric:tabular-nums}
.btn{font-size:10px;font-weight:600;padding:5px 12px;border-radius:var(--r);border:1px solid var(--b1);background:var(--b0);color:var(--t1);cursor:pointer;font-family:var(--fm);transition:all .15s}
.btn:hover{border-color:var(--b2);color:var(--t0)}

/* TICKER */
.ticker{background:var(--s1);border-bottom:1px solid var(--b0);overflow:hidden;display:flex;align-items:center}
.tt{display:flex;white-space:nowrap;animation:scr 110s linear infinite}
.tt:hover{animation-play-state:paused}
@keyframes scr{to{transform:translateX(-50%)}}
.ti{display:inline-flex;align-items:center;gap:6px;padding:0 16px;border-right:1px solid var(--b0);height:28px}
.tn{font-size:9.5px;color:var(--t2)}.tp{font-size:11px;font-weight:500;font-variant-numeric:tabular-nums}.tc{font-size:9.5px}
.up{color:var(--G)}.dn{color:var(--R)}.neu{color:var(--t1)}

/* TABS */
.tabs{background:var(--s1);border-bottom:1px solid var(--b0);display:flex;align-items:stretch;padding:0 8px}
.tab{font-family:var(--ff);font-size:11px;font-weight:600;padding:0 14px;color:var(--t2);border:none;background:transparent;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s;white-space:nowrap;display:flex;align-items:center;gap:5px}
.tab:hover{color:var(--t0)}.tab.on{color:var(--t0);border-bottom-color:var(--G)}
.te{flex:1;display:flex;align-items:center;justify-content:flex-end;padding-right:8px}
.lu{font-size:9px;color:var(--t3)}
.panel{display:none;height:100%;overflow-y:auto;overflow-x:hidden}.panel.on{display:block}
.wrap{padding:16px 20px 24px}
.sl{font-family:var(--ff);font-size:9.5px;font-weight:700;letter-spacing:1.2px;color:var(--t2);text-transform:uppercase;margin:18px 0 10px;display:flex;align-items:center;gap:8px}
.sl:first-child{margin-top:0}.sl::after{content:'';flex:1;height:1px;background:var(--b0)}
@keyframes fu{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.fu{animation:fu .3s ease both}
.ldg{display:flex;flex-direction:column;align-items:center;justify-content:center;height:260px;gap:12px}
.spin{width:26px;height:26px;border-radius:50%;border:2px solid var(--b0);border-top-color:var(--G);animation:sp .7s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}

/* ═══ DECISION ═══ */
/* Big signal hero */
.hero{border-radius:var(--rl);border:1px solid var(--b1);padding:26px 28px 22px;margin-bottom:14px;position:relative;overflow:hidden;display:grid;grid-template-columns:1fr auto;gap:20px;align-items:start}
.hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 60% 80% at 5% 50%,var(--vhg,rgba(0,229,160,.07)),transparent 60%);pointer-events:none}
.hero-left{position:relative}
.h-eye{font-family:var(--ff);font-size:9px;font-weight:700;letter-spacing:2px;color:var(--t2);text-transform:uppercase;margin-bottom:6px}
.h-word{font-family:var(--ff);font-size:48px;font-weight:800;line-height:1;letter-spacing:-2px;margin-bottom:8px;transition:color .5s}
.h-sbar{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.h-track{width:180px;height:5px;background:rgba(255,255,255,.06);border-radius:99px;overflow:hidden}
.h-fill{height:5px;border-radius:99px;transition:width 1.2s cubic-bezier(.4,0,.2,1)}
.h-score{font-family:var(--ff);font-size:13px;font-weight:700}
.h-chips{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:12px}
.chip{font-family:var(--ff);font-size:9px;font-weight:700;padding:3px 9px;border-radius:99px;border:1px solid;white-space:nowrap;transition:all .3s}
.cG{background:var(--Gd);color:var(--G);border-color:var(--Gg)}
.cR{background:var(--Rd);color:var(--R);border-color:rgba(255,64,96,.25)}
.cY{background:var(--Yd);color:var(--Y);border-color:rgba(255,200,32,.25)}
.cB{background:var(--Bd);color:var(--B);border-color:rgba(61,184,245,.25)}
.cV{background:var(--Vd);color:var(--V);border-color:rgba(167,139,250,.25)}
.h-lists{display:grid;grid-template-columns:1fr 1fr;gap:6px;font-size:10.5px;line-height:1.8}
.h-note{margin-top:12px;padding-top:12px;border-top:1px solid var(--b0);font-size:10.5px;color:var(--t1);line-height:1.7}
/* Ring */
.hero-right{display:flex;flex-direction:column;gap:10px;min-width:200px}
.ring-box{background:var(--b0);border:1px solid var(--b1);border-radius:var(--r);padding:14px 16px;display:flex;align-items:center;gap:14px}
.ring-wrap{position:relative;flex-shrink:0}
.ring-wrap svg{display:block;transform:rotate(-90deg)}
.ring-lbl{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-family:var(--ff);font-size:17px;font-weight:800;text-align:center}
.ring-info{flex:1}
.ri-v{font-family:var(--ff);font-size:20px;font-weight:700;line-height:1;margin-bottom:2px}
.ri-l{font-size:9px;color:var(--t2);letter-spacing:.5px;font-family:var(--ff);font-weight:700;text-transform:uppercase;margin-bottom:5px}
.ri-sub{font-size:9.5px;color:var(--t1);line-height:1.65}
.dm-box{background:var(--b0);border:1px solid var(--b1);border-radius:var(--r);padding:12px 14px}
.dm-l{font-family:var(--ff);font-size:9px;font-weight:700;letter-spacing:1px;color:var(--t2);text-transform:uppercase;margin-bottom:5px}
.dm-v{font-family:var(--ff);font-size:15px;font-weight:700;margin-bottom:4px}
.dm-n{font-size:9.5px;color:var(--t1);line-height:1.7}

/* Gauges */
.gbox{display:grid;grid-template-columns:1fr 1fr 1fr;gap:11px;margin-bottom:14px}
.gauge{background:var(--b0);border:1px solid var(--b0);border-radius:var(--r);padding:13px 15px;transition:border-color .2s}
.gauge:hover{border-color:var(--b1)}
.g-lbl{font-family:var(--ff);font-size:9px;font-weight:700;letter-spacing:1px;color:var(--t2);text-transform:uppercase;margin-bottom:7px}
.g-num{font-family:var(--ff);font-size:36px;font-weight:700;line-height:1;margin-bottom:2px;font-variant-numeric:tabular-nums}
.g-st{font-family:var(--ff);font-size:9.5px;font-weight:700;letter-spacing:.5px;margin-bottom:9px}
.g-bar{position:relative;height:4px;background:rgba(255,255,255,.06);border-radius:99px;margin-bottom:3px}
.g-fill{position:absolute;left:0;top:0;height:4px;border-radius:99px;background:linear-gradient(90deg,var(--R),var(--Y),var(--G));transition:width 1s cubic-bezier(.4,0,.2,1)}
.g-pin{position:absolute;top:50%;transform:translate(-50%,-50%);width:11px;height:11px;border-radius:50%;background:white;border:2px solid var(--bg);box-shadow:0 0 0 2px rgba(255,255,255,.18);transition:left 1s cubic-bezier(.4,0,.2,1)}
.g-tks{display:flex;justify-content:space-between;font-size:8px;color:var(--t3);margin-top:2px}
.g-ctx{display:grid;grid-template-columns:repeat(3,1fr);gap:3px;margin-top:8px}
.gct{background:var(--s2);border-radius:5px;padding:5px 6px;text-align:center}
.gct-l{font-size:8px;color:var(--t2);margin-bottom:1px}.gct-v{font-size:12px;font-weight:600}
.g-exp{font-size:9.5px;color:var(--t1);line-height:1.65;margin-top:9px;padding-top:9px;border-top:1px solid var(--b0)}
.spark-row{display:flex;align-items:flex-end;gap:2px;height:34px}
.sb{min-width:4px;border-radius:2px 2px 0 0;background:var(--s4);flex:1}
.sb.sG{background:var(--G)}.sb.sR{background:var(--R)}.sb.sY{background:var(--Y)}

/* Timeline */
.tl{display:grid;grid-template-columns:repeat(4,1fr);gap:11px;margin-bottom:14px}
.tlc{background:var(--b0);border:1px solid var(--b0);border-radius:var(--r);padding:13px;
  position:relative;overflow:hidden;transition:transform .2s,border-color .2s}
.tlc:hover{transform:translateY(-2px);border-color:var(--b1)}
.tlc::after{content:'';position:absolute;bottom:0;left:0;right:0;height:3px}
.tl-era{font-family:var(--ff);font-size:9px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;margin-bottom:2px}
.tl-title{font-family:var(--ff);font-size:12.5px;font-weight:700;margin-bottom:9px}
.tl-row{display:flex;justify-content:space-between;align-items:center;padding:3px 0;border-bottom:1px solid var(--b0)}
.tl-row:last-of-type{border:none}
.tl-k{font-size:9px;color:var(--t2)}.tl-v{font-size:10px;font-weight:600}
.tl-res{font-size:9px;color:var(--t1);line-height:1.6;margin-top:9px;padding-top:7px;border-top:1px solid var(--b0)}
.tl-badge{display:inline-block;margin-top:5px;padding:2px 8px;border-radius:99px;font-size:8.5px;font-weight:700;letter-spacing:.5px;font-family:var(--ff)}

/* Signals */
.sigs-wrap{background:var(--b0);border:1px solid var(--b0);border-radius:var(--r);overflow:hidden}
.sg-grp{padding:5px 13px;background:rgba(255,255,255,.02);font-family:var(--ff);font-size:9px;font-weight:700;letter-spacing:1px;color:var(--t2);text-transform:uppercase;border-bottom:1px solid var(--b0)}
.sg-row{display:grid;grid-template-columns:1fr 85px 105px 1fr;align-items:center;padding:7px 13px;border-bottom:1px solid var(--b0);transition:background .12s}
.sg-row:hover{background:rgba(255,255,255,.02)}.sg-row:last-child{border-bottom:none}
.sg-row.hd{background:var(--s2);font-family:var(--ff);font-size:9px;font-weight:700;color:var(--t2);letter-spacing:.5px}
.sg-n{font-size:11px;color:var(--t0)}.sg-v{font-size:12px;font-weight:600;text-align:center;font-variant-numeric:tabular-nums}
.spill{font-family:var(--ff);font-size:9px;font-weight:700;padding:2px 9px;border-radius:99px;text-align:center;display:inline-block}
.spG{background:var(--Gd);color:var(--G);border:1px solid var(--Gg)}
.spR{background:var(--Rd);color:var(--R);border:1px solid rgba(255,64,96,.25)}
.spY{background:var(--Yd);color:var(--Y);border:1px solid rgba(255,200,32,.25)}
.sg-d{font-size:10px;color:var(--t2);padding-left:10px}

/* ═══ INDICATORS ═══ */
.igrid{display:grid;grid-template-columns:repeat(3,1fr);gap:11px;margin-bottom:14px}
.ic{background:var(--b0);border:1px solid var(--b0);border-radius:var(--r);padding:13px 14px;transition:border-color .2s,transform .15s}
.ic:hover{border-color:var(--b1);transform:translateY(-1px)}
.ic.G{border-left:3px solid var(--G)}.ic.R{border-left:3px solid var(--R)}.ic.Y{border-left:3px solid var(--Y)}
.ic-h{display:flex;justify-content:space-between;align-items:start;margin-bottom:5px}
.ic-t{font-family:var(--ff);font-size:10px;font-weight:700;color:var(--t1);line-height:1.3}
.ic-src{font-size:8px;color:var(--t3);text-align:right}
.ic-v{font-family:var(--ff);font-size:24px;font-weight:700;line-height:1;margin-bottom:2px}
.ic-d{font-size:9px;color:var(--t2);margin-bottom:6px}
.ic-badge{font-family:var(--ff);font-size:9px;font-weight:700;padding:2px 8px;border-radius:99px;display:inline-flex;align-items:center;gap:3px;margin-bottom:7px}
.ic-desc{font-size:9.5px;color:var(--t2);line-height:1.6;margin-top:6px;padding-top:6px;border-top:1px solid var(--b0)}
.ic-io{margin-top:5px;font-size:9.5px;line-height:1.7}

/* Links */
.lgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;margin-bottom:14px}
.lnk{display:block;padding:9px 11px;text-align:center;background:var(--b0);border:1px solid var(--b0);border-radius:var(--r);font-family:var(--ff);font-size:10px;font-weight:700;color:var(--B);text-decoration:none;transition:all .15s}
.lnk:hover{border-color:rgba(61,184,245,.3);background:var(--Bd);transform:translateY(-1px)}

/* ═══ COT ═══ */
.cot-actors{display:grid;grid-template-columns:repeat(3,1fr);gap:11px;margin-bottom:14px}
.actor{background:var(--b0);border:1px solid var(--b0);border-radius:var(--r);padding:13px}
.ac-n{font-family:var(--ff);font-size:12px;font-weight:700;margin-bottom:3px}
.ac-sub{font-size:9px;color:var(--t2);font-weight:600;letter-spacing:.5px;text-transform:uppercase;margin-bottom:7px}
.ac-d{font-size:10.5px;color:var(--t1);line-height:1.65}
.ac-rule{font-size:10px;font-weight:600;margin-top:7px;padding:5px 8px;border-radius:6px;line-height:1.4}
.cotm{display:grid;grid-template-columns:repeat(2,1fr);gap:11px;margin-bottom:14px}
.mc{background:var(--b0);border:1px solid var(--b0);border-radius:var(--r);padding:13px}
.mc-h{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.mc-n{font-family:var(--ff);font-size:12.5px;font-weight:700}.mc-c{font-size:9px;color:var(--t3)}
.mc-pr{display:grid;grid-template-columns:95px 1fr 50px;align-items:center;gap:7px;margin-bottom:6px}
.mc-pl{font-size:9.5px;color:var(--t1);font-weight:600}
.mc-bw{position:relative;height:6px;background:rgba(255,255,255,.05);border-radius:99px;overflow:hidden}
.mc-bf{position:absolute;top:0;height:6px;border-radius:99px;transition:width .6s}
.mc-pv{font-size:9.5px;font-weight:700;text-align:right;font-variant-numeric:tabular-nums}
.mc-sig{font-family:var(--ff);font-size:10px;font-weight:700;margin-top:9px;padding:6px 9px;border-radius:6px;line-height:1.5}
.mc-note{font-size:9.5px;color:var(--t2);line-height:1.6;margin-top:6px}
.cot-leg{display:grid;grid-template-columns:repeat(3,1fr);gap:11px;margin-bottom:14px}
.cl-c{background:var(--b0);border:1px solid var(--b0);border-radius:var(--r);padding:12px}
.cl-t{font-family:var(--ff);font-size:11px;font-weight:700;margin-bottom:5px}
.cl-d{font-size:9.5px;color:var(--t2);line-height:1.65}
.cot-links{display:grid;grid-template-columns:repeat(3,1fr);gap:11px}
.cotlnk{display:block;padding:13px;background:var(--b0);border:1px solid var(--b0);border-radius:var(--r);text-decoration:none;transition:all .2s}
.cotlnk:hover{border-color:var(--b1);transform:translateY(-2px)}
.cotlnk-ico{font-size:20px;margin-bottom:7px}
.cotlnk-t{font-family:var(--ff);font-size:12px;font-weight:700;color:var(--t0);margin-bottom:3px}
.cotlnk-d{font-size:9.5px;color:var(--t2);line-height:1.6}.cotlnk-u{font-size:9px;color:var(--B);margin-top:4px}

/* ═══ LIQUIDITY ═══ */
.liq-intro{background:var(--b0);border:1px solid var(--b0);border-radius:var(--r);padding:13px 16px;margin-bottom:14px}
.liq-layers{background:var(--b0);border:1px solid var(--b0);border-radius:var(--r);overflow:hidden;margin-bottom:14px}
.ll{padding:13px 16px;border-bottom:1px solid var(--b0);display:grid;grid-template-columns:80px 1fr 170px;gap:11px;align-items:start}
.ll:last-child{border-bottom:none}
.ll-tag{font-family:var(--ff);font-size:18px;font-weight:800;display:flex;flex-direction:column}
.ll-sub{font-size:8.5px;color:var(--t2);font-weight:600;letter-spacing:.5px;margin-top:2px}
.ll-def{font-size:10.5px;color:var(--t1);line-height:1.7}
.ll-sig{font-size:10px;padding:7px 10px;border-radius:6px;line-height:1.6}
.liq-cycle{display:grid;grid-template-columns:repeat(4,1fr);gap:11px;margin-bottom:14px}
.cyc{background:var(--b0);border:1px solid var(--b0);border-radius:var(--r);padding:12px}
.cyc-n{font-family:var(--ff);font-size:24px;font-weight:800;margin-bottom:3px}
.cyc-t{font-family:var(--ff);font-size:11px;font-weight:700;margin-bottom:5px}
.cyc-d{font-size:9.5px;color:var(--t2);line-height:1.65}
.cyc-a{font-family:var(--ff);font-size:10px;font-weight:700;margin-top:6px;padding:4px 8px;border-radius:5px}
.liq-flow{background:var(--b0);border:1px solid var(--b0);border-radius:var(--r);overflow:hidden;margin-bottom:14px}
.lft{width:100%;border-collapse:collapse;font-size:10.5px}
.lft th{background:var(--s2);color:var(--t2);padding:7px 11px;text-align:left;font-family:var(--ff);font-size:8.5px;font-weight:700;letter-spacing:.5px;border-bottom:1px solid var(--b0)}
.lft td{padding:7px 11px;border-bottom:1px solid var(--b0);color:var(--t1)}
.lft tr:hover td{background:rgba(255,255,255,.02)}.lft tr:last-child td{border-bottom:none}
.liq-src{display:grid;grid-template-columns:repeat(3,1fr);gap:11px}
.lsrc{display:block;padding:12px;background:var(--b0);border:1px solid var(--b0);border-radius:var(--r);text-decoration:none;transition:all .2s}
.lsrc:hover{border-color:var(--b1);transform:translateY(-2px)}
.lsrc-ico{font-size:18px;margin-bottom:6px}
.lsrc-t{font-family:var(--ff);font-size:11.5px;font-weight:700;color:var(--t0);margin-bottom:3px}
.lsrc-d{font-size:9.5px;color:var(--t2);line-height:1.6}.lsrc-u{font-size:9px;color:var(--B);margin-top:4px}

/* ═══ PORTFOLIO ═══ */
.dmb{border-radius:var(--rl);padding:13px 16px;display:flex;align-items:center;gap:14px;flex-wrap:wrap;margin-bottom:14px}
.dmb.bull{background:rgba(0,229,160,.05);border:1px solid rgba(0,229,160,.15)}

<script>
/* MacroTerminal v27
   Fixes: r.text() then JSON.parse to handle HTML error responses,
   VIX fallback chain, FRED retry, no < in template literals */
'use strict';
var PROXY = 'https://portfel.dzonyiks.workers.dev';
var D = {q:{}, f:{}, fg:null, cfg:null, treasury:null, sp12m:null, sp12m_src:'—'};
var LOG = [];

function setS(state, msg) {
  var d = document.getElementById('sd');
  var t = document.getElementById('st');
  if (d) d.className = 'sdot ' + (state==='ok'?'s-ok':state==='er'?'s-er':'s-ld');
  if (t) t.textContent = (msg||'').slice(0,72);
  LOG.unshift({ts: new Date().toLocaleTimeString('pl-PL'), state:state, msg:msg||''});
  if (LOG.length > 120) LOG.pop();
}
setInterval(function(){
  var e = document.getElementById('clk');
  if (e) e.textContent = new Date().toLocaleString('pl-PL',{weekday:'short',day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit',second:'2-digit'});
},1000);

function fmtN(v,d) {
  d = d||2;
  return (v==null||isNaN(v)) ? '&#8212;' : Number(v).toLocaleString('pl-PL',{minimumFractionDigits:d,maximumFractionDigits:d});
}
function fmtP(p) {
  if (p==null) return '&#8212;';
  return (p>=0?'+':'') + Number(p).toFixed(2) + '%';
}
function dirCls(p) { return p>0?'up':p<0?'dn':'neu'; }
function fgCol(s) {
  if (s==null) return '#7a9fc0';
  if (s<=24) return '#ff4060';
  if (s<=44) return '#ff8c42';
  if (s<=55) return '#ffc820';
  return '#00e5a0';
}
function fgLbl(s) {
  if (s==null) return '&#8212;';
  if (s<=24) return 'EXTREME FEAR';
  if (s<=44) return 'FEAR';
  if (s<=55) return 'NEUTRAL';
  if (s<=74) return 'GREED';
  return 'EXTREME GREED';
}
function pctStr(v) {
  if (v==null) return '&#8212;';
  return (v>=0?'+':'') + Number(v).toFixed(1) + '%';
}

/* ─── PROXY FETCH (returns response object) ─── */
async function proxyGet(url, ms) {
  ms = ms||14000;
  var full = PROXY + '?url=' + encodeURIComponent(url);
  var ctrl = new AbortController();
  var timer = setTimeout(function(){ ctrl.abort(); }, ms);
  try {
    var r = await fetch(full, {signal: ctrl.signal});
    clearTimeout(timer);
    if (!r.ok) throw new Error('HTTP ' + r.status);
    return r;
  } catch(e) {
    clearTimeout(timer);
    throw e;
  }
}

/* ─── STOOQ ─── */
var SQ = {
  sp500:'^spx', nasdaq:'^ndx', dj:'^dji', gold:'xauusd', silver:'xagusd',
  oil:'cl.f', natgas:'ng.f', copper:'hg.f',
  usdpln:'usdpln', eurpln:'eurpln', eurusd:'eurusd', gbpusd:'gbpusd', usdjpy:'usdjpy', dxy:'dxy',
  us10y:'10usy.b', us2y:'2usy.b',
  btcusd:'btcusd', ethusd:'ethusd', wig20:'wig20', vix:'^vix'
};

async function stooqOne(sym) {
  var url = 'https://stooq.com/q/d/l/?s=' + encodeURIComponent(sym) + '&i=d';
  var r = await proxyGet(url, 11000);
  var txt = await r.text();
  if (!txt || txt.indexOf('No data') !== -1 || txt.trim().length < 20) throw new Error('no data');
  var lines = txt.trim().split('\n').filter(function(l){ return l && l.indexOf('Date') === -1; });
  if (!lines.length) throw new Error('empty');
  function parseLine(l) {
    var a = l.split(',');
    return { close: parseFloat(a[4]), date: a[0] };
  }
  var last = parseLine(lines[lines.length-1]);
  var prev = lines.length > 1 ? parseLine(lines[lines.length-2]) : last;
  if (isNaN(last.close)) throw new Error('NaN close');
  return {
    price: last.close,
    prev: prev.close,
    change: prev.close ? (last.close - prev.close) / prev.close * 100 : 0,
    date: last.date
  };
}

async function fetchStooq() {
  setS('ld', 'Stooq: pobieranie kursów…');
  var keys = Object.keys(SQ);
  var results = await Promise.allSettled(keys.map(function(k){ return stooqOne(SQ[k]); }));
  D.q = {};
  var ok = 0, fail = 0;
  results.forEach(function(r, i) {
    if (r.status === 'fulfilled') { D.q[keys[i]] = r.value; ok++; }
    else { fail++; }
  });
  setS(ok > 12 ? 'ok' : 'er', 'Stooq: ' + ok + ' OK, ' + fail + ' błędów');
}

async function fetchSP500_12M() {
  try {
    var now = new Date(), ya = new Date(now);
    ya.setFullYear(ya.getFullYear() - 1);
    function d8(d) { return d.getFullYear() + String(d.getMonth()+1).padStart(2,'0') + String(d.getDate()).padStart(2,'0'); }
    var url = 'https://stooq.com/q/d/l/?s=%5Espx&d1=' + d8(ya) + '&d2=' + d8(now) + '&i=w';
    var r = await proxyGet(url, 12000);
    var txt = await r.text();
    if (!txt || txt.indexOf('No data') !== -1) throw new Error('no data');
    var lines = txt.trim().split('\n').filter(function(l){ return l && l.indexOf('Date') === -1; });
    if (lines.length < 2) throw new Error('too few rows');
    function pv(l) { return parseFloat(l.split(',')[4]); }
    var first = pv(lines[0]), last = pv(lines[lines.length-1]);
    if (!first || !last || isNaN(first) || isNaN(last)) throw new Error('NaN');
    D.sp12m = (last - first) / first * 100;
    D.sp12m_src = 'stooq weekly 1Y';
  } catch(e) {
    D.sp12m = null;
    D.sp12m_src = 'err: ' + e.message;
    setS('er', 'SP500 12M: ' + e.message);
  }
}

/* ─── FRED ─── */
var FM = {
  fedfunds:'FEDFUNDS', m2:'M2SL', yield_curve:'T10Y2Y', fed_bs:'WALCL',
  cpi:'CPIAUCSL', core_cpi:'CPILFESL', tips10y:'T10YIE', unrate:'UNRATE',
  sahm:'SAHMREALTIME', jolts:'JTSJOL', hy_spread:'BAMLH0A0HYM2',
  nfci:'NFCI', indprod:'INDPRO', vixfred:'VIXCLS', sp500fred:'SP500', ib01_yield:'DGS1MO'
};

async function fredOne(seriesId) {
  var url = 'https://fred.stlouisfed.org/graph/fredgraph.csv?id=' + seriesId;
  var r = await proxyGet(url, 18000);
  var txt = await r.text();
  // Detect HTML error response
  if (txt.trim().charAt(0) === '<') throw new Error('got HTML instead of CSV');
  var rows = txt.trim().split('\n').slice(1).map(function(l) {
    var parts = l.split(',');
    var d = (parts[0]||'').trim();
    var v = (parts[1]||'').trim();
    return { date: d, val: (v === '.' || v === '') ? null : parseFloat(v) };
  }).filter(function(x){ return x.date && x.val !== null && isFinite(x.val); });
  if (!rows.length) throw new Error('empty series');
  var last = rows[rows.length-1];
  var prev1 = rows.length > 1 ? rows[rows.length-2] : last;
  var prev12 = rows.length > 12 ? rows[rows.length-13] : rows[0];
  return {
    current: last.val,
    date: last.date,
    prev: prev1.val,
    yoy: (prev12.val && prev12.val !== 0) ? (last.val - prev12.val) / Math.abs(prev12.val) * 100 : null,
    series: rows.slice(-24)
  };
}

async function fetchFred() {
  setS('ld', 'FRED: dane makroekonomiczne…');
  D.f = {};
  var keys = Object.keys(FM);
  var ok = 0, fail = 0;
  for (var i = 0; i < keys.length; i += 3) {
    var batch = keys.slice(i, i+3);
    setS('ld', 'FRED ' + (Math.floor(i/3)+1) + '/' + Math.ceil(keys.length/3) + ': ' + batch.join(', '));
    var results = await Promise.allSettled(batch.map(function(k){ return fredOne(FM[k]); }));
    results.forEach(function(r, j) {
      if (r.status === 'fulfilled') { D.f[batch[j]] = r.value; ok++; }
      else { fail++; setS('er', 'FRED ' + FM[batch[j]] + ': ' + (r.reason&&r.reason.message||'?')); }
    });
    if (i+3 < keys.length) await new Promise(function(res){ setTimeout(res, 150); });
  }
  // VIX fallback from FRED if stooq failed
  if (!D.q.vix && D.f.vixfred) {
    D.q.vix = { price: D.f.vixfred.current, prev: D.f.vixfred.prev, change: 0, date: D.f.vixfred.date };
    setS('ok', 'VIX: fallback to FRED VIXCLS = ' + D.f.vixfred.current);
  }
  setS(ok > 12 ? 'ok' : 'er', 'FRED: ' + ok + ' OK, ' + fail + ' błędów');
}

/* ─── FEAR & GREED — robust, always returns something ─── */
async function fetchFG() {
  setS('ld', 'Fear and Greed…');
  D.fg = null;

  // Source 1: CNN (primary)
  var cnnOk = false;
  try {
    var r = await proxyGet('https://production.dataviz.cnn.io/index/fearandgreed/graphdata', 10000);
    var txt = await r.text();
    // Check it's not HTML
    if (txt.trim().charAt(0) === '<') throw new Error('HTML response from CNN');
    var j = JSON.parse(txt);
    var fg = j.fear_and_greed || j;
    var score = Math.round(parseFloat(fg.score || fg.current_value || 0));
    if (score > 0 && score <= 100) {
      D.fg = {
        score: score,
        prev_close: Math.round(parseFloat(fg.previous_close||0)) || null,
        prev_week: Math.round(parseFloat(fg.previous_1_week||0)) || null,
        prev_month: Math.round(parseFloat(fg.previous_1_month||0)) || null,
        source: 'CNN'
      };
      cnnOk = true;
      setS('ok', 'F&G CNN: ' + score);
    } else {
      throw new Error('invalid score: ' + score);
    }
  } catch(e) {
    setS('er', 'CNN F&G: ' + e.message);
  }

  if (cnnOk) return;

  // Source 2: feargreedindex API
  try {
    var r2 = await proxyGet('https://fear-and-greed-index.p.rapidapi.com/v1/fgi', 8000);
    var txt2 = await r2.text();
    if (txt2.trim().charAt(0) !== '<') {
      var j2 = JSON.parse(txt2);
      var sc2 = parseInt(j2.fgi&&j2.fgi.now&&j2.fgi.now.value || 50);
      if (sc2 > 0) {
        D.fg = { score: sc2, prev_close: null, prev_week: null, prev_month: null, source: 'RapidAPI' };
        setS('ok', 'F&G RapidAPI: ' + sc2);
        return;
      }
    }
  } catch(e) {}

  // Source 3: Estimate from VIX and other data (synthetic)
  var vixNow = D.q.vix ? D.q.vix.price : (D.f.vixfred ? D.f.vixfred.current : 29);
  var sp12 = D.sp12m;
  var estScore = 50;
  if (vixNow > 35) estScore = 20;
  else if (vixNow > 28) estScore = 32;
  else if (vixNow > 22) estScore = 45;
  else if (vixNow < 16) estScore = 72;
  else if (vixNow < 13) estScore = 85;
  if (sp12 !== null) {
    if (sp12 > 25) estScore += 10;
    else if (sp12 < -10) estScore -= 10;
  }
  estScore = Math.max(5, Math.min(95, Math.round(estScore)));
  D.fg = { score: estScore, prev_close: null, prev_week: null, prev_month: null, source: 'ESTIMATE (VIX-based)' };
  setS('er', 'F&G: wszystkie zrodla niedostepne, szacunek z VIX: ' + estScore);
}

async function fetchCryptoFG() {
  try {
    var r = await proxyGet('https://api.alternative.me/fng/?limit=30&format=json', 9000);
    var txt = await r.text();
    if (txt.trim().charAt(0) === '<') throw new Error('HTML response');
    var j = JSON.parse(txt);
    var entries = j&&j.data ? j.data : [];
    if (!entries.length) throw new Error('empty');
    D.cfg = {
      score: parseInt(entries[0].value),
      rating: entries[0].value_classification,
      history: entries.slice(0,14).map(function(e){
        return {
          date: new Date(parseInt(e.timestamp)*1000).toLocaleDateString('pl-PL',{day:'2-digit',month:'2-digit'}),
          score: parseInt(e.value)
        };
      })
    };
    setS('ok', 'Crypto F&G: ' + D.cfg.score);
  } catch(e) {
    D.cfg = null;
    setS('er', 'CryptoFG: ' + e.message);
  }
}

async function fetchTreasury() {
  try {
    var url = 'https://api.fiscaldata.treasury.gov/services/api/fiscal_service/v2/accounting/od/debt_to_penny?fields=record_date,tot_pub_debt_out_amt&sort=-record_date&limit=6&format=json';
    var r = await proxyGet(url, 10000);
    var txt = await r.text();
    if (txt.trim().charAt(0) === '<') throw new Error('HTML');
    var j = JSON.parse(txt);
    D.treasury = (j&&j.data ? j.data : []).map(function(d){
      return { date: d.record_date, total: parseFloat(d.tot_pub_debt_out_amt)/1e12 };
    });
  } catch(e) { D.treasury = null; }
}

/* ─── STATIC FALLBACKS ─── */
var ST = { fed:3.75, fedDate:'Gru 2025', ism:52.4, ismDate:'Lut 2026', cape:36.2, buffett:196, us10y:4.10 };

/* ─── SCORE ENGINE ─── */
function calcScore() {
  var q = D.q||{}, f = D.f||{};
  var vix = (q.vix && q.vix.price) || (f.vixfred && f.vixfred.current) || 29.5;
  var fg = D.fg ? D.fg.score : null;
  var sp12m = D.sp12m != null ? D.sp12m : ((f.sp500fred && f.sp500fred.yoy != null) ? f.sp500fred.yoy : 17.7);
  var ib01 = (f.ib01_yield && f.ib01_yield.current != null) ? f.ib01_yield.current : 4.15;
  var sahm = (f.sahm && f.sahm.current != null) ? f.sahm.current : 0.30;
  var yc = (f.yield_curve && f.yield_curve.current != null) ? f.yield_curve.current : null;
  var hy = (f.hy_spread && f.hy_spread.current != null) ? f.hy_spread.current : 2.84;
  var fed = (f.fedfunds && f.fedfunds.current != null) ? f.fedfunds.current : ST.fed;
  var cpi = (f.cpi && f.cpi.yoy != null) ? f.cpi.yoy : null;

  var sigs = [
    {n:'VIX',         g:'Sentyment', w:3, s:vix>=30?1:vix<18?-1:0,       v:vix.toFixed(1),         d:'Kontrarianski: VIX>30=panika=okazja DCA · VIX<18=euforia'},
    {n:'Fear & Greed', g:'Sentyment', w:2, s:fg!=null?(fg<=35?1:fg>=65?-1:0):0, v:fg!=null?String(fg):'?', d:'<=35 Fear=kupuj · >=65 Greed=ostroznosc'},
    {n:'Dual Momentum',g:'Momentum',  w:3, s:sp12m>ib01?1:-1,             v:pctStr(sp12m),          d:'SP500 12M vs IB01 yield ('+ib01.toFixed(2)+'%)'},
    {n:'CAPE Shiller', g:'Wycena',    w:1, s:-1,                           v:ST.cape+'x',            d:'CAPE 36x, norma 16x, rynek drogi'},
    {n:'Buffett Ind.', g:'Wycena',    w:1, s:ST.buffett>150?-1:0,          v:ST.buffett+'%',         d:'MktCap/GDP >150%=przewartosciowany'},
    {n:'Sahm Rule',    g:'Cykl',      w:3, s:sahm<0.30?1:sahm>0.50?-1:0,  v:sahm.toFixed(2),        d:'Sahm >0.50=recesja (prog 0.50)'},
    {n:'Yield Curve',  g:'Cykl',      w:2, s:yc!=null?(yc>0.5?1:yc<-0.2?-1:0):0, v:yc!=null?yc.toFixed(2)+'%':'?', d:'>0% normalna · <0% inwersja=recesja'},
    {n:'HY Spread',    g:'Cykl',      w:2, s:hy<3.5?1:hy>6?-1:0,          v:hy.toFixed(2)+'%',      d:'<3.5% risk-on · >6% stres kredytowy'},
    {n:'ISM PMI',      g:'Cykl',      w:1, s:ST.ism>52?1:0,               v:ST.ism.toString(),      d:'PMI>50=ekspansja ('+ST.ismDate+')'},
    {n:'Fed Rate',     g:'Fed',       w:1, s:fed<3?1:fed>5?-1:0,          v:fed.toFixed(2)+'%',     d:'Cięcia Fed = wsparcie dla akcji'},
    {n:'CPI',          g:'Fed',       w:1, s:cpi!=null?(cpi<2.5?1:cpi>4?-1:0):0, v:cpi!=null?cpi.toFixed(1)+'%':'?', d:'Cel 2% · <2.5%=OK · >4%=podwyzki'},
  ];

  var maxW = sigs.reduce(function(a,x){ return a+x.w; }, 0);
  var raw  = sigs.reduce(function(a,x){ return a+x.s*x.w; }, 0);
  var norm = Math.round((raw + maxW) / (2*maxW) * 100);

  var verdict, color, vhg;
  if (norm >= 68) { verdict='KUP';             color='#00e5a0'; vhg='rgba(0,229,160,.10)'; }
  else if (norm >= 55) { verdict='KUP OSTROŻNIE'; color='#00e5a0'; vhg='rgba(0,229,160,.07)'; }
  else if (norm >= 42) { verdict='TRZYMAJ/DCA';  color='#ffc820'; vhg='rgba(255,200,32,.07)'; }
  else if (norm >= 28) { verdict='WSTRZYMAJ';    color='#ff8c42'; vhg='rgba(255,140,66,.07)'; }
  else                 { verdict='UNIKAJ';        color='#ff4060'; vhg='rgba(255,64,96,.08)'; }
  if (vix >= 28 && norm >= 30) { verdict='KUP (DOŁEK?)'; color='#00e5a0'; vhg='rgba(0,229,160,.12)'; }

  return {
    sigs:sigs, norm:norm, verdict:verdict, color:color, vhg:vhg,
    vix:vix, fg:fg, sp12m:sp12m, ib01:ib01, dm_bull:sp12m>ib01,
    sahm:sahm, yc:yc, hy:hy, fed:fed, cpi:cpi,
    bulls: sigs.filter(function(x){return x.s>0;}).map(function(x){return x.n;}),
    bears: sigs.filter(function(x){return x.s<0;}).map(function(x){return x.n;})
  };
}

function buildSched() {
  var out = [], start = new Date(2026,2,12);
  for (var w=1; w<=42; w++) {
    var d = new Date(start.getTime() + (w-1)*7*86400000);
    var m = d.getMonth()+1;
    var boost = (m===8||m===9) ? 1.3 : 1.0;
    var pp = PORTS[(w-1)%5];
    out.push({
      w:w, p:pp, boost:boost,
      day: d.toLocaleDateString('pl-PL',{day:'2-digit',month:'2-digit'}),
      usd: pp.bud_usd ? Math.round(pp.bud_usd/52*boost) : null,
      eur: pp.bud_eur ? Math.round(pp.bud_eur/52*boost) : null
    });
  }
  return out;
}

  + '</div>'
  + '<div class="sl">Cykl płynności — 4 fazy inwestycyjne</div>'
  + '<div class="liq-cycle">'
  + '<div class="cyc" style="border-left:3px solid #00e5a0"><div class="cyc-n" style="color:#00e5a0">&#9312;</div><div class="cyc-t">Ekspansja</div><div class="cyc-d">Fed obniża stopy lub QE. M2 rośnie. Kredyt tanieje. Inwestorzy szukają zwrotu poza obligacjami.</div><div class="cyc-a" style="background:rgba(0,229,160,.1);color:#00e5a0;border:1px solid rgba(0,229,160,.2)">&#8594; KUP akcje, krypto</div></div>'
  + '<div class="cyc" style="border-left:3px solid #3db8f5"><div class="cyc-n" style="color:#3db8f5">&#9313;</div><div class="cyc-t">Szczyt/Zacieśnienie</div><div class="cyc-d">Fed zaczyna podwyżki lub QT. Płynność zaczyna maleć. M2 spowalnia. Akcje osiągają szczyty z wyprzedzeniem.</div><div class="cyc-a" style="background:rgba(61,184,245,.1);color:#3db8f5;border:1px solid rgba(61,184,245,.2)">&#8594; Redukuj ryzyko</div></div>'

  + '</div>'

  + '<tr style="background:rgba(255,255,255,.01)"><td style="color:#ff8c42;font-weight:700">Ropa (CL)</td><td>CTA trend following: long/short wg ceny</td><td>Wzrost M2 + ożywienie &#8594; popyt na ropę</td><td>Niski non-comm long = brak spekulacji, negatywne</td></tr>'

/* ═══ RENDER PORTFOLIO ═══ */
function renderPortfolio() {
  var el = document.getElementById('p-portfolio');
  if (!el) return;
  var f = D.f||{};
  var sp12m = D.sp12m!=null ? D.sp12m : ((f.sp500fred&&f.sp500fred.yoy!=null)?f.sp500fred.yoy:17.7);
  var ib01 = (f.ib01_yield&&f.ib01_yield.current!=null) ? f.ib01_yield.current : 4.15;
  var dm = sp12m > ib01;
  var sched = buildSched();
  var rC = ['','#00e5a0','#00e5a0','#84cc16','#ffc820','#ff8c42','#ff4060','#dc2626'];
  function rbar(r) {
    var h = '<div class="rb">';
    for (var i=0;i<7;i++) h += '<div class="rs" style="background:'+(i<r?rC[r]:'var(--s4)')+'"></div>';
    h += '<span style="font-size:9px;color:'+rC[r]+';margin-left:4px">'+r+'/7</span></div>';
    return h;
  }
  var ports = PORTS.map(function(p) {
    return '<div class="pc" style="border-color:'+p.color+'20;background:linear-gradient(160deg,'+p.color+'05,transparent)">'
      + '<div class="pc-id" style="color:'+p.color+'">'+p.id+'</div>'
      + '<div class="pc-nm">'+p.name+'</div>'
      + '<div class="pc-b">'+(p.bud_usd?'<span style="color:#00e5a0">$'+p.bud_usd+'</span>':'')+' '+(p.bud_eur?'<span style="color:#ffc820">&#8364;'+p.bud_eur+'</span>':'')+'</div>'
      + '<div class="pc-tp" style="background:'+p.color+'15;color:'+p.color+'">'+p.type+'</div>'
      + '<div class="pc-et">'+p.etfs.join('<br>')+'</div>'
      + '<div class="pc-dm" style="color:'+(dm?p.color:'#ffc820')+'">DM: '+(dm?p.etfs[0].split(' ')[0]:p.dm_safe)+'</div>'
      + (p.special?'<div class="pc-sp">'+p.special+'</div>':'')
      + '</div>';
  }).join('');
  var schedRows = sched.slice(0,35).map(function(r) {
    var etf = dm ? r.p.etfs[0].split(' ')[0] : r.p.dm_safe;
    var sea = r.boost > 1;
    return '<tr><td style="color:var(--t3)">T'+r.w+'</td><td style="color:var(--t1);white-space:nowrap">Czw '+r.day+'</td>'
      + '<td><span class="ptag" style="background:'+r.p.color+'20;color:'+r.p.color+'">'+r.p.id+'</span></td>'
      + '<td style="color:'+(dm?'#00e5a0':'#ffc820')+';font-weight:700">'+etf+'</td>'
      + '<td style="color:'+(sea?'#00e5a0':'var(--t1)')+'">'+(r.usd?'$'+r.usd:'')+'</td>'
      + '<td style="color:'+(sea?'#00e5a0':'#ffc820')+'">'+(r.eur?'&#8364;'+r.eur:'')+'</td>'
      + '<td style="font-size:9.5px;color:'+(sea?'#00e5a0':'var(--t3)')+'">'+(sea?'&#11088; +30%':'')+'</td></tr>';
  }).join('');
  var etblRows = ETFS_DATA.map(function(e) {
    return '<tr><td style="color:'+e.color+';font-weight:700">'+e.id+'</td>'
      + '<td style="font-size:10px;color:var(--t2)">'+e.isin+'</td>'
      + '<td style="color:'+(e.ter<0.1?'#00e5a0':'var(--t1)')+';font-weight:600">'+e.ter+'%</td>'
      + '<td style="text-align:center">'+e.holds.toLocaleString()+'</td>'
      + '<td>'+rbar(e.risk)+'</td>'
      + '<td style="font-size:9.5px">'+(e.risk===2?'Obligacje':'Akcje')+'</td>'
      + '<td><a href="'+e.link+'" target="_blank" style="color:var(--B);font-size:9.5px">justETF &#8594;</a></td></tr>';
  }).join('');
  el.innerHTML = '<div class="wrap">'
  + '<div class="dmb '+(dm?'bull':'bear')+'">'
  + '<div><div class="dm-l2">Dual Momentum Signal</div><div class="dm-s" style="color:'+(dm?'#00e5a0':'#ffc820')+'">'+(dm?'&#128200; Kup akcje ETF':'&#128201; Przejdź na IB01')+'</div></div>'
  + '<div class="dm-n">SP500 12M: <b style="color:'+(dm?'#00e5a0':'#ff4060')+'">'+pctStr(sp12m)+'</b> vs IB01: <b>'+ib01.toFixed(2)+'%</b> &bull; Spread: <b style="color:'+(dm?'#00e5a0':'#ff4060')+'">'+(sp12m-ib01).toFixed(1)+' pp</b></div>'
  + '<div class="dm-note">'+(dm?'Kontynuuj DCA w akcje.':'DCA przenieść na IB01 lub EDO.')+' Sprawdzaj 1. dnia miesiąca.</div>'
  + '</div>'
  + '<div class="sl">Moje 5 portfeli</div>'
  + '<div class="pgrid">'+ports+'</div>'
  + '<div class="sl">Harmonogram 2026 — co czwartek</div>'
  + '<div class="sw"><table class="stbl"><thead><tr><th>Tyg</th><th>Data</th><th>Portfel</th><th>Kup ETF</th><th>USD</th><th>EUR</th><th>Uwaga</th></tr></thead><tbody>'+schedRows+'<tr><td colspan="7" style="padding:8px 11px;font-size:9.5px;color:var(--t3);text-align:center">&#8230; rotacja P1&#8594;P5 do końca 2026</td></tr></tbody></table></div>'
  + '<div class="rc"><b>Zasady DCA 2026:</b> Czwartek (+0.11% avg) &bull; <b style="color:#00e5a0">+30% Sierpień/Wrzesień</b> &bull; Dual Momentum: sprawdzaj 1. miesiąca &bull; <b style="color:#00e5a0">VIX&gt;30=okazja, nie zagrożenie</b> &bull; Rebalans 28 Grudnia &bull; IKZE limit ~9 388 PLN &bull; IKE limit ~23 470 PLN</div>'
  + '<div class="sl">Baza ETF</div>'
  + '<div class="ew"><table class="etbl"><thead><tr><th>ETF</th><th>ISIN</th><th>TER</th><th>Holdings</th><th>Ryzyko SRI</th><th>Typ</th><th>Link</th></tr></thead><tbody>'+etblRows+'</tbody></table></div>'
  + '</div>';
}

/* ═══ RENDER DATA ═══ */

  var srcRows = [
    ['stooq.com','Ceny live CSV',sq+'/'+Object.keys(SQ).length+' OK','#00e5a0'],
    ['FRED St. Louis Fed','Dane makro',fr+'/'+Object.keys(FM).length+' OK','#00e5a0'],
    ['CNN / proxy','Fear &amp; Greed',D.fg?(D.fg.score+' ('+D.fg.source+')'):'&#8230;','#ffc820'],
    ['alternative.me','Crypto F&amp;G',D.cfg?(D.cfg.score+'/100'):'&#8230;','#ffc820'],
    ['fiscaldata.treasury.gov','Dług USA',D.treasury?(D.treasury[0]&&D.treasury[0].total?D.treasury[0].total.toFixed(1)+' bln$':'ok'):'&#8230;','#ffc820'],
    ['portfel.dzonyiks.workers.dev','Cloudflare Proxy','Aktywny &#10003;','#00e5a0'],

    ['CFTC.gov','COT raporty','Dane strukturalne','#3db8f5'],
  ];
  var logHtml = LOG.slice(0,60).map(function(l) {
    var c = l.state==='er'?'#ff4060':l.state==='ok'?'#00e5a0':'#ffc820';
    var lc = l.state==='er'?'#fca5a5':'var(--t1)';
    var ic = l.state==='er'?'&#10007;':l.state==='ok'?'&#10003;':'&#8635;';
    return '<div class="lr"><span class="lts">'+l.ts+'</span><span class="lic" style="color:'+c+'">'+ic+'</span><span class="lmsg" style="color:'+lc+'">'+l.msg+'</span></div>';
  }).join('');
  el.innerHTML = '<div class="wrap">'
  + '<div class="dstats">'
  + '<div class="ds"><div class="ds-l">Stooq.com</div><div class="ds-n" style="color:'+(sq>12?'#00e5a0':'#ffc820')+'">'+sq+'</div><div class="ds-s">symboli z '+Object.keys(SQ).length+'</div></div>'
  + '<div class="ds"><div class="ds-l">FRED Makro</div><div class="ds-n" style="color:'+(fr>12?'#00e5a0':'#ffc820')+'">'+fr+'</div><div class="ds-s">serii z '+Object.keys(FM).length+'</div></div>'
  + '<div class="ds"><div class="ds-l">SP500 12M</div><div class="ds-n" style="color:#00e5a0">'+pctStr(sp12m)+'</div><div class="ds-s">'+(D.sp12m_src||'&#8212;')+'</div></div>'
  + '</div>'
  + '<div class="sl">Źródła i status</div>'
  + '<div class="srct"><table class="stx"><tbody>'+srcRows.map(function(r,i){return '<tr style="background:'+(i%2?'transparent':'rgba(255,255,255,.01)')+'"><td style="color:var(--t0);font-weight:500;width:200px">'+r[0]+'</td><td style="color:var(--t2);font-size:10px">'+r[1]+'</td><td style="color:'+r[3]+';font-weight:600">'+r[2]+'</td></tr>';}).join('')+'</tbody></table></div>'
  + '<div class="sl">Log</div>'
  + '<div class="log">'+(logHtml||'<div style="color:var(--t3)">Brak logów&#8230;</div>')+'</div>'
  + '</div>';
}

/* ═══ PIPELINE ═══ */
async function fetchAll() {
  setS('ld', 'Start…');
  await Promise.all([fetchStooq(), fetchSP500_12M()]);
  renderTicker(); renderDecision(); renderPortfolio(); renderCOT(); renderLiquidity();
  await Promise.all([fetchFG(), fetchCryptoFG()]);
  renderDecision();
  await fetchFred();
  renderDecision(); renderIndicators(); renderPortfolio(); renderLiquidity();
  await fetchTreasury();
  renderData();
  var tot = Object.keys(D.q||{}).length + Object.keys(D.f||{}).length;
  setS('ok', 'Załadowane — ' + tot + ' serii danych');
  var e = document.getElementById('lu');
  if (e) e.textContent = 'Odśw: ' + new Date().toLocaleTimeString('pl-PL');
}
setInterval(fetchAll, 10*60*1000);

/* ═══ TABS ═══ */
document.addEventListener('DOMContentLoaded', function() {
  document.querySelectorAll('.tab').forEach(function(btn) {
    btn.addEventListener('click', function() {
      document.querySelectorAll('.tab').forEach(function(b){ b.classList.remove('on'); });
      document.querySelectorAll('.panel').forEach(function(p){ p.classList.remove('on'); });
      btn.classList.add('on');
      var t = btn.getAttribute('data-t');
      var panel = document.getElementById('p-' + t);
      if (panel) panel.classList.add('on');
      if (t==='indicators') renderIndicators();
      if (t==='cot') renderCOT();
      if (t==='liquidity') renderLiquidity();
      if (t==='portfolio') renderPortfolio();
      if (t==='data') renderData();
    });
  });
  var r = document.getElementById('btnR');
  if (r) r.addEventListener('click', fetchAll);
  fetchAll();
});
</script>
