<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>MacroTerminal v25 — Kiedy kupować ETF?</title>
<meta name="viewport" content="width=device-width, initial-scale=0.95">
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📊</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,300;0,14..32,400;0,14..32,500;0,14..32,600;0,14..32,700&family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,600;12..96,700;12..96,800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;-webkit-font-smoothing:antialiased}
:root{
  --bg:#05080f;--bg1:#080d16;--bg2:#0c1220;--bg3:#101828;--bg4:#16202e;
  --line:rgba(255,255,255,.07);--line2:rgba(255,255,255,.12);--line3:rgba(255,255,255,.18);
  --surf:rgba(255,255,255,.035);--surf2:rgba(255,255,255,.055);--surf3:rgba(255,255,255,.08);
  --em:#10b981;--em-d:rgba(16,185,129,.12);--em-g:rgba(16,185,129,.25);
  --sky:#38bdf8;--sky-d:rgba(56,189,248,.10);
  --rose:#f43f5e;--rose-d:rgba(244,63,94,.10);
  --amb:#f59e0b;--amb-d:rgba(245,158,11,.10);
  --vio:#8b5cf6;--vio-d:rgba(139,92,246,.10);
  --or:#f97316;
  --t1:#f0f6ff;--t2:#94a3b8;--t3:#475569;--t4:#1e2d3d;
  --sans:'Inter',sans-serif;--display:'Bricolage Grotesque',sans-serif;
  --rad:12px;--rads:8px;--radl:16px;--radxl:20px;
}
body{background:var(--bg);color:var(--t1);font-family:var(--sans);font-size:13px}
::-webkit-scrollbar{width:4px;height:4px}::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:99px}

.app{display:grid;grid-template-rows:52px 30px 44px 1fr;height:100vh;overflow:hidden}

/* TOPBAR */
.topbar{background:rgba(5,8,15,.92);backdrop-filter:blur(20px);border-bottom:1px solid var(--line);
  display:flex;align-items:center;gap:12px;padding:0 22px;position:relative;z-index:100}
.topbar::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent 5%,var(--em) 40%,var(--sky) 60%,transparent 95%);opacity:.4}
.brand-name{font-family:var(--display);font-size:16px;font-weight:800;letter-spacing:-.3px;
  background:linear-gradient(135deg,var(--t1),var(--t2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.brand-v{font-size:10px;font-weight:500;padding:1px 7px;border-radius:99px;
  background:var(--em-d);color:var(--em);border:1px solid rgba(16,185,129,.2);-webkit-text-fill-color:var(--em);margin-left:6px}
.sdot-wrap{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--t3)}
.sdot{width:6px;height:6px;border-radius:50%;transition:all .3s;flex-shrink:0}
.sdot-live{background:var(--em);box-shadow:0 0 8px var(--em-g)}
.sdot-load{background:var(--amb);animation:dpulse 1s ease infinite}
.sdot-err{background:var(--rose)}
@keyframes dpulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.8)}}
#stext{max-width:260px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;transition:all .2s}
.tr{margin-left:auto;display:flex;align-items:center;gap:10px}
.clk{font-size:11px;color:var(--t3);font-variant-numeric:tabular-nums}
.btn{font-size:11px;font-weight:500;padding:5px 13px;border-radius:var(--rads);
  border:1px solid var(--line2);background:var(--surf);color:var(--t2);cursor:pointer;
  font-family:var(--sans);transition:all .15s}
.btn:hover{border-color:var(--line3);background:var(--surf2);color:var(--t1)}

/* TICKER */
.ticker{background:var(--bg1);border-bottom:1px solid var(--line);overflow:hidden;display:flex;align-items:center}
.ttrack{display:flex;white-space:nowrap;animation:tscroll 100s linear infinite}
.ttrack:hover{animation-play-state:paused}
@keyframes tscroll{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
.ti{display:inline-flex;align-items:center;gap:7px;padding:0 18px;border-right:1px solid var(--line);height:30px}
.tin{font-size:10px;color:var(--t3);font-weight:500}
.tip{font-size:11px;font-weight:600;font-variant-numeric:tabular-nums}
.tic{font-size:10px;font-weight:500}
.up{color:var(--em)}.dn{color:var(--rose)}.neu{color:var(--t2)}

/* TABS */
.tabs{background:var(--bg1);border-bottom:1px solid var(--line);display:flex;align-items:stretch;padding:0 10px;gap:0}
.tab{font-family:var(--sans);font-size:11.5px;font-weight:500;padding:0 15px;color:var(--t3);
  border:none;background:transparent;cursor:pointer;
  border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s;white-space:nowrap;
  display:flex;align-items:center;gap:5px}
.tab:hover{color:var(--t1)}.tab.on{color:var(--t1);border-bottom-color:var(--em)}
.tab-end{flex:1;display:flex;align-items:center;justify-content:flex-end;padding-right:8px}
.lupd{font-size:10px;color:var(--t4)}

/* PANELS */
.panel{display:none;height:100%;overflow-y:auto;overflow-x:hidden}
.panel.on{display:block}
.wrap{padding:18px 22px 26px}

/* CARDS */
.card{background:var(--surf);border:1px solid var(--line);border-radius:var(--rad);transition:border-color .2s}
.card:hover{border-color:var(--line2)}
.card.g{border-left:3px solid var(--em)}.card.r{border-left:3px solid var(--rose)}.card.y{border-left:3px solid var(--amb)}.card.b{border-left:3px solid var(--sky)}

/* SECTION LABEL */
.sl{font-size:11px;font-weight:600;letter-spacing:.8px;color:var(--t3);text-transform:uppercase;
  margin:22px 0 12px;display:flex;align-items:center;gap:8px}
.sl:first-child{margin-top:0}
.sl::after{content:'';flex:1;height:1px;background:var(--line)}

/* ═══ DECISION ═══ */
.dh{display:grid;grid-template-columns:270px 1fr;gap:14px;margin-bottom:18px}
.vcard{background:var(--surf);border:1px solid var(--line);border-radius:var(--radxl);
  padding:24px 20px;display:flex;flex-direction:column;align-items:center;text-align:center;
  position:relative;overflow:hidden;min-height:240px}
.vcard::before{content:'';position:absolute;inset:0;pointer-events:none;
  background:radial-gradient(ellipse 80% 55% at 50% -5%,var(--vg,rgba(16,185,129,.12)),transparent);transition:all .6s}
.veyebrow{font-size:9px;font-weight:700;letter-spacing:1.5px;color:var(--t3);text-transform:uppercase;margin-bottom:10px;position:relative}
.vring{position:relative;display:inline-flex;align-items:center;justify-content:center;margin-bottom:12px}
.vring svg{transform:rotate(-90deg)}
.vring-lbl{position:absolute;font-family:var(--display);font-size:20px;font-weight:700;color:var(--t1)}
.vword{font-family:var(--display);font-size:32px;font-weight:800;line-height:1;margin-bottom:5px;position:relative;letter-spacing:-.5px}
.vscore{font-size:11px;color:var(--t3);margin-bottom:14px;position:relative}
.vscore b{color:var(--t1);font-size:14px}
.vchips{display:flex;flex-wrap:wrap;gap:5px;justify-content:center;position:relative;margin-bottom:12px}
.chip{font-size:9.5px;font-weight:600;padding:3px 10px;border-radius:99px;border:1px solid;white-space:nowrap}
.cg{background:var(--em-d);color:var(--em);border-color:rgba(16,185,129,.25)}
.cr{background:var(--rose-d);color:var(--rose);border-color:rgba(244,63,94,.25)}
.cy{background:var(--amb-d);color:var(--amb);border-color:rgba(245,158,11,.25)}
.cb{background:var(--sky-d);color:var(--sky);border-color:rgba(56,189,248,.25)}
.cv{background:var(--vio-d);color:var(--vio);border-color:rgba(139,92,246,.25)}
.vdet{font-size:11px;color:var(--t2);line-height:1.6;position:relative;
  border-top:1px solid var(--line);padding-top:11px;width:100%}

/* Gauges */
.gright{display:flex;flex-direction:column;gap:11px}
.gpair{display:grid;grid-template-columns:1fr 1fr;gap:11px}
.gc{background:var(--surf);border:1px solid var(--line);border-radius:var(--rad);padding:14px 16px}
.glbl{font-size:9.5px;font-weight:600;letter-spacing:.5px;color:var(--t3);text-transform:uppercase;margin-bottom:8px}
.gnum{font-family:var(--display);font-size:42px;font-weight:300;line-height:1;margin-bottom:2px;font-variant-numeric:tabular-nums}
.gstatus{font-size:11px;font-weight:700;letter-spacing:.5px;margin-bottom:10px}
.gbar{position:relative;height:5px;background:rgba(255,255,255,.06);border-radius:99px;overflow:visible;margin-bottom:4px}
.gfill{position:absolute;left:0;top:0;height:5px;border-radius:99px;
  background:linear-gradient(90deg,#f43f5e,#f59e0b,#10b981);transition:width .9s cubic-bezier(.4,0,.2,1)}
.gneedle{position:absolute;top:50%;transform:translate(-50%,-50%);
  width:13px;height:13px;border-radius:50%;background:white;border:2px solid var(--bg);
  box-shadow:0 0 0 3px rgba(255,255,255,.15);transition:left .9s cubic-bezier(.4,0,.2,1)}
.gticks{display:flex;justify-content:space-between;font-size:9px;color:var(--t4);margin-top:3px}
.gctx{display:grid;grid-template-columns:1fr 1fr 1fr;gap:5px;margin-top:10px}
.gct{background:var(--bg3);border-radius:7px;padding:6px 7px;text-align:center}
.gct-l{font-size:9px;color:var(--t3);margin-bottom:2px}.gct-v{font-size:13px;font-weight:700}
.gexp{font-size:11px;color:var(--t2);line-height:1.65;margin-top:10px;padding-top:10px;border-top:1px solid var(--line)}
.gexp b{color:var(--t1)}
.spark-row{display:flex;align-items:flex-end;gap:3px;height:42px}
.sbar{min-width:5px;border-radius:2px 2px 0 0;background:var(--bg4);transition:all .2s;cursor:pointer;flex:1}
.sbar:hover{filter:brightness(1.5)}
.sbar.em{background:var(--em)}.sbar.ro{background:var(--rose)}.sbar.am{background:var(--amb)}

/* History */
.hgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:11px;margin-bottom:18px}
.hcard{background:var(--surf);border:1px solid var(--line);border-radius:var(--rad);padding:15px;
  position:relative;overflow:hidden;transition:transform .2s,border-color .2s}
.hcard:hover{transform:translateY(-2px);border-color:var(--line2)}
.hcard::after{content:'';position:absolute;bottom:0;left:0;right:0;height:3px;background:var(--hc,#1e2d3d)}
.hera{font-size:10px;font-weight:700;letter-spacing:.5px;margin-bottom:3px;text-transform:uppercase}
.htit{font-family:var(--display);font-size:13.5px;font-weight:700;margin-bottom:10px;color:var(--t1)}
.hrow{display:flex;justify-content:space-between;align-items:center;padding:4px 0;border-bottom:1px solid var(--line)}
.hrow:last-of-type{border:none}.hrow-k{font-size:10px;color:var(--t3)}.hrow-v{font-size:11px;font-weight:600}
.hresult{font-size:10px;color:var(--t2);line-height:1.6;margin-top:10px;padding-top:10px;border-top:1px solid var(--line)}
.hbadge{display:inline-block;margin-top:7px;padding:3px 10px;border-radius:99px;font-size:9px;font-weight:700;letter-spacing:.5px}

/* Signals */
.sigs{background:var(--surf);border:1px solid var(--line);border-radius:var(--rad);overflow:hidden}
.sg-hdr{padding:7px 14px;background:rgba(255,255,255,.02);font-size:10px;font-weight:600;
  letter-spacing:.8px;color:var(--t3);text-transform:uppercase;border-bottom:1px solid var(--line)}
.srow{display:grid;grid-template-columns:1fr 90px 110px 1fr;align-items:center;
  padding:9px 14px;border-bottom:1px solid var(--line);transition:background .12s}
.srow:hover{background:rgba(255,255,255,.02)}.srow:last-child{border-bottom:none}
.srow.hdr{background:var(--bg3);font-size:10px;font-weight:600;color:var(--t3);letter-spacing:.5px}
.sname{font-size:11.5px;font-weight:500;color:var(--t1)}.sval{font-size:13px;font-weight:700;text-align:center;font-variant-numeric:tabular-nums}
.spill{font-size:10px;font-weight:600;padding:3px 10px;border-radius:99px;text-align:center;display:inline-block}
.spg{background:var(--em-d);color:var(--em);border:1px solid rgba(16,185,129,.2)}
.spr{background:var(--rose-d);color:var(--rose);border:1px solid rgba(244,63,94,.2)}
.spy{background:var(--amb-d);color:var(--amb);border:1px solid rgba(245,158,11,.2)}
.sdesc{font-size:11px;color:var(--t3);padding-left:10px}
.notebar{background:rgba(16,185,129,.05);border:1px solid rgba(16,185,129,.1);border-radius:var(--rad);
  padding:12px 15px;font-size:11.5px;color:var(--t2);line-height:1.7;margin-top:14px}
.notebar b{color:var(--t1)}

/* ═══ INDICATORS ═══ */
.igrid{display:grid;grid-template-columns:repeat(3,1fr);gap:11px;margin-bottom:18px}
.icard{background:var(--surf);border:1px solid var(--line);border-radius:var(--rad);
  padding:15px 16px;transition:border-color .2s,transform .2s}
.icard:hover{border-color:var(--line2);transform:translateY(-1px)}
.icard.g{border-left:3px solid var(--em)}.icard.r{border-left:3px solid var(--rose)}.icard.y{border-left:3px solid var(--amb)}
.ihead{display:flex;justify-content:space-between;align-items:start;margin-bottom:7px}
.itit{font-size:11px;font-weight:600;color:var(--t2);line-height:1.3}.isrc{font-size:9px;color:var(--t4);text-align:right}
.ival{font-family:var(--display);font-size:28px;font-weight:600;line-height:1;margin-bottom:2px}
.idate{font-size:10px;color:var(--t3);margin-bottom:7px}
.ibadge{font-size:10px;font-weight:600;padding:3px 10px;border-radius:99px;display:inline-flex;align-items:center;gap:4px;margin-bottom:9px}
.idesc{font-size:11px;color:var(--t3);line-height:1.6;margin-top:7px;padding-top:7px;border-top:1px solid var(--line)}
.iio{margin-top:7px;font-size:10.5px;line-height:1.7}
.lgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:18px}
.lnk{display:block;padding:10px 13px;text-align:center;background:var(--surf);border:1px solid var(--line);
  border-radius:var(--rads);font-size:11px;font-weight:600;color:var(--sky);text-decoration:none;
  font-family:var(--sans);transition:all .15s}
.lnk:hover{border-color:rgba(56,189,248,.3);background:var(--sky-d);transform:translateY(-1px)}

/* ═══ COT PANEL ═══ */
.cot-intro{background:var(--surf);border:1px solid var(--line);border-radius:var(--rad);
  padding:16px 20px;margin-bottom:18px}
.cot-intro h3{font-family:var(--display);font-size:15px;font-weight:700;margin-bottom:10px;color:var(--t1)}
.cot-intro p{font-size:12px;color:var(--t2);line-height:1.7;margin-bottom:8px}
.cot-intro p:last-child{margin-bottom:0}
.cot-actors{display:grid;grid-template-columns:repeat(3,1fr);gap:11px;margin-bottom:18px}
.actor-card{background:var(--surf);border:1px solid var(--line);border-radius:var(--rad);padding:15px}
.ac-icon{font-size:22px;margin-bottom:8px}
.ac-name{font-family:var(--display);font-size:13px;font-weight:700;margin-bottom:4px}
.ac-sub{font-size:10px;color:var(--t3);font-weight:600;letter-spacing:.5px;text-transform:uppercase;margin-bottom:8px}
.ac-desc{font-size:11px;color:var(--t2);line-height:1.65}
.ac-rule{font-size:11px;font-weight:600;margin-top:8px;padding:5px 8px;border-radius:6px;line-height:1.4}
.cot-markets{display:grid;grid-template-columns:repeat(2,1fr);gap:11px;margin-bottom:18px}
.mcard{background:var(--surf);border:1px solid var(--line);border-radius:var(--rad);padding:15px;overflow:hidden}
.mc-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.mc-name{font-family:var(--display);font-size:14px;font-weight:700}
.mc-code{font-size:9px;color:var(--t4);letter-spacing:.5px}
.mc-pos-row{display:grid;grid-template-columns:80px 1fr 60px;align-items:center;gap:8px;margin-bottom:8px}
.mc-pos-lbl{font-size:10px;color:var(--t2);font-weight:600}
.mc-bar-wrap{position:relative;height:8px;background:rgba(255,255,255,.05);border-radius:99px;overflow:hidden}
.mc-bar-fill{position:absolute;top:0;height:8px;border-radius:99px;transition:width .6s}
.mc-pos-val{font-size:10px;font-weight:700;text-align:right;font-variant-numeric:tabular-nums}
.mc-signal{font-size:11px;font-weight:600;margin-top:10px;padding:6px 10px;border-radius:7px;line-height:1.5}
.mc-note{font-size:10.5px;color:var(--t3);line-height:1.6;margin-top:8px}
.cot-legend{display:grid;grid-template-columns:repeat(3,1fr);gap:11px;margin-bottom:18px}
.leg-card{background:var(--surf);border:1px solid var(--line);border-radius:var(--rad);padding:13px}
.leg-title{font-size:11px;font-weight:700;margin-bottom:6px;color:var(--t1)}
.leg-desc{font-size:11px;color:var(--t3);line-height:1.65}
.cot-links{display:grid;grid-template-columns:repeat(3,1fr);gap:11px}
.cot-link-card{display:block;padding:14px 16px;background:var(--surf);border:1px solid var(--line);
  border-radius:var(--rad);text-decoration:none;transition:all .2s}
.cot-link-card:hover{border-color:var(--line2);transform:translateY(-2px)}
.cl-icon{font-size:24px;margin-bottom:8px}
.cl-title{font-size:13px;font-weight:700;color:var(--t1);margin-bottom:4px;font-family:var(--display)}
.cl-desc{font-size:11px;color:var(--t3);line-height:1.6}
.cl-url{font-size:10px;color:var(--sky);margin-top:6px}

/* ═══ LIQUIDITY PANEL ═══ */
.liq-hero{display:grid;grid-template-columns:1fr 1fr 1fr;gap:11px;margin-bottom:18px}
.lhcard{background:var(--surf);border:1px solid var(--line);border-radius:var(--rad);padding:16px}
.lh-num{font-family:var(--display);font-size:36px;font-weight:300;line-height:1;margin-bottom:3px}
.lh-lbl{font-size:10px;font-weight:600;letter-spacing:.8px;color:var(--t3);text-transform:uppercase;margin-bottom:10px}
.lh-sub{font-size:11px;color:var(--t3)}
.liq-layers{display:grid;grid-template-columns:1fr;gap:0;margin-bottom:18px;
  background:var(--surf);border:1px solid var(--line);border-radius:var(--rad);overflow:hidden}
.liq-layer{padding:15px 18px;border-bottom:1px solid var(--line);display:grid;grid-template-columns:100px 1fr 200px;gap:14px;align-items:start}
.liq-layer:last-child{border-bottom:none}
.ll-tag{font-family:var(--display);font-size:22px;font-weight:800;display:flex;flex-direction:column}
.ll-label{font-size:10px;font-weight:600;color:var(--t3);letter-spacing:.5px;margin-top:4px}
.ll-def{font-size:12px;color:var(--t2);line-height:1.7}
.ll-def b{color:var(--t1)}
.ll-sig{font-size:11px;padding:8px 12px;border-radius:8px;line-height:1.6}
.liq-cycle{display:grid;grid-template-columns:repeat(4,1fr);gap:11px;margin-bottom:18px}
.cycard{background:var(--surf);border:1px solid var(--line);border-radius:var(--rad);padding:14px}
.cy-num{font-family:var(--display);font-size:28px;font-weight:700;margin-bottom:4px}
.cy-title{font-size:12px;font-weight:700;color:var(--t1);margin-bottom:6px}
.cy-desc{font-size:11px;color:var(--t3);line-height:1.65}
.cy-action{font-size:11px;font-weight:600;margin-top:8px;padding:5px 9px;border-radius:6px}
.liq-flows{background:var(--surf);border:1px solid var(--line);border-radius:var(--rad);overflow:hidden;margin-bottom:18px}
.lf-table{width:100%;border-collapse:collapse;font-size:12px}
.lf-table th{background:var(--bg3);color:var(--t3);padding:9px 14px;text-align:left;
  font-size:10px;font-weight:700;letter-spacing:.5px;border-bottom:1px solid var(--line)}
.lf-table td{padding:9px 14px;border-bottom:1px solid var(--line);color:var(--t2)}
.lf-table tr:hover td{background:rgba(255,255,255,.02)}
.lf-table tr:last-child td{border-bottom:none}
.liq-source{display:grid;grid-template-columns:repeat(3,1fr);gap:11px}
.lscard{display:block;padding:14px;background:var(--surf);border:1px solid var(--line);
  border-radius:var(--rad);text-decoration:none;transition:all .2s}
.lscard:hover{border-color:var(--line2);transform:translateY(-2px)}
.ls-icon{font-size:22px;margin-bottom:7px}

function setS(state,msg){
  const d=document.getElementById('sdot'),t=document.getElementById('stext');
  if(d) d.className='sdot '+(state==='ok'?'sdot-live':state==='err'?'sdot-err':'sdot-load');
  if(t) t.textContent=msg.slice(0,70);
  LOG.unshift({ts:new Date().toLocaleTimeString('pl-PL'),state,msg});
  if(LOG.length>120)LOG.pop();
}

async function get(url,ms=15000){
  const full=`${PROXY}?url=${encodeURIComponent(url)}`;
  const c=new AbortController(),t=setTimeout(()=>c.abort(),ms);
  try{const r=await fetch(full,{signal:c.signal});clearTimeout(t);if(!r.ok)throw new Error('HTTP '+r.status);return r;}
  catch(e){clearTimeout(t);throw e;}
}

// STOOQ
const SYMS={sp500:'^spx',nasdaq:'^ndx',dj:'^dji',gold:'xauusd',silver:'xagusd',oil:'cl.f',natgas:'ng.f',copper:'hg.f',usdpln:'usdpln',eurpln:'eurpln',eurusd:'eurusd',gbpusd:'gbpusd',usdjpy:'usdjpy',dxy:'dxy',us10y:'10usy.b',us2y:'2usy.b',btcusd:'btcusd',ethusd:'ethusd',wig20:'wig20',vix:'^vix'};
async function stooqOne(sym){
  const r=await get(`https://stooq.com/q/d/l/?s=${encodeURIComponent(sym)}&i=d`,11000);
  const txt=await r.text();
  if(!txt||txt.includes('No data')||txt.trim().length<20)throw new Error('no data');
  const lines=txt.trim().split('\n').filter(l=>l&&!l.startsWith('Date'));
  if(!lines.length)throw new Error('empty');
  const p=l=>{const a=l.split(',');return{close:parseFloat(a[4]),date:a[0]}};
  const last=p(lines[lines.length-1]),prev=lines.length>1?p(lines[lines.length-2]):last;
  if(isNaN(last.close))throw new Error('NaN');
  return{price:last.close,prev:prev.close,change:prev.close?(last.close-prev.close)/prev.close*100:0,date:last.date};
}
async function fetchStooq(){
  setS('load','Stooq: pobieranie kursów…');
  const keys=Object.keys(SYMS);
  const res=await Promise.allSettled(keys.map(k=>stooqOne(SYMS[k])));
  D.q={};let ok=0,fail=0;
  res.forEach((r,i)=>{if(r.status==='fulfilled'){D.q[keys[i]]=r.value;ok++;}else{fail++;}});
  setS(ok>15?'ok':'err',`Stooq: ${ok} OK, ${fail} błędów`);
}
async function fetchSP500_12M(){
  try{
    const now=new Date(),ya=new Date(now);ya.setFullYear(ya.getFullYear()-1);
    const d8=d=>d.getFullYear()+String(d.getMonth()+1).padStart(2,'0')+String(d.getDate()).padStart(2,'0');
    const r=await get(`https://stooq.com/q/d/l/?s=%5Espx&d1=${d8(ya)}&d2=${d8(now)}&i=w`,12000);
    const txt=await r.text();
    if(!txt||txt.includes('No data'))throw new Error('no data');
    const lines=txt.trim().split('\n').filter(l=>l&&!l.startsWith('Date'));
    if(lines.length<2)throw new Error('too few');
    const p=l=>parseFloat(l.split(',')[4]);
    const[first,last]=[p(lines[0]),p(lines[lines.length-1])];
    if(!first||!last||isNaN(first)||isNaN(last))throw new Error('NaN');
    D.sp12m=(last-first)/first*100;D.sp12m_src='stooq 1Y weekly ✓';
  }catch(e){D.sp12m=null;D.sp12m_src='fallback ('+e.message+')';}
}

// FRED
const FM={fedfunds:'FEDFUNDS',m2:'M2SL',yield_curve:'T10Y2Y',fed_bs:'WALCL',
  cpi:'CPIAUCSL',core_cpi:'CPILFESL',tips10y:'T10YIE',unrate:'UNRATE',
  sahm:'SAHMREALTIME',jolts:'JTSJOL',hy_spread:'BAMLH0A0HYM2',ig_spread:'BAMLC0A0CM',
  nfci:'NFCI',epu:'USEPUINDXM',indprod:'INDPRO',vixfred:'VIXCLS',sp500fred:'SP500',ib01_yield:'DGS1MO'};
async function fredOne(id){
  const r=await get(`https://fred.stlouisfed.org/graph/fredgraph.csv?id=${id}`,17000);
  const txt=await r.text();
  const rows=txt.trim().split('\n').slice(1).map(l=>{const[d,v]=l.split(',');return{date:d?.trim(),val:v?.trim()==='.'?null:parseFloat(v)};}).filter(d=>d.date&&d.val!==null&&isFinite(d.val));
  if(!rows.length)throw new Error('empty');
  const last=rows[rows.length-1],prev1=rows.length>1?rows[rows.length-2]:last,prev12=rows.length>12?rows[rows.length-13]:rows[0];
  return{current:last.val,date:last.date,prev:prev1.val,yoy:prev12.val?(last.val-prev12.val)/Math.abs(prev12.val)*100:null,series:rows.slice(-24)};
}
async function fetchFred(){
  setS('load','FRED: dane makroekonomiczne…');
  D.f={};const keys=Object.keys(FM);let ok=0,fail=0;
  for(let i=0;i<keys.length;i+=4){
    const batch=keys.slice(i,i+4);
    setS('load',`FRED ${Math.floor(i/4)+1}/${Math.ceil(keys.length/4)}: ${batch.join(', ')}`);
    const res=await Promise.allSettled(batch.map(k=>fredOne(FM[k])));
    res.forEach((r,j)=>{if(r.status==='fulfilled'){D.f[batch[j]]=r.value;ok++;}else fail++;});
    if(i+4<keys.length)await new Promise(r=>setTimeout(r,120));
  }
  setS(ok>14?'ok':'err',`FRED: ${ok} OK, ${fail} błędów`);
}

    D.fg={score:Math.round(fg.score||0),prev_close:Math.round(fg.previous_close||0),prev_week:Math.round(fg.previous_1_week||0),prev_month:Math.round(fg.previous_1_month||0),source:'CNN'};
    setS('ok','F&G CNN: '+D.fg.score);return;
  }catch(e){setS('err','CNN F&G: '+e.message);}
  try{
    const r=await get('https://feargreedmeter.com/',10000);
    const m=(await r.text()).match(/Fear and Greed Index:\s*(\d+)/i);
    const sc=m?parseInt(m[1]):50;
    D.fg={score:sc,prev_close:null,prev_week:null,prev_month:null,source:'fallback'};
  }catch(e){D.fg=null;}
}

}

const ST={fed:{val:3.75,date:'Gru 2025'},ism:{val:52.4,date:'Lut 2026'},cape:{val:36.2,date:'Mar 2026'},buffett:{val:196,date:'Mar 2026'},us10y:{val:4.10,date:'Lut 2026'}};

// SCORE
function score(){
  const q=D.q||{},f=D.f||{};
  const vix=q.vix?.price||f.vixfred?.current||29.49;
  const fg=D.fg?.score,sp12m=D.sp12m??f.sp500fred?.yoy??17.7,ib01=f.ib01_yield?.current??4.15;
  const sahm=f.sahm?.current??0.30,yc=f.yield_curve?.current,hy=f.hy_spread?.current??2.84;
  const fed=f.fedfunds?.current??ST.fed.val,cpi=f.cpi?.yoy;
  const sigs=[
    ['VIX','Sentyment',3,vix>=30?1:vix<18?-1:0,vix.toFixed(1),'Kontrariański: VIX>30=panika=okazja DCA'],
    ['Fear & Greed','Sentyment',2,fg!=null?(fg<=35?1:fg>=65?-1:0):0,fg??'…','≤35=strach=kupuj · ≥65=chciwość=ostrożnie'],
    ['Dual Momentum','Momentum',3,sp12m>ib01?1:-1,`${sp12m>=0?'+':''}${sp12m.toFixed(1)}%`,`SP500 12M vs IB01 yield (${ib01.toFixed(2)}%)`],
    ['CAPE Shiller','Wycena',1,-1,ST.cape.val+'×','CAPE 36× — norma 16× — rynek drogi'],
    ['Buffett Ind.','Wycena',1,ST.buffett.val>150?-1:0,ST.buffett.val+'%','Mkt Cap/GDP >150% = przewartościowany'],
    ['Sahm Rule','Cykl',3,sahm<0.30?1:sahm>0.50?-1:0,sahm.toFixed(2),'Sahm >0.50=recesja (teraz 0.30=poniżej progu)'],
    ['Yield Curve','Cykl',2,yc!=null?(yc>0.5?1:yc<-0.2?-1:0):0,yc!=null?yc.toFixed(2)+'%':'…','>0% normalna · <0% inwersja → recesja 12-18 mies.'],
    ['HY Spread','Cykl',2,hy<3.5?1:hy>6?-1:0,hy.toFixed(2)+'%','<3.5% risk-on · >6% stres kredytowy'],
    ['ISM PMI','Cykl',1,ST.ism.val>52?1:0,ST.ism.val+'','PMI>50=ekspansja przemysłu USA'],
    ['Fed Rate','Fed',1,fed<3?1:fed>5?-1:0,fed.toFixed(2)+'%','Cięcia Fed = wsparcie dla akcji'],
    ['CPI','Fed',1,cpi!=null?(cpi<2.5?1:cpi>4?-1:0):0,cpi!=null?cpi.toFixed(1)+'%':'…','Cel 2% · <2.5%=ok · >4%=podwyżki stóp'],
  ];
  const maxW=sigs.reduce((a,s)=>a+s[2],0),raw=sigs.reduce((a,s)=>a+s[3]*s[2],0);
  const norm=Math.round((raw+maxW)/(2*maxW)*100);
  let verdict,color,vg;
  if(norm>=68){verdict='KUP';color='#10b981';vg='rgba(16,185,129,.18)';}
  else if(norm>=55){verdict='KUP OSTROŻNIE';color='#10b981';vg='rgba(16,185,129,.12)';}
  else if(norm>=42){verdict='TRZYMAJ / DCA';color='#f59e0b';vg='rgba(245,158,11,.12)';}
  else if(norm>=28){verdict='WSTRZYMAJ';color='#f97316';vg='rgba(249,115,22,.12)';}
  else{verdict='UNIKAJ';color='#f43f5e';vg='rgba(244,63,94,.12)';}
  if(vix>=28&&norm>=30){verdict='KUP (DOŁEK?)';color='#10b981';vg='rgba(16,185,129,.20)';}
  return{sigs,norm,verdict,color,vg,vix,fg,sp12m,ib01,dm_bull:sp12m>ib01,sahm,yc,hy,fed,cpi,
    bulls:sigs.filter(s=>s[3]>0).map(s=>s[0]),bears:sigs.filter(s=>s[3]<0).map(s=>s[0])};
}

function buildSched(){
  const out=[],start=new Date(2026,2,12);
  for(let w=1;w<=42;w++){
    const d=new Date(start.getTime()+(w-1)*7*86400000),m=d.getMonth()+1;
    const boost=(m===8||m===9)?1.3:1.0,p=PORTS[(w-1)%5];
    out.push({w,p,boost,day:d.toLocaleDateString('pl-PL',{day:'2-digit',month:'2-digit'}),
      usd:p.bud_usd?Math.round(p.bud_usd/52*boost):null,eur:p.bud_eur?Math.round(p.bud_eur/52*boost):null});
  }
  return out;
}

      <tr style="background:rgba(255,255,255,.01)"><td style="color:#f59e0b;font-weight:700">Obligacje (TY, US)</td><td style="color:#f43f5e">Makro fundy: short = zakład na wzrost rentowności</td><td style="color:#10b981">Banki long = naturalny hedge portfela</td><td>QE Fed = ceny obligacji rosną (rentowność spada)</td><td>Duże short non-comm = rynek dyskontuje podwyżki/inflację. Yield curve kluczowy.</td></tr>
      <tr><td style="color:#f59e0b;font-weight:700">Złoto (GC)</td><td style="color:#10b981">Long = hedge inflacyjny i risk-off</td><td style="color:#f43f5e">Producenci: zawsze krótcy (hedging wydobycia)</td><td>Real rates ↓ lub niepewność → złoto rośnie</td><td>Non-comm rekordowo long przy realnych stopach &lt;0 = momentum złota. Kontrariański: rekord short komercyjnych = bullish.</td></tr>
      <tr style="background:rgba(255,255,255,.01)"><td style="color:#or;font-weight:700;color:#f97316">Ropa (CL, BRN)</td><td style="color:#f59e0b">CTA trend following: long/short wg trendu</td><td style="color:#94a3b8">Rafinerie i producenci hedgują production</td><td>Wzrost M2 + ożywienie = popyt na ropę rośnie</td><td>Niskie non-comm long = brak spekulacyjnego popytu = negatywne dla ropy mimo fundamentów.</td></tr>
      <tr><td style="color:#8b5cf6;font-weight:700">Waluty (EUR, JPY)</td><td style="color:#94a3b8">Global macro fundy: carry trade, stopy relatywne</td><td style="color:#94a3b8">Eksporterzy/importerzy hedgują ryzyko FX</td><td>Dolar silny gdy stopy Fed > reszta świata</td><td>Non-comm short EUR = carry do USD. Rekord short EUR = możliwy short squeeze jeśli Fed tnie.</td></tr>
      <tr style="background:rgba(255,255,255,.01)"><td style="color:#10b981;font-weight:700">Krypto (BTC)</td><td style="color:#f59e0b">Spekulacyjne long w cyklu bull (halving)</td><td style="color:#94a3b8">Brak tradycyjnych komercjalnych</td><td>Global M2 YoY koreluje silnie (6M lead)</td><td>BTC rośnie 6-12 mies. po Global M2 pivot (odwróceniu spadku). Halving + M2 wzrost = klasyczny bull cycle.</td></tr>
    </tbody>
  </table>
</div>

// ═══════════════════════ PIPELINE
async function fetchAll(){
  setS('load','Inicjalizacja…');
  await Promise.all([fetchStooq(),fetchSP500_12M()]);
  renderTicker();renderDecision();renderPortfolio();
  renderCOT();renderLiquidity();
  await Promise.all([fetchFG(),fetchCryptoFG()]);
  renderDecision();
  await fetchFred();
  renderDecision();renderIndicators();renderPortfolio();renderLiquidity();
  await fetchTreasury();
  renderData();
  const tot=Object.keys(D.q||{}).length+Object.keys(D.f||{}).length;
  setS('ok',`Załadowane — ${tot} serii danych`);
  const e=document.getElementById('lupd');if(e)e.textContent='Odśw: '+new Date().toLocaleTimeString('pl-PL');
}
setInterval(fetchAll,10*60*1000);

document.addEventListener('DOMContentLoaded',()=>{
  document.querySelectorAll('.tab').forEach(btn=>{
    btn.addEventListener('click',()=>{
      document.querySelectorAll('.tab').forEach(b=>b.classList.remove('on'));
      document.querySelectorAll('.panel').forEach(p=>p.classList.remove('on'));
      btn.classList.add('on');
      const tab=btn.dataset.tab;
      document.getElementById('panel-'+tab)?.classList.add('on');
      if(tab==='indicators')renderIndicators();
      if(tab==='cot')renderCOT();
      if(tab==='liquidity')renderLiquidity();
      if(tab==='portfolio')renderPortfolio();
      if(tab==='data')renderData();
    });
  });
  document.getElementById('btnR')?.addEventListener('click',fetchAll);
  fetchAll();
});
</script>
