<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>MacroTerminal — Decyzje Inwestycyjne</title>
<meta name="description" content="Panel makroekonomiczny: VIX, Fear&Greed, FRED, Dual Momentum — kiedy kupować ETF?">
<meta name="viewport" content="width=device-width, initial-scale=0.8">
<meta property="og:title" content="MacroTerminal">
<meta property="og:description" content="Live macro dashboard: VIX, F&G, FRED data, buy/sell signals">
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📊</text></svg>">
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;500;600;700;800&display=swap');
:root{
  --bg0:#060a0f;--bg1:#0a1018;--bg2:#0f1825;--bg3:#141f30;--bg4:#1a2840;
  --b1:#1e3048;--b2:#284060;--b3:#345280;
  --g:#00ff88;--g2:#00cc66;--g3:#008844;
  --r:#ff1a4e;--r2:#cc1040;
  --y:#ffcc00;--y2:#c89800;
  --o:#ff6600;
  --bl:#00aaff;--bl2:#007acc;
  --p:#aa44ff;
  --t1:#e8f4ff;--t2:#7ab0d0;--t3:#3a5878;--t4:#1e3048;
  --mono:'Space Mono',monospace;
  --head:'Syne',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg0);color:var(--t1);font-family:var(--mono);font-size:11px;}

/* ═══ SCANLINE OVERLAY ═══ */
body::before{content:'';position:fixed;inset:0;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.04) 2px,rgba(0,0,0,.04) 4px);
  pointer-events:none;z-index:9999;}

/* ═══ LAYOUT ═══ */
.app{display:grid;grid-template-rows:48px 26px 40px 1fr;width:100vw;height:100vh;overflow:hidden;}

/* ═══ TOPBAR ═══ */
.topbar{
  background:linear-gradient(90deg,var(--bg1),var(--bg2));
  border-bottom:1px solid var(--b2);
  display:flex;align-items:center;gap:14px;padding:0 16px;
  position:relative;
}
.topbar::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent 0%,var(--g) 30%,var(--bl) 70%,transparent 100%);
  opacity:.4;}
.logo{font-family:var(--head);font-size:16px;font-weight:800;letter-spacing:3px;
  background:linear-gradient(90deg,var(--g),var(--bl));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.logo-sub{font-size:7px;letter-spacing:4px;color:var(--t3);margin-top:-1px;}
.badge{font-size:7.5px;letter-spacing:1.5px;padding:2px 9px;border-radius:1px;border:1px solid;white-space:nowrap;font-family:var(--mono);}
.badge-live{color:var(--g);border-color:var(--g);background:rgba(0,255,136,.06);}
.badge-load{color:var(--y);border-color:var(--y);background:rgba(255,204,0,.05);animation:blink 1s infinite;}
.badge-err{color:var(--r);border-color:var(--r);background:rgba(255,26,78,.06);}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:12px;}
.clock{font-size:9px;color:var(--t2);letter-spacing:1px;}
.btn{font-size:8px;letter-spacing:1px;padding:4px 12px;border:1px solid var(--b2);
  background:transparent;color:var(--t2);font-family:var(--mono);cursor:pointer;border-radius:1px;transition:all .15s;}
.btn:hover{border-color:var(--g);color:var(--g);}

/* ═══ TICKER ═══ */
.ticker{background:var(--bg1);border-bottom:1px solid var(--b1);display:flex;align-items:center;overflow:hidden;}
.ticker-track{display:flex;gap:0;animation:scroll-ticker 90s linear infinite;white-space:nowrap;}
.ticker-track:hover{animation-play-state:paused;}
@keyframes scroll-ticker{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
.ti{display:inline-flex;align-items:center;gap:6px;padding:0 16px;border-right:1px solid var(--b1);height:26px;}
.ti-n{font-size:7.5px;color:var(--t3);}
.ti-p{font-size:10px;font-weight:700;}
.ti-c{font-size:7.5px;font-weight:700;}
.up{color:var(--g)}.dn{color:var(--r)}.neu{color:var(--t2)}

/* ═══ MAIN TABS ═══ */
.main-tabs{background:var(--bg1);border-bottom:2px solid var(--b1);display:flex;align-items:stretch;}
.tab-btn{
  padding:0 22px;font-size:9px;font-weight:700;letter-spacing:2px;color:var(--t3);
  cursor:pointer;border:none;background:transparent;font-family:var(--head);
  border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .15s;
  white-space:nowrap;
}
.tab-btn:hover{color:var(--t1);}
.tab-btn.active{color:var(--g);border-bottom-color:var(--g);}
.tab-right{margin-left:auto;display:flex;align-items:center;padding-right:12px;gap:8px;}

/* ═══ PANELS ═══ */
.panel{display:none;height:100%;overflow-y:auto;overflow-x:hidden;}
.panel.active{display:block;}
.panel::-webkit-scrollbar{width:3px;}
.panel::-webkit-scrollbar-thumb{background:var(--b2);}
.panel-content{padding:14px 16px;}

/* ═══ DECISION PANEL ═══ */
.decision-grid{display:grid;grid-template-columns:320px 1fr;gap:14px;margin-bottom:14px;}
.verdict-box{
  background:var(--bg2);border:2px solid var(--b2);border-radius:3px;
  padding:20px;display:flex;flex-direction:column;align-items:center;justify-content:center;
  text-align:center;position:relative;overflow:hidden;min-height:220px;
}
.verdict-box::before{content:'';position:absolute;inset:0;
  background:radial-gradient(circle at 50% 30%,var(--verdict-clr,#00ff88)08,transparent 70%);
  transition:all .5s;}
.verdict-label{font-size:8px;letter-spacing:4px;color:var(--t3);font-family:var(--head);margin-bottom:12px;}
.verdict-word{font-family:var(--head);font-size:42px;font-weight:800;line-height:1;
  color:var(--verdict-clr,var(--g));text-shadow:0 0 30px var(--verdict-clr,var(--g));
  margin-bottom:8px;}
.verdict-score{font-size:11px;font-weight:700;color:var(--t2);margin-bottom:14px;}
.verdict-why{font-size:8.5px;color:var(--t2);line-height:1.7;max-width:260px;}
.verdict-signal-row{display:flex;gap:6px;margin-top:12px;flex-wrap:wrap;justify-content:center;}
.vsig{font-size:7px;padding:2px 8px;border-radius:1px;letter-spacing:1px;}
.vsig-bull{background:rgba(0,255,136,.1);color:var(--g);border:1px solid rgba(0,255,136,.2);}
.vsig-bear{background:rgba(255,26,78,.1);color:var(--r);border:1px solid rgba(255,26,78,.2);}
.vsig-neu{background:rgba(255,204,0,.08);color:var(--y);border:1px solid rgba(255,204,0,.2);}

/* ═══ FEAR GAUGES ═══ */
.fear-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;}
.gauge-card{background:var(--bg2);border:1px solid var(--b1);border-radius:3px;padding:14px;}
.gauge-label-sm{font-size:7px;letter-spacing:3px;color:var(--t3);text-transform:uppercase;font-family:var(--head);margin-bottom:4px;}
.gauge-big-num{font-size:48px;font-weight:700;line-height:1;margin:4px 0;}
.gauge-text{font-size:9px;font-weight:700;letter-spacing:2px;margin-bottom:10px;}
.gauge-bar-wrap{position:relative;height:6px;background:var(--bg0);border-radius:3px;overflow:hidden;margin-bottom:8px;}
.gauge-bar-fill{position:absolute;left:0;top:0;height:100%;border-radius:3px;
  background:linear-gradient(90deg,#ff1a4e,#ff6600,#ffcc00,#00cc66,#00ff88);transition:width .8s ease;}
.gauge-bar-dot{position:absolute;top:-4px;width:14px;height:14px;background:white;border-radius:50%;
  border:2px solid var(--bg0);transform:translateX(-50%);transition:left .8s ease;box-shadow:0 0 8px rgba(255,255,255,.5);}
.gauge-context{display:grid;grid-template-columns:1fr 1fr 1fr;gap:4px;margin-top:6px;}
.gc-item{background:var(--bg3);border-radius:1px;padding:4px 6px;text-align:center;}
.gc-lbl{font-size:6.5px;color:var(--t3);}
.gc-val{font-size:10px;font-weight:700;margin-top:1px;}

/* ═══ HISTORY CARDS ═══ */
.history-section{margin-bottom:14px;}
.sec-title{font-family:var(--head);font-size:8px;letter-spacing:3px;color:var(--t3);
  text-transform:uppercase;margin-bottom:8px;padding-bottom:5px;border-bottom:1px solid var(--b1);}
.history-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;}
.hcard{background:var(--bg2);border:1px solid var(--b1);border-radius:3px;padding:10px;position:relative;overflow:hidden;}
.hcard::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:var(--hc-color,var(--b2));}
.hcard-era{font-size:7px;letter-spacing:2px;color:var(--t3);font-family:var(--head);}
.hcard-label{font-size:9.5px;font-weight:700;color:var(--t1);margin:3px 0 6px;}
.hcard-body{font-size:7.5px;color:var(--t2);line-height:1.7;}
.hcard-result{margin-top:6px;font-size:8px;font-weight:700;}

/* ═══ SPARKLINE ═══ */
.sparkline-wrap{display:flex;align-items:flex-end;gap:2px;height:36px;}
.spark-bar{background:var(--b2);border-radius:1px;min-width:4px;transition:background .2s;}
.spark-bar:hover{background:var(--bl);}
.spark-bar.hi{background:var(--g);}
.spark-bar.lo{background:var(--r);}
.spark-bar.cur{background:var(--y);}

/* ═══ SIGNALS TABLE ═══ */
.signals-wrap{background:var(--bg2);border:1px solid var(--b1);border-radius:3px;overflow:hidden;}
.signal-row{display:grid;grid-template-columns:140px 70px 70px 1fr;align-items:center;
  padding:6px 12px;border-bottom:1px solid var(--b1);}
.signal-row:hover{background:rgba(255,255,255,.02);}
.signal-row.hdr{background:var(--bg3);font-size:6.5px;letter-spacing:2px;color:var(--t3);font-family:var(--head);}
.signal-grp{font-size:7px;font-weight:700;color:var(--t3);letter-spacing:1px;}
.signal-name{font-size:8.5px;color:var(--t1);padding-left:8px;}
.signal-val{font-size:10px;font-weight:700;text-align:center;}
.signal-sig{padding:2px 7px;font-size:6.5px;letter-spacing:1px;border-radius:1px;text-align:center;font-weight:700;}
.sig-bull{background:rgba(0,255,136,.1);color:var(--g);border:1px solid rgba(0,255,136,.2);}
.sig-bear{background:rgba(255,26,78,.1);color:var(--r);border:1px solid rgba(255,26,78,.2);}
.sig-neu{background:rgba(255,204,0,.08);color:var(--y);border:1px solid rgba(255,204,0,.2);}
.signal-desc{font-size:7px;color:var(--t3);padding-left:8px;}
.signal-grp-hdr{background:var(--bg3);padding:4px 12px;font-size:7px;letter-spacing:2px;color:var(--t3);font-family:var(--head);border-bottom:1px solid var(--b1);}

/* ═══ INDICATORS (WSKAŹNIKI) ═══ */
.ind-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:12px;}
.ind-card{background:var(--bg2);border:1px solid var(--b1);border-radius:3px;padding:12px;transition:border-color .15s;}
.ind-card:hover{border-color:var(--b2);}
.ind-card.bull{border-left:3px solid var(--g);}
.ind-card.bear{border-left:3px solid var(--r);}
.ind-card.neu{border-left:3px solid var(--y);}
.ind-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px;}
.ind-title{font-size:7.5px;font-weight:700;color:var(--t2);font-family:var(--head);}
.ind-src{font-size:6px;color:var(--t4);}
.ind-value{font-size:26px;font-weight:700;line-height:1;margin-bottom:3px;}
.ind-sub{font-size:7.5px;color:var(--t3);}
.ind-desc{font-size:7.5px;color:var(--t3);line-height:1.6;margin-top:6px;padding-top:6px;border-top:1px solid var(--b1);}
.ind-history{margin-top:6px;font-size:7px;color:var(--t4);}
.ind-signal{font-size:7px;font-weight:700;padding:1px 6px;border-radius:1px;margin-top:4px;display:inline-block;}

/* ═══ PORTFOLIO ═══ */
.port-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:12px;}
.port-card{background:var(--bg2);border:1px solid var(--b1);border-radius:3px;padding:10px;text-align:center;transition:all .15s;}
.port-card.active-dm{border-color:var(--g);box-shadow:0 0 12px rgba(0,255,136,.1);}
.port-card.safe-dm{border-color:var(--y);}
.port-id{font-family:var(--head);font-size:14px;font-weight:800;margin-bottom:3px;}
.port-name{font-size:7px;color:var(--t2);margin-bottom:4px;}
.port-budget{font-size:11px;font-weight:700;}
.port-type{font-size:6.5px;padding:2px 6px;border-radius:1px;margin-top:4px;display:inline-block;}
.port-etfs{font-size:6.5px;color:var(--t3);margin-top:4px;line-height:1.5;}
.port-dm{font-size:7px;font-weight:700;margin-top:5px;}

/* ═══ ROTATION TABLE ═══ */
.rot-table{width:100%;border-collapse:collapse;font-size:8px;margin-bottom:12px;}
.rot-table th{background:var(--bg3);color:var(--t3);padding:5px 10px;text-align:left;
  font-size:6.5px;letter-spacing:1.5px;font-family:var(--head);border-bottom:1px solid var(--b1);}
.rot-table td{padding:4px 10px;border-bottom:1px solid var(--b1);color:var(--t2);}
.rot-table tr:hover td{background:rgba(255,255,255,.015);}
.port-tag{padding:1px 6px;border-radius:1px;font-weight:700;font-size:7px;}

/* ═══ ETF TABLE ═══ */
.etf-table{width:100%;border-collapse:collapse;font-size:8.5px;margin-bottom:12px;}
.etf-table th{background:var(--bg3);color:var(--t3);padding:6px 10px;text-align:left;
  font-size:6.5px;letter-spacing:1.5px;font-family:var(--head);border:1px solid var(--b1);}
.etf-table td{padding:5px 10px;border:1px solid var(--b1);color:var(--t2);}
.etf-table td:first-child{color:var(--t1);font-weight:700;}
.etf-table tr:hover td{background:rgba(255,255,255,.02);}
.risk-bar{display:flex;gap:2px;align-items:center;}
.risk-seg{width:8px;height:8px;border-radius:1px;}

/* ═══ DATA PANEL ═══ */
.log-table{width:100%;border-collapse:collapse;font-size:7.5px;margin-bottom:12px;}
.log-table td{padding:4px 10px;border-bottom:1px solid var(--b1);}
.log-table tr:hover td{background:rgba(255,255,255,.015);}

/* ═══ DEBUG ═══ */
.debug-log{background:var(--bg1);border:1px solid var(--b1);border-radius:2px;padding:10px;
  font-size:8px;line-height:1.8;max-height:400px;overflow-y:auto;}

/* ═══ MISC ═══ */
.loading-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;
  height:300px;gap:14px;}
.spinner{width:32px;height:32px;border:2px solid var(--b1);border-top-color:var(--g);
  border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-txt{font-size:10px;color:var(--t2);letter-spacing:2px;}
a{color:var(--bl);text-decoration:none;}
a:hover{color:var(--g);}

::-webkit-scrollbar{width:3px;height:3px;}
::-webkit-scrollbar-track{background:var(--bg0);}
::-webkit-scrollbar-thumb{background:var(--b2);}
</style>
</head>
<body>
<div class="app" id="app">

  <!-- TOPBAR -->
  <div class="topbar">
    <div>
      <div class="logo">MACROTERMINAL</div>
      <div class="logo-sub">v23 · INVESTMENT INTELLIGENCE</div>
    </div>
    <div id="statusBadge" class="badge badge-load">● INIT</div>
    <div class="topbar-right">
      <button class="btn" id="btnRefreshAll">⟳ ODŚWIEŻ</button>
      <div class="clock" id="clock">—</div>
    </div>
  </div>

  <!-- TICKER -->
  <div class="ticker"><div class="ticker-track" id="tickerTrack"></div></div>

  <!-- MAIN TABS -->
  <div class="main-tabs">
    <button class="tab-btn active" data-tab="decision">🎯 CO KUPIĆ?</button>
    <button class="tab-btn" data-tab="indicators">📊 WSKAŹNIKI</button>
    <button class="tab-btn" data-tab="portfolio">💼 PORTFEL</button>
    <button class="tab-btn" data-tab="data">⚙️ DANE</button>
    <div class="tab-right">
      <span id="lastUpdate" style="font-size:7px;color:var(--t4)">—</span>
    </div>

  <div class="panel" id="panel-indicators">
    <div class="panel-content">
      <div class="loading-wrap"><div class="spinner"></div><div class="loading-txt">ŁADOWANIE FRED…</div></div>
    </div>
  </div>

  <!-- 💼 PORTFEL -->
  <div class="panel" id="panel-portfolio">
    <div class="panel-content">
      <div class="loading-wrap"><div class="spinner"></div><div class="loading-txt">ŁADOWANIE…</div></div>
    </div>
  </div>

  <!-- ⚙️ DANE -->
  <div class="panel" id="panel-data">
    <div class="panel-content" id="body-data">
      <div class="loading-wrap"><div class="spinner"></div></div>
    </div>
  </div>

</div>
<script>
'use strict';
// ══════════════════════════════════════════════════════════════
// MACRO TERMINAL v23 — app.js
// 4 tabs: CO KUPIĆ | WSKAŹNIKI | PORTFEL | DANE
// Sources: stooq.com (z fallback bossa.pl) + FRED + alternative.me
// ══════════════════════════════════════════════════════════════

const D = {};  // global data store

// ── Debug log ─────────────────────────────────────────────────
const _log = [];
function dbg(status, msg, isErr=false) {
  const ts = new Date().toLocaleTimeString('pl-PL');
  _log.unshift({ ts, status, msg, isErr });
  if (_log.length > 60) _log.pop();
  const el = document.getElementById('statusBadge');
  if (el) {
    el.textContent = '● ' + msg.slice(0,55);
    el.className = 'badge ' + (isErr ? 'badge-err' : status==='ok' ? 'badge-live' : 'badge-load');
  }
}

// ── Clock ─────────────────────────────────────────────────────
function tick() {
  const n = new Date();
  const el = document.getElementById('clock');
  if (el) el.textContent =
    n.toLocaleDateString('pl-PL',{weekday:'short',day:'2-digit',month:'short'}) +
    ' ' + n.toLocaleTimeString('pl-PL');
}
setInterval(tick, 1000); tick();

// ── Formatowanie ──────────────────────────────────────────────
const fmt    = (v,d=2) => v==null||isNaN(v)?'—':Number(v).toLocaleString('pl-PL',{minimumFractionDigits:d,maximumFractionDigits:d});
const fmtPct = p => p==null?'—':(p>=0?'+':'')+Number(p).toFixed(2)+'%';
const cls    = p => p>0?'up':p<0?'dn':'neu';
const fgColor = s => s==null?'#7ab0d0':s<=24?'#ff1a4e':s<=44?'#ff6600':s<=55?'#ffcc00':s<=74?'#00cc66':'#00ff88';
const fgLabel = s => s==null?'—':s<=24?'EXTREME FEAR':s<=44?'FEAR':s<=55?'NEUTRAL':s<=74?'GREED':'EXTREME GREED';

// ── Fetch z timeout ────────────────────────────────────────────
async function httpGet(url, ms=12000) {
  const ctrl = new AbortController();
  const t = setTimeout(() => ctrl.abort(), ms);
  try {
    const r = await fetch(url, { signal: ctrl.signal });
    clearTimeout(t);
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    return r;
  } catch(e) { clearTimeout(t); throw e; }
}

// ══════════════════════════════════════════════════════════════
// SOURCE 1: STOOQ.COM CSV
// ══════════════════════════════════════════════════════════════
const STOOQ_SYMBOLS = {
  sp500:'^spx', nasdaq:'^ndx', dj:'^dji', russell:'^rut',
  gold:'xauusd', silver:'xagusd', oil:'cl.f', natgas:'ng.f', copper:'hg.f',
  usdpln:'usdpln', eurpln:'eurpln', eurusd:'eurusd',
  gbpusd:'gbpusd', usdjpy:'usdjpy', dxy:'dxy',
  us10y:'10usy.b', us2y:'2usy.b', us30y:'30usy.b',
  btcusd:'btcusd', ethusd:'ethusd',
  wig20:'wig20',
  spy:'spy.us', qqq:'qqq.us', vix:'^vix',
};

async function stooqOne(sym) {
  const url = `https://stooq.com/q/d/l/?s=${encodeURIComponent(sym)}&i=d`;
  const r = await httpGet(url, 10000);
  const txt = await r.text();
  if (!txt || txt.includes('No data') || txt.trim().length < 20) throw new Error('brak danych');
  const lines = txt.trim().split('\n').filter(l => l && !l.startsWith('Date') && !l.startsWith('Dat'));
  if (!lines.length) throw new Error('pusta odpowiedź');
  const parse = l => { const p=l.split(','); return { close:parseFloat(p[4]), date:p[0] }; };
  const last = parse(lines[lines.length-1]);
  const prev = lines.length>1 ? parse(lines[lines.length-2]) : last;
  if (isNaN(last.close)) throw new Error('nieprawidłowa wartość');
  return { price:last.close, prev:prev.close,
    change: prev.close ? (last.close-prev.close)/prev.close*100 : 0,
    date:last.date, symbol:sym };
}

async function fredOne(id) {
  const url = `https://fred.stlouisfed.org/graph/fredgraph.csv?id=${id}`;
  const r = await httpGet(url,15000);
  const txt = await r.text();
  const rows = txt.trim().split('\n').slice(1)
    .map(l=>{ const [d,v]=l.split(','); return {date:d?.trim(),val:v?.trim()==='.'?null:parseFloat(v)}; })
    .filter(d=>d.date&&d.val!==null&&isFinite(d.val));
  if (!rows.length) throw new Error('pusta seria');
  const last=rows[rows.length-1], prev1=rows.length>1?rows[rows.length-2]:last;
  const prev12=rows.length>12?rows[rows.length-13]:rows[0];
  return { current:last.val, date:last.date, prev:prev1.val,
    yoy:prev12.val?(last.val-prev12.val)/Math.abs(prev12.val)*100:null,
    series:rows.slice(-24) };
}

async function fetchFred() {
  dbg('load','FRED: pobieranie danych makro...');
  D.fred = {};
  const keys = Object.keys(FRED_IDS);
  let ok=0, fail=0;
  for (let i=0; i<keys.length; i+=4) {
    const batch = keys.slice(i,i+4);
    dbg('load',`FRED batch ${Math.floor(i/4)+1}/${Math.ceil(keys.length/4)}: ${batch.join(', ')}`);
    const results = await Promise.allSettled(batch.map(k=>fredOne(FRED_IDS[k])));
    results.forEach((r,j)=>{
      const k=batch[j];
      if (r.status==='fulfilled') { D.fred[k]=r.value; ok++; }
      else { fail++; dbg('err',`FRED/${FRED_IDS[k]}: ${r.reason?.message}`,true); }
    });
    if (i+4<keys.length) await new Promise(res=>setTimeout(res,100));
  }
  dbg('ok',`FRED: ${ok} OK, ${fail} błędów`);
}

// Build schedule
function buildSchedule() {
  const schedule = [];
  const start = new Date(2026,2,12); // 12 Mar 2026
  for (let w=1; w<=42; w++) {
    const d = new Date(start.getTime()+(w-1)*7*86400000);
    const mNum = d.getMonth()+1;
    const boost = (mNum===8||mNum===9) ? 1.3 : 1.0;
    const p = PORTFOLIOS[(w-1)%5];
    schedule.push({
      w, p, d,
      day: d.toLocaleDateString('pl-PL',{day:'2-digit',month:'2-digit'}),
      mNum, boost,
      usd: p.budget_usd ? Math.round(p.budget_usd/52*boost) : null,
      eur: p.budget_eur ? Math.round(p.budget_eur/52*boost) : null,
    });
  }
  return schedule;
}

// COMPOSITE SCORE ENGINE
// ══════════════════════════════════════════════════════════════
function computeScore() {
  const q=D.quotes||{}, f=D.fred||{};
  const vix    = q.vix?.price || f.vixfred?.current || 29.49;
  const fg     = D.fg?.score;
  const sp12m  = D.sp500_12m ?? f.sp500fred?.yoy ?? 17.7;
  const ib01   = f.ib01_yield?.current ?? 4.15;
  const cape   = STATIC.cape.val;
  const buffett= STATIC.buffett.val;
  const sahm   = f.sahm?.current ?? 0.30;
  const yc     = f.yield_curve?.current;
  const hy     = f.hy_spread?.current ?? 2.84;
  const fed    = f.fedfunds?.current ?? STATIC.fed_rate.val;
  const cpi    = f.cpi?.yoy;
  const ism    = STATIC.ism_pmi.val;

  const signals = [
    // [name, group, weight, signal(-1/0/1), val, unit, desc]
    ['VIX',              'SENTYMENT', 3, vix>=30?1:vix<18?-1:0,       vix.toFixed(1),  '',  'Kontrariański: wysoki VIX = okazja zakupu'],
    ['Fear & Greed',     'SENTYMENT', 2, fg!=null?(fg<=35?1:fg>=65?-1:0):0, fg??'—',   '',  'Niski F&G = strach rynkowy = czas kupowania'],
    ['Dual Momentum 12M','MOMENTUM',  3, sp12m>ib01?1:-1,             sp12m.toFixed(1),'%', `SP500 vs IB01 (${ib01.toFixed(2)}%)`],
    ['CAPE Shiller',     'WYCENA',    1, -1,                           cape.toFixed(1), 'x', 'Zawsze niedrogie tylko historycznie <16x'],
    ['Buffett Indicator','WYCENA',    1, buffett>150?-1:buffett<100?1:0, buffett+'%',  '',  'Mkt Cap/GDP. Teraz: bardzo drogie.'],
    ['Sahm Rule',        'CYKL',      3, sahm<0.30?1:sahm>0.50?-1:0, sahm.toFixed(2),'',  'Reguła Sahm: >0.50 = recesja (teraz OK)'],
    ['Yield Curve 10Y2Y','CYKL',      2, yc!=null?(yc>0.5?1:yc<-0.2?-1:0):0, yc!=null?yc.toFixed(2)+'%':'…','', '>0% = normalna, <0% = inwersja/recesja'],
    ['HY Spread',        'CYKL',      2, hy<3.5?1:hy>6?-1:0,         hy.toFixed(2),  '%', '<3.5% = risk-on, >6% = stres kredytowy'],
    ['ISM PMI',          'CYKL',      1, ism>52?1:ism<47?-1:0,        ism.toFixed(1), '',  '>50 = ekspansja przemysłowa'],
    ['Fed Rate',         'FED',       1, fed<3?1:fed>5?-1:0,          fed.toFixed(2), '%', 'Cięcia Fed = bull. Wzrosty = bear.'],
    ['CPI Inflacja',     'FED',       1, cpi!=null?(cpi<2.5?1:cpi>4?-1:0):0, cpi!=null?cpi.toFixed(1)+'%':'…','', 'Cel Fed: 2%. Wysoka CPI = zaciskanie.'],
  ];

  const totalW = signals.reduce((a,s)=>a+s[2],0);
  const maxScore = totalW;
  let rawScore = signals.reduce((a,s)=>a+s[1]*s[2],0);
  const norm = (rawScore+maxScore)/(2*maxScore)*100;

  let verdict, color, why;
  if (norm>=68) { verdict='KUP'; color='#00ff88'; }
  else if (norm>=55) { verdict='KUP OSTROŻNIE'; color='#00cc66'; }
  else if (norm>=42) { verdict='TRZYMAJ / DCA'; color='#ffcc00'; }
  else if (norm>=28) { verdict='WSTRZYMAJ'; color='#ff6600'; }
  else { verdict='UNIKAJ / REDUKUJ'; color='#ff1a4e'; }

  // VIX override
  if (vix>=28 && norm>=30) {
    verdict='KUP (DOŁEK?)';
    color='#00ff88';
  }

  const bulls = signals.filter(s=>s[1]>0).map(s=>s[0]);
  const bears = signals.filter(s=>s[1]<0).map(s=>s[0]);
  const dm_bull = sp12m > ib01;

  return { signals, norm, verdict, color, why, vix, fg, sp12m, ib01, dm_bull, bulls, bears, fed, cpi, sahm, yc, hy, ism };
}

// ══════════════════════════════════════════════════════════════
// MAIN PIPELINE
// ══════════════════════════════════════════════════════════════
async function fetchAllData() {
  dbg('load','══ START v23 ══');
  // Phase 1: stooq + SP500 12M (parallel)
  await Promise.all([fetchStooq(), fetchSP500_12M()]);
  renderTicker();
  renderDecision();
  renderPortfolio();
  // Phase 2: Fear & Greed (parallel)
  await Promise.all([fetchFG(), fetchCryptoFG()]);
  renderDecision();
  // Phase 3: FRED (slow, batched)
  await fetchFred();
  renderDecision();
  renderIndicators();
  renderPortfolio();
  // Phase 4: Treasury
  await fetchTreasury();
  renderData();
  document.getElementById('lastUpdate').textContent =
    'Odświeżono: ' + new Date().toLocaleTimeString('pl-PL');
  const total = Object.keys(D.quotes||{}).length + Object.keys(D.fred||{}).length;
  dbg('ok',`══ GOTOWE — ${total} serii danych ══`);
}

function refreshAll() { fetchAllData(); }
setInterval(fetchAllData, 10*60*1000);

// ══════════════════════════════════════════════════════════════
// TAB SYSTEM
// ══════════════════════════════════════════════════════════════
function initTabs() {
  const tabs = document.querySelectorAll('.tab-btn');
  tabs.forEach(btn => {
    btn.addEventListener('click', () => {
      tabs.forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
      btn.classList.add('active');
      const panelId = 'panel-' + btn.dataset.tab;
      const panel = document.getElementById(panelId);
      if (panel) panel.classList.add('active');
      // Lazy render on switch
      if (btn.dataset.tab === 'indicators') renderIndicators();
      if (btn.dataset.tab === 'portfolio')  renderPortfolio();
      if (btn.dataset.tab === 'data')       renderData();
    });
  });
  document.getElementById('btnRefreshAll')?.addEventListener('click', refreshAll);
}

// ══════════════════════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════════════════════
document.addEventListener('DOMContentLoaded', () => {
  initTabs();
  fetchAllData();
});
